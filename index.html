/* ═══ Авторасчеты листа (передовые практики) ═══ */
function invEntry(c,id){ return (c.inventory||[]).find(e=>e.id===id); }
function acAuto(c){
  const dx=(typeof eMod==='function')?eMod(c,'dex'):mod(c.ab.dex);
  let base=10+dx, shield=0;
  const eq=c.equipment||{};
  const chestE=invEntry(c,eq.CHEST), chest=chestE?itemOf(chestE.itemId):null;
  if(chest&&chest.ac){
    const m=String(chest.ac).match(/(\d+)/);
    if(m){ base=+m[1]; if(/лов/i.test(chest.ac)) base+=(/макс/i.test(chest.ac)?Math.min(2,dx):dx); }
  }
  const offE=invEntry(c,eq.OFF_HAND), off=offE?itemOf(offE.itemId):null;
  if(off&&off.type==='armor'){ const m=String(off.ac||'').match(/(\d+)/); shield=m?+m[1]:2; }
  return base+shield;
}
function acBase(c){ return c.acOverride!=null? c.acOverride : acAuto(c); }
function acTotal(c){ return acBase(c)+((typeof fxSum==='function')?fxSum(c,'ac'):0); }
function setAcOverride(v){ const c=cc(); if(!c) return; const s=String(v).trim(); c.acOverride=(s===''?null:Math.max(0,parseInt(s,10)||0)); scheduleSave(); renderChars(); }
function initTotal(c){ return eMod(c,'dex')+(+c.initB||0)+fxSum(c,'init'); }
function setInitB(v){ const c=cc(); if(!c) return; c.initB=parseInt(v,10)||0; scheduleSave(); renderChars(); }
function perceptionIdx(){ return SKILLS.findIndex(s=>s[0]==='Внимательность'); }
function passivePerc(c){ const i=perceptionIdx(); return 10+(i>=0?skillBonus(c,i).v:eMod(c,'wis'))+fxSum(c,'passperc'); }
function weaponRows(c){
  const eq=c.equipment||{}, seen={}, rows=[];
  ['MAIN_HAND','OFF_HAND'].forEach(sl=>{
    const eid=eq[sl]; if(!eid||seen[eid]) return; seen[eid]=1;
    const e=invEntry(c,eid), it=e?itemOf(e.itemId):null;
    if(!it||it.type!=='weapon') return;
    const tags=it.tags||[];
    const useDex=tags.includes('ranged')||(tags.includes('finesse')&&eMod(c,'dex')>=eMod(c,'str'));
    const m=useDex?eMod(c,'dex'):eMod(c,'str');
    rows.push({n:it.n, atk:m+PROF[c.level]+fxSum(c,'atk'), dmg:it.dmg||'', dt:it.dmgType||'', m:m+fxSum(c,'dmg'), abn:useDex?'Лов':'Сил'});
  });
  rows.push({n:'Безоружный удар', atk:eMod(c,'str')+PROF[c.level]+fxSum(c,'atk'), dmg:'', dt:'дробящий', m:eMod(c,'str')+fxSum(c,'dmg'), abn:'Сил', flat:true});
  return rows;
}
function spellAbOf(c){
  if(c.spellAb) return c.spellAb;
  const cl=c.cls||'';
  if(/Жрец|Друид|Следопыт/.test(cl)) return 'wis';
  if(/Бард|Чародей|Колдун|Паладин/.test(cl)) return 'cha';
  return 'int';
}
function setSpellAb(v){ const c=cc(); if(!c) return; c.spellAb=v; scheduleSave(); renderChars(); }
function spellDC(c){ return 8+PROF[c.level]+eMod(c,spellAbOf(c)); }
function spellAtk(c){ return PROF[c.level]+eMod(c,spellAbOf(c)); }
function carryWeight(c){
  let w=0;
  (c.inventory||[]).forEach(e=>{ const it=itemOf(e.itemId); if(!it||!it.weight) return;
    const v=parseFloat(String(it.weight).replace(',','.')); if(v) w+=v*(e.qty||1); });
  return Math.round(w*10)/10;
}
function spendHitDie(){
  const c=cc(); if(!c) return;
  const hd=classOf(c).hd||8;
  if(c.hdUsed>=c.level){ setStatus('Кости хитов исчерпаны — нужен долгий отдых.'); return; }
  const r=1+Math.floor(Math.random()*hd), heal=Math.max(1,r+eMod(c,'con'));
  c.hdUsed=(+c.hdUsed||0)+1; c.hp=Math.min(c.hpMax,(+c.hp||0)+heal);
  const out=document.getElementById('diceOut');
  if(out){ out.textContent='Кость хитов: к'+hd+' → '+r+fmtMod(mod(c.ab.con)).replace(/^([+-])/,' $1 ')+' = +'+heal+' хитов'; out.style.color='var(--ok)'; }
  scheduleSave(); renderChars();
}
function returnHitDie(){ const c=cc(); if(!c) return; c.hdUsed=Math.max(0,(+c.hdUsed||0)-1); scheduleSave(); renderChars(); }
function shortRest(){
  const c=cc(); if(!c) return;
  c.abilities.forEach(a=>{ const db=abilityOf(a.abilityId); if(db&&db.uses!=null&&db.rest==='короткий отдых') a.cur=db.uses; });
  setStatus('☕ Короткий отдых: способности короткого отдыха восстановлены; кости хитов тратьте кнопкой ⚁ в ячейке «Кости хитов».');
  scheduleSave(); renderChars();
}
function upgradeChar3(c){
  if(!c||c._v3) return c;
  if(c.acOverride===undefined){
    const cur=+c.ac||0, auto=acAuto(c);
    c.acOverride=(cur&&cur!==auto&&cur!==10)?cur:null;
  }
  if(c.initB===undefined) c.initB=0;
  if(c.hdUsed===undefined) c.hdUsed=0;
  if(c.spellAb===undefined) c.spellAb='';
  if(!c.persona) c.persona={tr:'',id:'',bd:'',fl:'',ap:''};
  if(!Array.isArray(c.activeFx)) c.activeFx=[];
  if(!Array.isArray(c.fxOff)) c.fxOff=[];
  if(c.inspiration===undefined) c.inspiration=false;
  c._v3=true; return c;
}
function updPersona(k,v){ const c=cc(); if(!c) return; if(!c.persona) c.persona={}; c.persona[k]=v; scheduleSave(); }

const getCh=id=>chars.find(c=>c.id===id);
const cc=()=>getCh(activeCharId);
function newChar(){ const c=buildBlank(); chars.push(c); activeCharId=c.id; sheetTab='stats'; scheduleSave(); renderChars(); }
function openChar(id){ activeCharId=id; sheetTab='stats'; renderChars(); }
function backToList(){ activeCharId=null; renderChars(); }
function delChar(id){
  const c=getCh(id); if(!c) return;
  if(!confirm('Вырвать лист «'+c.name+'» из летописи? Действие необратимо.')) return;
  chars=chars.filter(x=>x.id!==id); if(activeCharId===id) activeCharId=null;
  scheduleSave(); renderChars();
}
function canLevelUp(c){ return c.level<20 && c.xp>=XP_TABLE[c.level+1]; }
const itemOf=id=>itemsDB.find(x=>x.id===id);
const spellOf=id=>spellsDB.find(x=>x.id===id);
const abilityOf=id=>abilitiesDB.find(x=>x.id===id);

function renderChars(){
  if(typeof fxInvalidate==='function') fxInvalidate();
  const box=document.getElementById('tab-chars');
  if(activeCharId && cc()){ box.innerHTML=sheetHTML(cc()); return; }
  let h='<h2 class="rubric">Действующие лица</h2>'
   +'<div style="text-align:right;margin-bottom:10px"><button class="btn rub" onclick="newChar()">✠ Новый герой</button></div>';
  if(!chars.length){
    h+='<div class="empty-scroll"><span class="big">❦</span>Летопись пуста.<br>Впишите первого героя — и история начнется.</div>';
  } else {
    h+='<div class="grid c2">';
    chars.forEach(c=>{
      h+='<div class="card char-card" style="cursor:pointer" onclick="openChar(\''+c.id+'\')">'
       +'<div class="sigil">'+esc((c.name||'?')[0].toUpperCase())+'</div>'
       +'<div class="cc-main"><div class="cc-name">'+esc(c.name)+(canLevelUp(c)?' <span class="lvlup-badge">↑ уровень!</span>':'')+'</div>'
       +'<div class="cc-line">Уровень '+c.level+' · '+esc(c.race)+(c.subrace?' ('+esc(c.subrace)+')':'')+' '+esc(c.cls)+(c.subcls?' · '+esc(c.subcls):'')+'</div>'
       +'<div class="cc-line">Хиты '+c.hp+' / '+c.hpMax+' · КД '+acTotal(c)+' · опыт '+c.xp+'</div></div>'
       +'<button class="del-x" onclick="event.stopPropagation();delChar(\''+c.id+'\')">✕</button></div>';
    });
    h+='</div>';
  }
  box.innerHTML=h;
}
function raceOpts(sel){ return racesDB.map(r=>'<option'+(r.n===sel?' selected':'')+'>'+r.n+'</option>').join(''); }
function subraceOpts(race,sel){
  const r=racesDB.find(x=>x.n===race);
  let h='<option value=""'+(!sel?' selected':'')+'>—</option>';
  if(r) r.subs.forEach(s=>{ h+='<option'+(s.n===sel?' selected':'')+'>'+s.n+'</option>'; });
  return h;
}
function clsOpts(sel){ return classesDB.map(c=>'<option'+(c.n===sel?' selected':'')+'>'+c.n+'</option>').join(''); }
function bgOpts(sel){ return '<option value=""'+(!sel?' selected':'')+'>—</option>'+BACKGROUNDS.map(b=>'<option'+(b.n===sel?' selected':'')+'>'+b.n+'</option>').join(''); }
function alignOpts(sel){ return ALIGNMENTS.map(a=>'<option'+(a===sel?' selected':'')+'>'+a+'</option>').join(''); }
const classOf=c=>classesDB.find(x=>x.n===c.cls)||classesDB[0]||CLASSES_SEED[0];

function updC(key,val){ const c=cc(); if(!c) return; c[key]=val; scheduleSave(); }
function updNum(key,val){ const c=cc(); if(!c) return; c[key]=+val||0; scheduleSave(); }
function setRace(v){ const c=cc(); if(!c) return; c.race=v; c.subrace='';
  const r=racesDB.find(x=>x.n===v); if(r&&r.sp) c.speed=r.sp;
  scheduleSave(); renderChars(); }
function setLevel(v){ const c=cc(); if(!c) return; c.level=Math.max(1,Math.min(20,+v||1)); scheduleSave(); renderChars(); }
function setXp(v){ const c=cc(); if(!c) return; c.xp=Math.max(0,+v||0); scheduleSave(); renderChars(); }
function hpDelta(d){ const c=cc(); if(!c) return;
  if(d<0 && c.hpTemp>0){ const useTemp=Math.min(c.hpTemp,-d); c.hpTemp-=useTemp; d+=useTemp; }
  c.hp=Math.max(0,Math.min(c.hpMax,(+c.hp||0)+d)); scheduleSave(); renderChars(); }
function toggleInspiration(){ const c=cc(); if(!c) return; c.inspiration=!c.inspiration; scheduleSave(); renderChars(); }
function levelUp(){
  const c=cc(); if(!c||c.level>=20) return;
  c.level++;
  classOf(c).lv.filter(x=>x[0]===c.level).forEach(x=>{
    const fn=x[1];
    let db=abilitiesDB.find(a=>a.type==='class'&&a.source===c.cls&&a.n===fn);
    if(!db){ db={id:'ab_'+uid(), n:fn, type:'class', source:c.cls, custom:true, tags:['classfeature'], uses:null, rest:'',
      x:'Черта класса «'+c.cls+'», получена на '+c.level+' уровне. Опишите ее в своде способностей.'}; abilitiesDB.push(db); }
    if(!c.abilities.some(a=>a.abilityId===db.id)) c.abilities.push({abilityId:db.id, cur:null, notes:''});
  });
  c.hpPend=true; scheduleSave(); renderChars();
}
function applyHp(){
  const c=cc(); if(!c) return;
  const v=+document.getElementById('hpGain').value||0;
  c.hpMax=Math.max(1,(+c.hpMax||0)+v); c.hp=Math.min(c.hpMax,(+c.hp||0)+v);
  c.hpPend=false; scheduleSave(); renderChars();
}
function addRaceTraitsToChar(){
  const c=cc(); if(!c) return;
  const r=racesDB.find(x=>x.n===c.race); if(!r) return;
  r.tr.forEach(tr=>{
    const name=tr.split(':')[0].trim()+' ('+r.n+')';
    let db=abilitiesDB.find(a=>a.n===name);
    if(!db){ db={id:'ab_'+uid(), n:name, type:'racial', source:r.n, custom:false, tags:['racial','passive'], uses:null, rest:'', x:tr}; abilitiesDB.push(db); }
    if(!c.abilities.some(a=>a.abilityId===db.id)) c.abilities.push({abilityId:db.id, cur:null, notes:''});
  });
  scheduleSave(); sheetTab='abilities'; renderChars();
}
function setSheetTab(t){ sheetTab=t; renderChars(); }

function sheetHTML(c){

  let h='<div class="row-line" style="margin-bottom:8px"><button class="btn ghost sm" onclick="backToList()">← К списку героев</button>'
   +'<span class="grow"></span>'
   +(canLevelUp(c)?'<button class="btn rub" onclick="levelUp()">↑ Взять '+(c.level+1)+'-й уровень</button>':'')
   +'<button class="del-x" title="Удалить героя" onclick="delChar(\''+c.id+'\')">✕</button></div>';
  /* шапка: имя и происхождение */
  h+='<div class="panel"><div class="sheet-head">'
   +'<div style="flex:2;min-width:200px"><label class="lbl">Имя героя</label><input style="width:100%;font-family:var(--disp);font-size:26px;color:var(--rubric)" value="'+esc(c.name)+'" oninput="updC(\'name\',this.value)"></div>'
   +'<div><label class="lbl">Народ</label><select onchange="setRace(this.value)">'+raceOpts(c.race)+'</select></div>'
   +'<div><label class="lbl">Ветвь народа</label><select onchange="updC(\'subrace\',this.value)">'+subraceOpts(c.race,c.subrace)+'</select></div>'
   +'<div><label class="lbl">Призвание</label><select onchange="updC(\'cls\',this.value);renderChars()">'+clsOpts(c.cls)+'</select></div>'
   +'<div><label class="lbl">Традиция / архетип</label><input style="width:130px" value="'+esc(c.subcls)+'" placeholder="Универсалист…" oninput="updC(\'subcls\',this.value)"></div>'
   +'<div><label class="lbl">Предыстория</label><select onchange="updC(\'bg\',this.value)">'+bgOpts(c.bg)+'</select></div>'
   +'<div><label class="lbl">Мировоззрение</label><select onchange="updC(\'align\',this.value)">'+alignOpts(c.align)+'</select></div>'
   +'<div><label class="lbl">Уровень</label><input type="number" min="1" max="20" style="width:64px" value="'+c.level+'" onchange="setLevel(this.value)"></div>'
   +'<div><label class="lbl">Опыт</label><input type="number" min="0" style="width:90px" value="'+c.xp+'" onchange="setXp(this.value)">'
   +(c.level<20?'<div style="font-size:12px;color:var(--ink-faint)">до '+(c.level+1)+' ур.: '+XP_TABLE[c.level+1]+'</div>':'')+'</div>'
   +'</div>';
  if(c.hpPend) h+='<div class="row-line" style="background:var(--parch-2);border:1px dashed var(--rubric);padding:8px 10px;margin-bottom:8px">'
   +'<span>Новый уровень! Бросьте кость хитов ('+esc(c.hitDice||'—')+') и впишите прибавку к хитам (кость + модификатор Телосложения '+fmtMod(mod(c.ab.con))+'):</span>'
   +'<input type="number" id="hpGain" style="width:70px"><button class="btn rub sm" onclick="applyHp()">Вписать</button></div>';
  /* боевые показатели */
  h+='<div class="combat-grid">'
   +'<div class="cbox"><div class="cl">♥ Хиты</div><div class="hp-wide"><input type="number" value="'+c.hp+'" onchange="updNum(\'hp\',this.value);renderChars()"> / <input type="number" value="'+c.hpMax+'" onchange="updNum(\'hpMax\',this.value);renderChars()"></div>'
   +'<div class="hp-btns" style="justify-content:center"><button class="mini-btn" onclick="hpDelta(-5)">−5</button><button class="mini-btn" onclick="hpDelta(-1)">−1</button><button class="mini-btn" onclick="hpDelta(1)">+1</button><button class="mini-btn" onclick="hpDelta(5)">+5</button></div>'
   +((fxSum(c,'hpmax')||fxSum(c,'hp'))?('<div class="fx-line '+((fxSum(c,'hpmax')+fxSum(c,'hp'))>=0?'fx-plus':'fx-minus')+'">✦ с эффектами макс. '+eHpMax(c)+(fxSum(c,'hp')?' · к текущим +'+fxSum(c,'hp'):'')+' · '+fxParts(c,'hpmax').concat(fxParts(c,'hp')).map(p=>esc(p.label)).filter((v,i,a)=>a.indexOf(v)===i).join(', ')+'</div>'):'')
   +'</div>'
   +'<div class="cbox"><div class="cl">Врем. хиты</div><input type="number" value="'+c.hpTemp+'" onchange="updNum(\'hpTemp\',this.value)"></div>'
   +'<div class="cbox"><div class="cl">🛡 Класс доспеха</div><div class="cv">'+acTotal(c)+'</div>'
   +'<div class="cb-sub">авто '+acAuto(c)+' · <input class="ovr" type="text" placeholder="свой" value="'+(c.acOverride!=null?c.acOverride:'')+'" onchange="setAcOverride(this.value)"></div></div>'
   +'<div class="cbox"><div class="cl">⚡ Инициатива</div><button class="cv roll" title="Бросить инициативу" onclick="rollCheck(\'Инициатива\','+initTotal(c)+')">⚁ '+fmtMod(initTotal(c))+'</button>'
   +'<div class="cb-sub">Лов '+fmtMod(mod(c.ab.dex))+' · доп. <input class="ovr" type="number" value="'+(+c.initB||0)+'" onchange="setInitB(this.value)"></div></div>'
   +'<div class="cbox"><div class="cl">Скорость</div><input type="text" value="'+esc(c.speed)+'" onchange="updC(\'speed\',this.value)"></div>'
   +'<div class="cbox"><div class="cl">✦ Бонус мастерства</div><div class="cv">'+fmtMod(prof)+'</div></div>'
   +'<div class="cbox"><div class="cl">Кости хитов · к'+(classOf(c).hd||8)+'</div><div class="cv">'+(c.level-(+c.hdUsed||0))+' / '+c.level+'</div>'
   +'<div class="cb-sub"><button class="mini-btn" title="Потратить кость: лечит бросок + Тел" onclick="spendHitDie()">⚁ потратить</button><button class="mini-btn" onclick="returnHitDie()">+</button></div></div>'
   +'<div class="cbox"><div class="cl">👁 Пасс. Внимательность</div><div class="cv">'+passivePerc(c)+'</div></div>'
   +'<div class="cbox" style="cursor:pointer" onclick="toggleInspiration()"><div class="cl">Вдохновение</div><div class="cv">'+(c.inspiration?'☀':'—')+'</div></div>'
   +'</div>'
   +'<div class="row-line" style="margin-top:8px"><button class="btn ghost sm" onclick="shortRest()">☕ Короткий отдых</button>'
   +'<button class="btn ghost sm" onclick="longRest()">☾ Долгий отдых</button>'
   +'<span class="note-ital" style="font-size:13px">Короткий: способности и траты костей хитов · Долгий: хиты, ячейки, способности, половина костей</span></div></div>';
  /* подвкладки */
  const tabs=[['stats','Характеристики'],['inventory','Инвентарь'],['equipment','Экипировка'],['spells','Заклинания'],['abilities','Способности'],['notes','Записи']];
  h+='<div class="subtabs">'+tabs.map(t=>'<button class="subtab'+(sheetTab===t[0]?' active':'')+'" onclick="setSheetTab(\''+t[0]+'\')">'+t[1]+'</button>').join('')+'</div>';
  if(sheetTab==='stats') h+=stStats(c);
  else if(sheetTab==='inventory') h+=stInventory(c);
  else if(sheetTab==='equipment') h+=stEquipment(c);
  else if(sheetTab==='spells') h+=stSpells(c);
  else if(sheetTab==='abilities') h+=stAbilities(c);
  else h+=stNotes(c);
  return h;
}

/* ── Подвкладка: Характеристики ── */
function abDelta(k,d){ const c=cc(); if(!c) return; c.ab[k]=Math.max(1,Math.min(30,(+c.ab[k]||10)+d)); scheduleSave(); renderChars(); }
function toggleSaveProf(k){ const c=cc(); if(!c) return; c.saves[k]=!c.saves[k]; scheduleSave(); renderChars(); }
function cycleSkillProf(i){ const c=cc(); if(!c) return; const n=SKILLS[i][0];
  if(!c.skills[n]) c.skills[n]={p:0,m:null};
  c.skills[n].p=(c.skills[n].p+1)%3; scheduleSave(); renderChars(); }
function editSkillBonus(i){
  const c=cc(); if(!c) return; const n=SKILLS[i][0];
  if(!c.skills[n]) c.skills[n]={p:0,m:null};
  const cur=c.skills[n].m;
  const v=prompt('Ручной бонус для «'+n+'» (оставьте пустым для автоматического расчета):', cur==null?'':cur);
  if(v===null) return;
  c.skills[n].m = v.trim()==='' ? null : (parseInt(v,10)||0);
  scheduleSave(); renderChars();
}
function skillBonus(c,i){
  const sk=SKILLS[i]; const rec=c.skills[sk[0]]||{p:0,m:null};
  const fxb=(typeof fxSkillBonus==='function')?fxSkillBonus(c,sk[0]):0;
  if(rec.m!=null) return {v:rec.m+fxb, manual:true, p:rec.p, fxb};
  return {v:eMod(c,sk[1])+rec.p*PROF[c.level]+fxb, manual:false, p:rec.p, fxb};
}
function setExhaustion(v){ const c=cc(); if(!c) return; c.exhaustion=Math.max(0,Math.min(6,+v||0)); scheduleSave(); renderChars(); }
function toggleCond(n){ const c=cc(); if(!c) return;
  const i=c.cond.indexOf(n); if(i>=0) c.cond.splice(i,1); else c.cond.push(n);
  scheduleSave(); renderChars(); }
function setDeath(k,i,on){ const c=cc(); if(!c) return; c.deaths[k]=on?i:i-1; scheduleSave(); renderChars(); }

function stStats(c){
  let h='<div class="panel"><h3 class="rubric" style="font-size:22px">Характеристики</h3><div class="ab-grid">';
  AB_KEYS.forEach(k=>{
    const fxab=fxSum(c,'ab.'+k);
    h+='<div class="ab-card"><div class="abn">'+AB_FULL[k]+'</div><div class="abv">'+(fxab?('<span class="fx-plus">'+eAb(c,k)+'</span>'):c.ab[k])+'</div>'
     +'<button class="abm roll" title="Проверка характеристики" onclick="rollCheck(\''+AB_FULL[k]+'\','+eMod(c,k)+')">⚁ '+fmtMod(eMod(c,k))+'</button>'
     +(fxab?'<div class="fx-line '+(fxab>0?'fx-plus':'fx-minus')+'">✦ '+(fxab>0?'+':'')+fxab+' · '+fxParts(c,'ab.'+k).map(p=>esc(p.label)).join(', ')+'</div>':'')
     +'<div class="mini"><button class="mini-btn" onclick="abDelta(\''+k+'\',-1)">−</button><button class="mini-btn" onclick="abDelta(\''+k+'\',1)">+</button></div></div>';
  });
  h+='</div>';
  h+='<h3 class="rubric" style="font-size:22px">Атаки</h3><div class="atk-list">';
  weaponRows(c).forEach(w=>{
    const safeName=esc(w.n).replace(/'/g,'');
    h+='<div class="atk-row"><b class="atk-n">'+esc(w.n)+'</b>'
     +'<span class="atk-ab">'+w.abn+'</span>'
     +'<button class="roll-sm" title="Бросок атаки (учитывает преимущество/помеху)" onclick="rollCheck(\'Атака: '+safeName+'\','+w.atk+')">⚁ атака '+fmtMod(w.atk)+'</button>'
     +'<button class="roll-sm" title="Бросок урона" onclick="rollDmgStr(\''+safeName+'\',\''+esc(w.dmg)+'\','+w.m+')">⚁ урон '+(w.dmg?esc(w.dmg)+' ':'')+fmtMod(w.m)+'</button>'
     +(w.dt?'<span class="atk-dt">'+esc(w.dt)+'</span>':'')+'</div>';
  });
  h+='</div>'+fxLine(c,'atk').replace('✦','✦ к атаке')+fxLine(c,'dmg').replace('✦','✦ к урону')
   +'<p class="note-ital" style="font-size:13px;margin:4px 0 10px">Оружие берется из ячеек рук на вкладке «Экипировка». Фехтовальное и дальнобойное бьет от Ловкости. Бонусы эффектов уже учтены в кнопках бросков.</p>';
  h+='<h3 class="rubric" style="font-size:22px">Спасброски</h3><div class="save-grid">';
  AB_KEYS.forEach(k=>{
    const b=eMod(c,k)+(c.saves[k]?PROF[c.level]:0)+fxSaveBonus(c,k); const sfx=fxSaveBonus(c,k);

  e.qty=Math.max(1,(e.qty||1)+d); scheduleSave(); renderChars(); }
function invDel(entryId){ const c=cc(); const e=c.inventory.find(x=>x.id===entryId); if(!e) return;
  const it=itemOf(e.itemId);
  if(!confirm('Убрать «'+(it?it.n:'предмет')+'» из инвентаря?')) return;
  Object.keys(c.equipment).forEach(s=>{ if(c.equipment[s]===entryId) delete c.equipment[s]; });
  c.inventory=c.inventory.filter(x=>x.id!==entryId); scheduleSave(); renderChars(); }
function invEquipToggle(entryId){
  const c=cc(); const e=c.inventory.find(x=>x.id===entryId); if(!e) return;
  const it=itemOf(e.itemId); if(!it) return;
  if(isEquipped(c,entryId)){
    Object.keys(c.equipment).forEach(s=>{ if(c.equipment[s]===entryId) delete c.equipment[s]; });
  } else {
    if(!it.slot){ alert('У этого предмета нет слота экипировки. Назначьте слот в базе предметов (✎).'); return; }
    const clear=id=>Object.keys(c.equipment).forEach(s=>{ if(c.equipment[s]===id) delete c.equipment[s]; });
    if(it.slot==='TWO_HAND'){ clear(c.equipment.MAIN_HAND); clear(c.equipment.OFF_HAND);
      c.equipment.MAIN_HAND=entryId; c.equipment.OFF_HAND=entryId; }
    else if(it.slot==='RING'){ if(!c.equipment.RING_L) c.equipment.RING_L=entryId;
      else if(!c.equipment.RING_R) c.equipment.RING_R=entryId;
      else { clear(c.equipment.RING_L); c.equipment.RING_L=entryId; } }
    else if(it.slot==='MAIN_HAND'){ const other=c.equipment.MAIN_HAND;
      if(other){ const oit=itemOf((c.inventory.find(x=>x.id===other)||{}).itemId);
        if(oit&&oit.slot==='TWO_HAND') clear(other); }
      c.equipment.MAIN_HAND=entryId; }
    else { c.equipment[it.slot]=entryId; }
  }
  scheduleSave(); renderChars();
}

let selSlot=null;
function pickSlot(s){ selSlot=(selSlot===s)?null:s; renderChars(); }
function equipToSlot(cellId,entryId){
  const c=cc(); const e=c.inventory.find(x=>x.id===entryId); if(!e) return;
  const it=itemOf(e.itemId); if(!it) return;
  const clear=id=>{ if(!id) return; Object.keys(c.equipment).forEach(s=>{ if(c.equipment[s]===id) delete c.equipment[s]; }); };
  clear(entryId);
  if(it.slot==='TWO_HAND'){ clear(c.equipment.MAIN_HAND); clear(c.equipment.OFF_HAND);
    c.equipment.MAIN_HAND=entryId; c.equipment.OFF_HAND=entryId; }
  else { const occ=c.equipment[cellId];
    if(occ){ const oit=itemOf((c.inventory.find(x=>x.id===occ)||{}).itemId);
      if(oit&&oit.slot==='TWO_HAND') clear(occ); else delete c.equipment[cellId]; }
    c.equipment[cellId]=entryId; }
  selSlot=null; scheduleSave(); renderChars();
}
function unequipSlot(cellId){
  const c=cc(); const id=c.equipment[cellId]; if(!id) return;
  Object.keys(c.equipment).forEach(s=>{ if(c.equipment[s]===id) delete c.equipment[s]; });
  scheduleSave(); renderChars();
}

function slotGem(lv,i){
  const c=cc(); const s=c.slots[lv]; if(!s) return;
  /* клик по камню: потратить до этого камня или восстановить */
  s.cur = (i<=s.cur) ? i-1 : i;
  s.cur=Math.max(0,Math.min(s.max,s.cur));
  scheduleSave(); renderChars();
}
function setSlotMax(lv){
  const c=cc(); const cur=(c.slots[lv]||{max:0}).max;
  const v=prompt('Число ячеек '+lv+' круга (0 — убрать):', cur);
  if(v===null) return;
  const m=Math.max(0,Math.min(9,+v||0));
  if(m===0) delete c.slots[lv];
  else c.slots[lv]={max:m, cur:Math.min(m,(c.slots[lv]||{cur:m}).cur)};
  scheduleSave(); renderChars();
}
function suggestSlots(){
  const c=cc(); if(!c) return;
  const row=FULL_SLOTS[c.level]||[];
  c.slots={}; row.forEach((m,i)=>{ if(m>0) c.slots[i+1]={max:m,cur:m}; });
  scheduleSave(); renderChars();
}
function longRest(){
  const c=cc(); if(!c) return;
  Object.keys(c.slots).forEach(l=>{ c.slots[l].cur=c.slots[l].max; });
  c.abilities.forEach(a=>{ const db=abilityOf(a.abilityId); if(db&&db.uses!=null) a.cur=db.uses; });
  c.hp=c.hpMax; c.hpTemp=0; c.exhaustion=Math.max(0,c.exhaustion-1); c.deaths={s:0,f:0};
  c.hdUsed=Math.max(0,(+c.hdUsed||0)-Math.max(1,Math.ceil(c.level/2)));   /* возвращается половина костей хитов */

}

    const inBook=new Set(c.spellbook.map(x=>x.spellId));
    const hits=spellsDB.filter(sp=>sp.n.toLowerCase().includes(q)&&!inBook.has(sp.id)).slice(0,10);
    h+=hits.length?hits.map(sp=>'<div class="spell-hit" onclick="addSpellFromDB(\''+sp.id+'\')"><span><b>'+esc(sp.n)+'</b> <span style="font-size:13px;color:var(--ink-faint)">'+(sp.l===0?'заговор':sp.l+' круг')+', '+esc(sp.s)+'</span></span><span style="color:var(--gold)">+ вписать</span></div>').join('')
      :'<p class="note-ital" style="font-size:14px">В гримуаре мира такого нет — создайте свое.</p>';
  }
  if(quickForm.sp){
    h+='<div class="editor"><h3>Быстрое создание заклинания</h3><div class="f-grid">'
     +'<div><label>Название</label><input type="text" id="qsN"></div>'
     +'<div><label>Круг (0 = заговор)</label><input type="number" id="qsL" min="0" max="9" value="0"></div>'
     +'<div><label>Школа</label><select id="qsS">'+SPELL_SCHOOLS.map(s=>'<option>'+s+'</option>').join('')+'</select></div>'
     +'<div><label>Время</label><input type="text" id="qsT" value="1 действие"></div>'
     +'<div><label>Дистанция</label><input type="text" id="qsR"></div>'
     +'<div><label>Компоненты</label><input type="text" id="qsCm" value="В, С"></div>'
     +'<div><label>Длительность</label><input type="text" id="qsD" value="Мгновенная"></div></div>'
     +'<label style="display:inline-flex;gap:6px;align-items:center"><input type="checkbox" id="qsConc"> Концентрация</label>'
     +'<label>Описание</label><textarea id="qsX"></textarea>'
     +'<button class="btn rub" onclick="quickAddSpell()">Создать и вписать</button> '
     +'<button class="btn ghost" onclick="quickForm.sp=false;renderChars()">Отменить</button>'
     +'<p class="note-ital" style="font-size:13px;margin-top:6px">Ярлыки и «На больших уровнях» — в полной форме на вкладке «Заклинания».</p></div>';
  }
  /* фильтры книги */
  h+='<div class="db-bar" style="margin-top:8px">'
   +'<input type="text" placeholder="Поиск в книге героя…" value="'+esc(bookFlt.q)+'" oninput="bookFlt.q=this.value;renderChars();const fs=document.querySelectorAll(\'#tab-chars .db-bar input\');const f=fs[fs.length-1];if(f){f.focus();f.setSelectionRange(f.value.length,f.value.length)}">'
   +'<select onchange="bookFlt.l=this.value;renderChars()"><option value="">Все круги</option><option value="0"'+(bookFlt.l==='0'?' selected':'')+'>Заговоры</option>'
   +[1,2,3,4,5,6,7,8,9].map(l=>'<option value="'+l+'"'+(bookFlt.l===String(l)?' selected':'')+'>'+l+' круг</option>').join('')+'</select>'
   +'<select onchange="bookFlt.prep=this.value;renderChars()"><option value="">Все</option>'
   +'<option value="1"'+(bookFlt.prep==='1'?' selected':'')+'>Подготовленные</option>'
   +'<option value="0"'+(bookFlt.prep==='0'?' selected':'')+'>Неподготовленные</option></select></div>';
  /* книга по кругам */
  const entries=c.spellbook.map(e=>({e, sp:spellOf(e.spellId)})).filter(x=>x.sp)
    .filter(x=>(!bookFlt.q||x.sp.n.toLowerCase().includes(bookFlt.q.toLowerCase()))
      &&(bookFlt.l===''||x.sp.l===+bookFlt.l)
      &&(bookFlt.prep===''||(bookFlt.prep==='1')===(x.sp.l===0?true:!!x.e.prep)))
    .sort((a,b)=>a.sp.l-b.sp.l||a.sp.n.localeCompare(b.sp.n,'ru'));
  if(!entries.length){ h+='<div class="empty-scroll"><span class="big">❦</span>Книга заклинаний пуста.</div>'; return h+'</div>'; }
  let lastL=-1;
  entries.forEach(x=>{
    if(x.sp.l!==lastL){ lastL=x.sp.l;
      h+='<h3 class="rubric" style="font-size:21px;margin-top:12px">'+(lastL===0?'Заговоры':lastL+' круг')+'</h3>'; }
    const extra='<button class="btn ghost sm fx-cast" title="Наложить эффект на героя или союзника" onclick="castSpellFx(\''+x.sp.id+'\',\''+c.id+'\')">⚡ Наложить</button>'
     +(x.sp.l>0?'<button class="btn ghost sm prep-btn'+(x.e.prep?' on':'')+'" onclick="togglePrep(\''+x.sp.id+'\')">'+(x.e.prep?'Подготовлено ✓':'Подготовить')+'</button>':'')
     +'<button class="btn ghost sm" title="Править в гримуаре мира" onclick="switchTab(\'spellsdb\');openSpellEd(\''+x.sp.id+'\')">✎</button>'
     +'<button class="del-x" title="Вычеркнуть из книги героя" onclick="delBookSpell(\''+x.sp.id+'\')">✕</button>';
    h+=spellCardHTML(x.sp, extra);
  });
  return h+'</div>';
}

/* ── Подвкладка: Способности ── */
const abFlt={cat:'all',q:''};
function addAbilityFromDB(abilityId){
  const c=cc(); if(!c) return;
  if(!c.abilities.some(x=>x.abilityId===abilityId)){
    const db=abilityOf(abilityId);
    c.abilities.push({abilityId, cur:db&&db.uses!=null?db.uses:null, notes:''});
  }
  sheetSearch.ab=''; scheduleSave(); renderChars();
}
function delCharAbility(abilityId){ const c=cc(); if(!c) return;
  c.abilities=c.abilities.filter(x=>x.abilityId!==abilityId); scheduleSave(); renderChars(); }
function abilityUse(abilityId,d){
  const c=cc(); const e=c.abilities.find(x=>x.abilityId===abilityId); const db=abilityOf(abilityId);
  if(!e||!db||db.uses==null) return;
  if(e.cur==null) e.cur=db.uses;
  e.cur=Math.max(0,Math.min(db.uses,e.cur+d)); scheduleSave(); renderChars();
}
function quickAddAbility(){
  const g=id=>document.getElementById(id);
  const n=g('qaN').value.trim(); if(!n){ alert('Способности нужно имя.'); return; }
  const uv=g('qaUses').value;
  const ab={id:'ab_'+uid(), n, type:g('qaT').value, source:g('qaSrc').value.trim(), custom:true, tags:[],
    uses:uv===''?null:Math.max(0,+uv||0), rest:g('qaRest').value, x:g('qaX').value};
  abilitiesDB.push(ab);
  cc().abilities.push({abilityId:ab.id, cur:ab.uses, notes:''});
  quickForm.ab=false; scheduleSave(); renderChars();
}
function stAbilities(c){
  let h='<div class="panel">';
  const cats=[['all','Все способности'],['class','Классовые'],['racial','Расовые'],['feat','Черты'],['other','Прочие']];
  h+='<div class="subtabs" style="margin-top:0">'+cats.map(x=>'<button class="subtab'+(abFlt.cat===x[0]?' active':'')+'" onclick="abFlt.cat=\''+x[0]+'\';renderChars()">'+x[1]+'</button>').join('')+'</div>';
  h+='<div class="db-bar"><input type="text" placeholder="Найти способность в своде мира и вписать герою…" value="'+esc(sheetSearch.ab)+'" oninput="sheetSearch.ab=this.value;renderChars();const f=document.querySelector(\'#tab-chars .db-bar input\');if(f){f.focus();f.setSelectionRange(f.value.length,f.value.length)}">'
   +'<button class="btn ghost sm" onclick="quickForm.ab=!quickForm.ab;renderChars()">✚ Свое</button>'
   +'<button class="btn ghost sm" onclick="addRaceTraitsToChar()">Вписать черты народа</button></div>';
  if(sheetSearch.ab.trim().length>1){
    const q=sheetSearch.ab.toLowerCase();
    const has=new Set(c.abilities.map(x=>x.abilityId));
    const hits=abilitiesDB.filter(ab=>ab.n.toLowerCase().includes(q)&&!has.has(ab.id)).slice(0,10);
    h+=hits.length?hits.map(ab=>'<div class="spell-hit" onclick="addAbilityFromDB(\''+ab.id+'\')"><span><b>'+esc(ab.n)+'</b> <span style="font-size:13px;color:var(--ink-faint)">'+esc(ABILITY_TYPES[ab.type]||'')+(ab.source?', '+esc(ab.source):'')+'</span></span><span style="color:var(--gold)">+ вписать</span></div>').join('')
      :'<p class="note-ital" style="font-size:14px">В своде мира такого нет — создайте свое.</p>';
  }
  if(quickForm.ab){
    h+='<div class="editor"><h3>Быстрое создание способности</h3><div class="f-grid">'
     +'<div><label>Название</label><input type="text" id="qaN"></div>'
     +'<div><label>Вид</label><select id="qaT">'+Object.keys(ABILITY_TYPES).map(t=>'<option value="'+t+'">'+ABILITY_TYPES[t]+'</option>').join('')+'</select></div>'
     +'<div><label>Источник</label><input type="text" id="qaSrc"></div>'
     +'<div><label>Использований (пусто — без счета)</label><input type="number" id="qaUses" min="0"></div>'
     +'<div><label>Восстановление</label><select id="qaRest"><option value="">—</option><option>короткий отдых</option><option>длинный отдых</option><option>раз в день</option><option>особое</option></select></div></div>'
     +'<label>Описание</label><textarea id="qaX"></textarea>'
     +'<button class="btn rub" onclick="quickAddAbility()">Создать и вписать</button> '
     +'<button class="btn ghost" onclick="quickForm.ab=false;renderChars()">Отменить</button></div>';
  }
  const groups=[['racial','Расовые черты'],['class','Классовые способности'],['feat','Черты'],['other','Особые']];
  let shown=0;
  groups.forEach(gr=>{
    if(abFlt.cat!=='all'&&abFlt.cat!==gr[0]) return;
    const list=c.abilities.map(e=>({e, ab:abilityOf(e.abilityId)})).filter(x=>x.ab&&x.ab.type===gr[0])
      .sort((a,b)=>a.ab.n.localeCompare(b.ab.n,'ru'));
    if(!list.length) return;
    h+='<h3 class="rubric" style="font-size:22px;margin-top:12px">'+gr[1]+'</h3>';
    list.forEach(x=>{
      let uses='';
      if(x.ab.uses!=null){
        const cur=x.e.cur==null?x.ab.uses:x.e.cur;
        uses='<span class="uses-box"><button class="mini-btn" onclick="abilityUse(\''+x.ab.id+'\',-1)">−</button>'
          +cur+' / '+x.ab.uses+'<button class="mini-btn" onclick="abilityUse(\''+x.ab.id+'\',1)">+</button>'
          +(x.ab.rest?'<span style="font-style:italic">'+esc(x.ab.rest)+'</span>':'')+'</span>';
      }
      const hasFx=recFx(x.ab,'ability').length>0;
      const fxBtn=(!isPassiveAbility(x.ab)&&hasFx)
        ?'<button class="btn ghost sm fx-cast'+(abilityFxActive(c,x.ab.id)?' on':'')+'" title="Применить эффект к герою / снять" onclick="toggleAbilityFx(\''+x.ab.id+'\')">'+(abilityFxActive(c,x.ab.id)?'✦ Действует':'✦ Применить')+'</button>':'';
      const extra=fxBtn+uses
       +'<button class="btn ghost sm" title="Править в своде мира" onclick="switchTab(\'abilitiesdb\');openAbilityEd(\''+x.ab.id+'\')">✎</button>'
       +'<button class="del-x" onclick="delCharAbility(\''+x.ab.id+'\')">✕</button>';
      h+=abilityCardHTML(x.ab, extra);
      shown++;
    });
  });
  if(!shown) h+='<div class="empty-scroll"><span class="big">❦</span>Здесь пока пусто.</div>';
  return h+'</div>';
}

/* ── Подвкладка: Записи ── */
function stNotes(c){
  return '<div class="panel"><div class="f-grid">'
   +'<div><label class="lbl">Игрок</label><input type="text" value="'+esc(c.player)+'" oninput="updC(\'player\',this.value)"></div>'
   +'<div><label class="lbl">Языки</label><input type="text" value="'+esc(c.langs)+'" oninput="updC(\'langs\',this.value)"></div></div>'
   +'<h3 class="rubric" style="font-size:20px;margin-top:12px">Характер героя</h3><div class="persona-grid">'
   +[['tr','Черты характера','Вежлив, но недоверчив к незнакомцам…'],['id','Идеалы','Знание — путь к силе…'],['bd','Привязанности','Библиотека Огмы — мой дом…'],['fl','Слабости','Не могу устоять перед древним фолиантом…'],['ap','Внешность','Высокий эльф с серебристыми волосами…']].map(p=>
     '<div><label class="lbl">'+p[1]+'</label><textarea rows="2" placeholder="'+p[2]+'" oninput="updPersona(\''+p[0]+'\',this.value)">'+esc((c.persona||{})[p[0]]||'')+'</textarea></div>').join('')
   +'</div>'
   +'<label class="lbl">Заметки мастера и история героя</label>'
   +'<textarea style="width:100%;min-height:220px" oninput="updC(\'notes\',this.value)" placeholder="Все, что должно остаться в летописи…">'+esc(c.notes)+'</textarea></div>';
}

  renderRaces(); renderClasses(); renderRules();

  if(typeof syncAutoStart==='function') syncAutoStart();
})();
