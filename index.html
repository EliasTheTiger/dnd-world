<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D World — Развитие персонажей</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --parch:#efe3c2; --parch-2:#e6d4a8; --parch-3:#dcc794; --sheet:#f4ead0;
  --ink:#2b1d10; --ink-soft:#5c452c; --ink-faint:#8a7250;
  --rubric:#7d1f16; --rubric-dk:#5e150e;
  --gold:#96762c; --gold-lt:#c9a84c;
  --frame:#7a5c33; --frame-dk:#513c1e;
  --wax:#8e2318; --wax-dk:#5f130c;
  --ok:#3f6b34;
  --serif:'Cormorant Garamond',Georgia,'Times New Roman',serif;
  --disp:'IM Fell English SC','Cormorant Garamond',Georgia,serif;
  --fell:'IM Fell English','Cormorant Garamond',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-color:var(--frame) var(--parch-2)}
body{
  font-family:var(--serif);font-weight:500;font-size:17px;line-height:1.45;color:var(--ink);
  background:
    radial-gradient(ellipse at 20% 10%, rgba(255,250,230,.55), transparent 55%),
    radial-gradient(ellipse at 85% 90%, rgba(120,85,40,.18), transparent 60%),
    radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0), rgba(60,40,15,.22) 140%),
    var(--parch);
  min-height:100vh;padding:14px 10px 40px;
}
::selection{background:var(--gold-lt);color:var(--ink)}
.wrap{max-width:1180px;margin:0 auto}

/* ── Шапка ── */
.masthead{
  position:relative;text-align:center;padding:26px 16px 18px;
  border:3px double var(--frame);outline:1px solid var(--frame-dk);outline-offset:4px;
  background:linear-gradient(180deg,rgba(255,248,225,.5),rgba(190,160,105,.18)),var(--parch-2);
  box-shadow:0 3px 14px rgba(60,40,10,.25), inset 0 0 60px rgba(120,85,40,.18);
  margin-bottom:18px;
}
.masthead .corner{position:absolute;font-size:22px;color:var(--gold);line-height:1}
.corner.tl{top:6px;left:10px}.corner.tr{top:6px;right:10px}
.corner.bl{bottom:6px;left:10px}.corner.br{bottom:6px;right:10px}
h1.title{
  font-family:var(--disp);font-weight:400;font-size:clamp(28px,4.6vw,46px);
  letter-spacing:.06em;color:var(--rubric);text-shadow:0 1px 0 rgba(255,245,215,.7);
}
.subtitle{font-family:var(--fell);font-style:italic;font-size:18px;color:var(--ink-soft);margin-top:2px}
.rule-flourish{display:flex;align-items:center;gap:12px;justify-content:center;margin:10px auto 0;max-width:520px;color:var(--gold)}
.rule-flourish::before,.rule-flourish::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* ── Панель костей и утилит ── */
.toolrow{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;margin-top:14px}
.dicebox{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:6px 10px;border:1px solid var(--frame);background:rgba(255,248,225,.45)}
.dicebox .lbl{font-family:var(--disp);font-size:14px;color:var(--ink-soft);margin-right:2px}
.die{
  font-family:var(--disp);font-size:15px;min-width:44px;padding:4px 8px;cursor:pointer;
  color:var(--sheet);background:linear-gradient(180deg,#8a6a3a,#5f4520);
  border:1px solid var(--frame-dk);box-shadow:inset 0 1px 0 rgba(255,235,190,.4),0 2px 3px rgba(50,30,5,.35);
}
.die:hover{background:linear-gradient(180deg,#9b7a45,#6d5228)}
.die:active{transform:translateY(1px)}
#diceOut{font-family:var(--fell);font-style:italic;min-width:120px;color:var(--rubric);font-size:17px}
.util-btns{display:flex;gap:6px}

/* ── Навигация-закладки ── */
nav.tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:0;padding:0 12px}
.tab{
  font-family:var(--disp);font-size:16px;letter-spacing:.04em;cursor:pointer;
  padding:8px 16px 10px;border:1px solid var(--frame);border-bottom:none;
  background:linear-gradient(180deg,var(--parch-2),var(--parch-3));color:var(--ink-soft);
  clip-path:polygon(6px 0,calc(100% - 6px) 0,100% 100%,0 100%);
  position:relative;top:1px;
}
.tab:hover{color:var(--rubric)}
.tab.active{
  background:linear-gradient(180deg,var(--sheet),var(--parch));color:var(--rubric);
  font-weight:400;box-shadow:0 -2px 6px rgba(90,60,20,.2);
}

/* ── Основной лист ── */
main.leaf{
  border:3px double var(--frame);
  background:
    radial-gradient(ellipse at 8% 4%, rgba(150,110,55,.10), transparent 40%),
    radial-gradient(ellipse at 94% 96%, rgba(150,110,55,.12), transparent 40%),
    linear-gradient(180deg,rgba(255,250,232,.5),rgba(205,175,120,.14)),
    var(--sheet);
  box-shadow:0 4px 18px rgba(60,40,10,.28), inset 0 0 80px rgba(130,95,45,.14);
  padding:22px 24px 30px;min-height:60vh;
}
@media(max-width:640px){main.leaf{padding:14px 10px 22px}}

/* ── Рубрики ── */
h2.rubric{
  font-family:var(--disp);font-weight:400;font-size:clamp(22px,3vw,30px);color:var(--rubric);
  display:flex;align-items:center;gap:14px;margin:4px 0 14px;
}
h2.rubric::before,h2.rubric::after{content:"";flex:1;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
h3.sub{
  font-family:var(--disp);font-weight:400;font-size:19px;color:var(--ink);
  border-bottom:1px solid var(--gold);padding-bottom:3px;margin:18px 0 10px;letter-spacing:.03em;
}
h3.sub .fl{color:var(--gold);margin-right:6px}
.note-ital{font-family:var(--fell);font-style:italic;color:var(--ink-soft)}

/* ── Кнопки ── */
.btn{
  font-family:var(--disp);font-size:15px;letter-spacing:.03em;cursor:pointer;padding:7px 16px;
  color:var(--sheet);background:linear-gradient(180deg,#8a6a3a,#5f4520);
  border:1px solid var(--frame-dk);box-shadow:inset 0 1px 0 rgba(255,235,190,.4),0 2px 3px rgba(50,30,5,.3);
}
.btn:hover{background:linear-gradient(180deg,#9b7a45,#6d5228)}
.btn:active{transform:translateY(1px)}
.btn.rub{background:linear-gradient(180deg,#8e2c20,#63160d);border-color:#4a0f08}
.btn.rub:hover{background:linear-gradient(180deg,#a13527,#742015)}
.btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--frame);box-shadow:none}
.btn.ghost:hover{color:var(--rubric);border-color:var(--rubric)}
.btn.sm{font-size:13px;padding:3px 10px}
.btn.xs{font-size:12px;padding:1px 8px}

/* ── Поля ввода ── */
input,select,textarea{
  font-family:var(--serif);font-weight:500;font-size:16px;color:var(--ink);
  background:rgba(255,251,238,.75);border:1px solid var(--frame);padding:5px 8px;
  box-shadow:inset 0 1px 3px rgba(90,60,20,.18);
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold-lt);outline-offset:1px}
input[type=number]{width:74px;text-align:center}
input[type=checkbox]{width:17px;height:17px;accent-color:var(--rubric);box-shadow:none;cursor:pointer}
textarea{width:100%;min-height:90px;resize:vertical;line-height:1.4}
label.f{display:flex;flex-direction:column;gap:3px;font-size:13px;color:var(--ink-soft)}
label.f b{font-family:var(--disp);font-weight:400;letter-spacing:.05em;font-size:12.5px;text-transform:uppercase}

/* ── Таблицы ── */
table.ms{width:100%;border-collapse:collapse;margin:8px 0 16px;font-size:15.5px}
table.ms th{
  font-family:var(--disp);font-weight:400;letter-spacing:.05em;font-size:14px;text-align:left;
  color:var(--sheet);background:linear-gradient(180deg,#7a5c33,#513c1e);padding:6px 9px;border:1px solid var(--frame-dk);
}
table.ms td{padding:5px 9px;border:1px solid rgba(122,92,51,.5);vertical-align:top}
table.ms tr:nth-child(even) td{background:rgba(160,125,70,.09)}
table.ms tr:hover td{background:rgba(150,118,44,.14)}
.table-scroll{overflow-x:auto}

/* ── Карточки ── */
.grid{display:grid;gap:12px}
.grid.c2{grid-template-columns:repeat(auto-fill,minmax(330px,1fr))}
.grid.c3{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
.card{
  border:1px solid var(--frame);background:linear-gradient(180deg,rgba(255,250,235,.6),rgba(205,175,120,.12));
  box-shadow:0 2px 6px rgba(70,45,10,.18);padding:12px 14px;position:relative;
}
.card::before{content:"";position:absolute;inset:3px;border:1px solid rgba(150,118,44,.35);pointer-events:none}
.card h4{font-family:var(--disp);font-weight:400;font-size:18px;color:var(--rubric);margin-bottom:4px}
.card .meta{font-size:13.5px;color:var(--ink-soft);font-style:italic;font-family:var(--fell)}
.card ul{margin:6px 0 0 18px;font-size:15px}
.card li{margin-bottom:2px}
.card.clickable{cursor:pointer}
.card.clickable:hover{border-color:var(--rubric);box-shadow:0 3px 10px rgba(125,31,22,.25)}

/* ── Персонажи: список ── */
.char-card{display:flex;gap:12px;align-items:center}
.sigil{
  flex:0 0 54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-size:26px;color:var(--sheet);
  background:radial-gradient(circle at 35% 30%,#b23a2b,var(--wax) 60%,var(--wax-dk));
  border:2px solid var(--wax-dk);box-shadow:0 2px 5px rgba(60,10,5,.5), inset 0 -3px 6px rgba(0,0,0,.35);
}
.char-card .cc-main{flex:1;min-width:0}
.char-card .cc-name{font-family:var(--disp);font-size:19px;color:var(--rubric)}
.char-card .cc-line{font-size:14px;color:var(--ink-soft);font-style:italic;font-family:var(--fell)}
.lvlup-badge{
  display:inline-block;font-family:var(--disp);font-size:12px;color:var(--sheet);
  background:linear-gradient(180deg,#8e2c20,#63160d);padding:1px 8px;margin-left:6px;letter-spacing:.04em;
}

/* ── Лист персонажа ── */
.sheet-head{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:14px}
.sheet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;align-items:start}
.panel{
  border:1px solid var(--frame);padding:12px 14px;
  background:linear-gradient(180deg,rgba(255,250,235,.55),rgba(205,175,120,.10));
  box-shadow:inset 0 0 24px rgba(140,105,50,.10);
}
.panel h3{margin-top:0}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:10px;margin:6px 0 4px}
.seal{
  text-align:center;padding:10px 4px 8px;position:relative;
  background:radial-gradient(circle at 35% 28%, #f7efd8, #e8d7ac 70%, #d8c188);
  border-radius:50% 50% 48% 52%/55% 52% 48% 45%;
  border:2px solid var(--frame);box-shadow:0 2px 5px rgba(70,45,10,.3), inset 0 -4px 8px rgba(120,85,40,.25);
}
.seal .sn{font-family:var(--disp);font-size:13px;letter-spacing:.08em;color:var(--rubric)}
.seal input{width:56px;font-size:20px;font-weight:700;text-align:center;background:transparent;border:none;box-shadow:none;padding:1px}
.seal input:focus{outline:1px dashed var(--gold)}
.seal .md{font-family:var(--fell);font-size:16px;font-style:italic;color:var(--ink-soft);border-top:1px solid var(--gold);margin:2px 10px 0;padding-top:1px}
.combat-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.hp-btns{display:flex;gap:4px;margin-top:4px}
.prof-list{columns:2;column-gap:18px;font-size:15px}
@media(max-width:520px){.prof-list{columns:1}}
.prof-item{display:flex;align-items:baseline;gap:6px;padding:1px 0;break-inside:avoid;cursor:pointer;user-select:none}
.prof-item .dot{font-size:13px;width:15px;color:var(--ink-faint)}
.prof-item.p1 .dot{color:var(--rubric)}
.prof-item.p2 .dot{color:var(--gold)}
.prof-item .bns{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}
.prof-item:hover{color:var(--rubric)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  font-size:13.5px;padding:2px 10px;border:1px solid var(--frame);cursor:pointer;user-select:none;
  background:rgba(255,250,235,.5);color:var(--ink-soft);border-radius:2px;
}
.chip.on{background:linear-gradient(180deg,#8e2c20,#63160d);color:var(--sheet);border-color:var(--wax-dk)}
.row-line{display:flex;gap:6px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.row-line input.grow{flex:1;min-width:110px}
.del-x{
  cursor:pointer;color:var(--rubric);font-family:var(--disp);border:1px solid transparent;
  background:none;font-size:15px;padding:2px 6px;box-shadow:none;
}
.del-x:hover{border-color:var(--rubric)}
.spell-hit{display:flex;justify-content:space-between;gap:8px;padding:3px 6px;border-bottom:1px dashed rgba(122,92,51,.4);cursor:pointer;font-size:15px}
.spell-hit:hover{background:rgba(150,118,44,.14)}
.death-row{display:flex;gap:14px;align-items:center;font-size:14px;flex-wrap:wrap}
.gold-row{display:flex;gap:8px;flex-wrap:wrap}
.gold-row label.f{align-items:center}
.gold-row input{width:64px}
.save-status{font-family:var(--fell);font-style:italic;font-size:14px;color:var(--ok);min-height:18px;text-align:right}

/* ── Фильтры заклинаний ── */
.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-bottom:10px}
.school-tag{font-size:12.5px;color:var(--sheet);background:var(--gold);padding:0 7px;font-family:var(--disp);letter-spacing:.03em;white-space:nowrap}

/* ── Развороты классов ── */
details.classfold{border:1px solid var(--frame);margin-bottom:10px;background:linear-gradient(180deg,rgba(255,250,235,.55),rgba(205,175,120,.10))}
details.classfold summary{
  font-family:var(--disp);font-size:19px;color:var(--rubric);cursor:pointer;padding:9px 14px;list-style:none;
  display:flex;align-items:center;gap:10px;
}
details.classfold summary::before{content:"❧";color:var(--gold);transition:transform .2s}
details.classfold[open] summary::before{transform:rotate(90deg)}
details.classfold summary .hint{font-family:var(--fell);font-style:italic;font-size:14px;color:var(--ink-soft);font-weight:400;margin-left:auto}
details.classfold .fold-body{padding:4px 16px 14px;border-top:1px dashed rgba(122,92,51,.5)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}
.lv-feats{columns:2;column-gap:20px;font-size:14.5px}
@media(max-width:700px){.lv-feats{columns:1}}
.lv-feats div{break-inside:avoid;padding:1px 0}
.lv-feats b{color:var(--rubric);font-variant-numeric:tabular-nums}

/* ── Журнал ── */
.journal-entry{margin-bottom:14px}
.journal-entry textarea{min-height:70px}

.empty-scroll{
  text-align:center;padding:40px 20px;color:var(--ink-soft);font-family:var(--fell);font-style:italic;font-size:18px;
}
.empty-scroll .big{font-size:40px;color:var(--gold);display:block;margin-bottom:8px;font-style:normal}
footer.colophon{text-align:center;margin-top:18px;font-family:var(--fell);font-style:italic;color:var(--ink-faint);font-size:14px}
.hidden{display:none!important}
@media print{.tabs,.toolrow,.btn,.masthead{display:none}}

/* ═══════════ НОВОЕ: единая книга мастера (интеграция «D&D Нексус») ═══════════ */

/* Цветные ярлыки-печати (теги) */
.tagrow{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.wax-tag{display:inline-block;padding:1px 9px 2px;font-size:12.5px;line-height:1.35;border-radius:3px;
  font-family:var(--serif);font-weight:700;letter-spacing:.02em;color:#fff8ea;
  border:1px solid rgba(40,25,5,.45);box-shadow:inset 0 0 6px rgba(0,0,0,.28),0 1px 2px rgba(60,40,10,.3);
  text-shadow:0 1px 1px rgba(0,0,0,.4)}
.type-tag{display:inline-block;padding:1px 8px;font-size:12px;border:1px solid var(--frame);border-radius:3px;
  background:var(--parch-3);color:var(--ink-soft);font-style:italic}

/* Подвкладки листа персонажа */
.subtabs{display:flex;flex-wrap:wrap;gap:0;border:2px solid var(--frame);background:var(--parch-2);margin:14px 0 12px;
  box-shadow:0 2px 8px rgba(60,40,10,.18)}
.subtab{flex:1 1 auto;min-width:110px;padding:9px 10px;font-family:var(--disp);font-size:16px;letter-spacing:.04em;
  background:transparent;border:none;border-right:1px solid var(--frame);color:var(--ink-soft);cursor:pointer}
.subtab:last-child{border-right:none}
.subtab:hover{background:rgba(150,118,44,.14)}
.subtab.active{background:var(--rubric);color:var(--parch);text-shadow:0 1px 1px rgba(0,0,0,.35)}

/* Карточки характеристик */
.ab-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:8px 0 14px}
@media(max-width:860px){.ab-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.ab-grid{grid-template-columns:repeat(2,1fr)}}
.ab-card{border:2px solid var(--frame);background:linear-gradient(180deg,rgba(255,248,225,.5),rgba(190,160,105,.14)),var(--sheet);
  text-align:center;padding:8px 6px 7px;box-shadow:inset 0 0 14px rgba(120,85,40,.14)}
.ab-card .abn{font-family:var(--disp);font-size:14px;color:var(--rubric);letter-spacing:.05em}
.ab-card .abv{font-family:var(--disp);font-size:30px;line-height:1.05;color:var(--ink)}
.ab-card .abm{font-family:var(--fell);font-style:italic;font-size:16px;color:var(--gold)}
.ab-card .mini{display:flex;gap:4px;justify-content:center;margin-top:4px}
.mini-btn{width:24px;height:22px;border:1px solid var(--frame);background:var(--parch-2);cursor:pointer;
  font-size:13px;line-height:1;color:var(--ink-soft)}
.mini-btn:hover{background:var(--gold-lt);color:var(--ink)}

/* Спасброски и навыки */
.save-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
@media(max-width:720px){.save-grid{grid-template-columns:repeat(2,1fr)}}
.save-pill{display:flex;align-items:center;gap:8px;border:1px solid var(--frame);background:var(--sheet);
  padding:6px 10px;cursor:pointer}
.save-pill:hover{background:var(--parch-2)}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:760px){.skill-grid{grid-template-columns:1fr}}
.skill-row{display:flex;align-items:center;gap:8px;border:1px solid var(--frame);background:var(--sheet);padding:5px 10px}
.skill-row.trained{background:linear-gradient(180deg,rgba(150,118,44,.16),rgba(150,118,44,.06)),var(--sheet)}
.skill-row .sk-ab{font-size:12px;color:var(--ink-faint);font-style:italic}
.pip{width:15px;height:15px;border:1.5px solid var(--frame-dk);border-radius:50%;flex:none;cursor:pointer;background:var(--parch)}
.pip.p1{background:var(--gold)}
.pip.p2{background:var(--rubric);box-shadow:0 0 0 2px var(--gold-lt) inset}
.bonus-btn{margin-left:auto;font-family:var(--disp);font-size:17px;color:var(--ink);background:none;border:none;
  cursor:pointer;padding:0 2px;min-width:44px;text-align:right}
.bonus-btn:hover{color:var(--rubric)}
.bonus-btn .manual-star{color:var(--rubric);font-size:14px;vertical-align:super}

/* Истощение */
.exh-row{display:flex;align-items:center;gap:10px;border:1px solid var(--frame);background:var(--parch-2);
  padding:8px 12px;margin-top:14px}
.exh-row input[type=range]{flex:1;accent-color:var(--rubric)}

/* Карточки предметов / заклинаний / способностей */
.entry-card{border:2px solid var(--frame);background:linear-gradient(180deg,rgba(255,250,232,.55),rgba(200,170,110,.10)),var(--sheet);
  box-shadow:0 2px 8px rgba(60,40,10,.15), inset 0 0 24px rgba(120,85,40,.08);
  padding:11px 14px;margin-bottom:11px;position:relative}
.entry-card h4{font-family:var(--disp);font-weight:400;font-size:20px;color:var(--rubric);letter-spacing:.03em;display:inline}
.entry-head{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:5px}
.entry-head .spacer{flex:1}
.entry-desc{white-space:pre-wrap;font-size:15.5px;margin:5px 0}
.entry-desc.clamp{max-height:110px;overflow:hidden;position:relative}
.entry-desc.clamp::after{content:"";position:absolute;left:0;right:0;bottom:0;height:36px;
  background:linear-gradient(180deg,transparent,var(--sheet))}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 18px;font-size:14.5px;margin:4px 0}
@media(max-width:640px){.meta-grid{grid-template-columns:1fr}}
.meta-grid b{color:var(--ink-soft);font-weight:600}
.stat-line{font-size:14.5px;color:var(--ink-soft)}
.stat-line .dmg{color:var(--rubric);font-weight:700}
.props-block{border-top:1px dashed var(--frame);margin-top:6px;padding-top:5px;font-size:14.5px}
.props-block .pt{font-family:var(--fell);font-style:italic;color:var(--gold);font-size:14px}
.qty-box{display:flex;align-items:center;gap:4px}
.qty-box b{min-width:22px;text-align:center;font-family:var(--disp);font-size:17px}
.toggle-link{background:none;border:none;color:var(--gold);font-family:var(--fell);font-style:italic;
  font-size:14px;cursor:pointer;padding:0}
.toggle-link:hover{color:var(--rubric)}

/* Панель управления базой */
.db-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.db-bar input[type=text],.db-bar select{padding:6px 9px;border:1px solid var(--frame);background:var(--sheet);
  font-family:var(--serif);font-size:15px;color:var(--ink)}
.db-bar input[type=text]{flex:1;min-width:160px}

/* Редактор записи */
.editor{border:2px double var(--rubric);background:linear-gradient(180deg,rgba(255,248,225,.6),rgba(190,160,105,.16)),var(--parch-2);
  padding:14px;margin-bottom:14px;box-shadow:0 3px 12px rgba(60,40,10,.25)}
.editor h3{font-family:var(--disp);color:var(--rubric);font-weight:400;margin-bottom:8px}
.f-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:8px}
.f-grid label,.editor label{display:block;font-size:13px;color:var(--ink-soft);font-style:italic}
.editor input[type=text],.editor input[type=number],.editor select,.editor textarea{width:100%;padding:6px 8px;
  border:1px solid var(--frame);background:var(--sheet);font-family:var(--serif);font-size:15px;color:var(--ink)}
.editor textarea{min-height:90px;resize:vertical}
.tag-picker{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 10px}
.tag-picker .wax-tag{cursor:pointer;opacity:.42;filter:saturate(.55)}
.tag-picker .wax-tag.on{opacity:1;filter:none;outline:2px solid var(--gold-lt)}

/* Экипировка: манекен */
.mannequin{position:relative;max-width:560px;margin:0 auto;min-height:560px;
  border:2px solid var(--frame);background:
   radial-gradient(ellipse at 50% 42%, rgba(150,118,44,.13), transparent 62%),
   linear-gradient(180deg,rgba(255,248,225,.4),rgba(190,160,105,.12)),var(--parch-2);
  box-shadow:inset 0 0 40px rgba(120,85,40,.18)}
.mannequin::before{content:"⚜";position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);
  font-size:150px;color:rgba(122,92,51,.14);pointer-events:none}
.slot-cell{position:absolute;width:96px;min-height:74px;border:1.5px solid var(--frame);background:var(--sheet);
  box-shadow:0 2px 6px rgba(60,40,10,.2);cursor:pointer;padding:6px 5px;text-align:center;font-size:12px;color:var(--ink-soft)}
.slot-cell:hover{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-lt)}
.slot-cell.filled{border-color:var(--gold);background:linear-gradient(180deg,rgba(201,168,76,.22),rgba(201,168,76,.06)),var(--sheet)}
.slot-cell.sel{outline:2px solid var(--rubric)}
.slot-cell .sic{font-size:19px;line-height:1.1;color:var(--gold)}
.slot-cell .sname{font-family:var(--disp);font-size:12px;letter-spacing:.03em;color:var(--ink-soft)}
.slot-cell .sitem{font-weight:700;font-size:12.5px;color:var(--rubric);margin-top:2px;word-break:break-word}
.slot-pick{max-width:560px;margin:10px auto 0}
@media(max-width:640px){
  .mannequin{transform:scale(.82);transform-origin:top center;margin-bottom:-90px}
}

/* Ячейки заклинаний */
.slots-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.slot-lv{border:1px solid var(--frame);background:var(--parch-2);padding:6px 10px;display:flex;align-items:center;gap:7px}
.slot-lv .lvt{font-family:var(--disp);font-size:14px;color:var(--rubric)}
.slot-gem{cursor:pointer;font-size:17px;color:var(--gold);background:none;border:none;padding:0 1px;line-height:1}
.slot-gem.spent{color:var(--ink-faint)}

/* Использования способностей */
.uses-box{display:flex;align-items:center;gap:5px;font-size:14px;color:var(--ink-soft)}

/* Валюта */
.coin-row{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0 14px}
.coin{display:flex;align-items:center;gap:6px;border:1px solid var(--frame);background:var(--sheet);padding:5px 9px}
.coin b{font-family:var(--disp);font-size:14px;color:var(--gold)}
.coin input{width:70px;padding:4px 6px;border:1px solid var(--frame);background:var(--parch);
  font-family:var(--serif);font-size:15px;color:var(--ink);text-align:right}

/* Результат нестандартного броска */
.dice-note{width:88px;padding:5px 7px;border:1px solid var(--frame);background:var(--sheet);
  font-family:var(--serif);font-size:14px;color:var(--ink)}

/* Шапка листа: боевые показатели */
.combat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin:10px 0 4px}
.cbox{border:2px solid var(--frame);background:var(--sheet);text-align:center;padding:7px 6px;
  box-shadow:inset 0 0 12px rgba(120,85,40,.12)}
.cbox .cl{font-family:var(--disp);font-size:12.5px;letter-spacing:.05em;color:var(--rubric)}
.cbox .cv{font-family:var(--disp);font-size:24px;color:var(--ink)}
.cbox input{width:60px;text-align:center;border:1px solid var(--frame);background:var(--parch);
  font-family:var(--disp);font-size:20px;color:var(--ink);padding:2px}
.hp-wide{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.prep-btn{font-size:13px;padding:3px 10px}
.prep-btn.on{background:var(--ok);color:var(--parch);border-color:var(--ok)}

/* ─── облачная синхронизация ─── */
.sync-overlay{position:fixed;inset:0;background:rgba(30,22,12,.55);z-index:60;display:flex;align-items:center;justify-content:center;padding:16px}
.sync-box{background:var(--parch);border:2px solid var(--frame-dk);box-shadow:0 12px 40px rgba(0,0,0,.45), inset 0 0 0 1px var(--gold-lt);max-width:560px;width:100%;padding:22px 26px;max-height:92vh;overflow:auto}
.sync-head{font-family:var(--disp);font-size:1.35rem;color:var(--rubric);letter-spacing:.04em;margin-bottom:4px}
.sync-sub{font-style:italic;color:var(--ink-soft);margin-bottom:14px;font-size:.95rem}
.sync-lbl{display:block;font-family:var(--fell);font-size:.8rem;letter-spacing:.06em;color:var(--ink-soft);margin:10px 0 3px}
.sync-inp{width:100%;box-sizing:border-box;font-family:var(--serif);font-size:.95rem;color:var(--ink);background:var(--sheet);border:1px solid var(--frame);padding:7px 10px}
.sync-inp:focus{outline:none;border-color:var(--rubric)}
.sync-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.sync-status{margin-top:10px;font-style:italic;font-size:.9rem;color:var(--ink-soft);min-height:1.2em}
.sync-status.ok{color:var(--ok)}
.sync-status.err{color:var(--rubric)}
.sync-help{margin-top:14px;border-top:1px dashed var(--frame);padding-top:10px;font-size:.92rem}
.sync-help summary{cursor:pointer;font-family:var(--fell);letter-spacing:.04em;color:var(--ink-soft)}
.sync-help ol{margin:10px 0 0 18px;padding:0}
.sync-help li{margin-bottom:7px;line-height:1.45}
.sync-help code{background:var(--sheet);border:1px solid var(--frame);padding:1px 5px;font-size:.85em;word-break:break-all}
.sync-note{margin-top:10px;font-style:italic;color:var(--rubric);font-size:.88rem}
#cloudBtn.cloud-on{color:var(--ok);border-color:var(--ok)}

</style>
</head>
<body>
<div class="wrap">
<header class="masthead">
  <span class="corner tl">✠</span><span class="corner tr">✠</span>
  <span class="corner bl">✠</span><span class="corner br">✠</span>
  <h1 class="title">D&amp;D World</h1>
  <div class="subtitle">Летопись развития персонажей · настольная книга гейм-мастера · единое издание с «D&amp;D Нексус»</div>
  <div class="rule-flourish">❦</div>
  <div class="toolrow">
    <div class="dicebox">
      <span class="lbl">Кости:</span>
      <button class="die" onclick="roll(4)">к4</button>
      <button class="die" onclick="roll(6)">к6</button>
      <button class="die" onclick="roll(8)">к8</button>
      <button class="die" onclick="roll(10)">к10</button>
      <button class="die" onclick="roll(12)">к12</button>
      <button class="die" onclick="roll(20)">к20</button>
      <button class="die" onclick="roll(100)">к100</button>
      <input class="dice-note" id="diceNote" placeholder="2к6+3" onkeydown="if(event.key==='Enter')rollNotation()">
      <button class="die" onclick="rollNotation()">⚁ бросить</button>
      <span id="diceOut">—</span>
    </div>
    <div class="util-btns">
      <button class="btn ghost sm" id="cloudBtn" onclick="openSyncModal()">☁ Облако</button>
      <button class="btn ghost sm" onclick="doExport()">Выгрузить летопись</button>
      <button class="btn ghost sm" onclick="document.getElementById('impFile').click()">Загрузить летопись</button>
      <input type="file" id="impFile" accept=".json" class="hidden" onchange="doImport(this)">
    </div>
  </div>
</header>

<nav class="tabs" id="tabsNav">
  <button class="tab active" data-tab="chars" onclick="switchTab('chars')">Персонажи</button>
  <button class="tab" data-tab="races" onclick="switchTab('races')">Расы</button>
  <button class="tab" data-tab="classes" onclick="switchTab('classes')">Классы</button>
  <button class="tab" data-tab="spellsdb" onclick="switchTab('spellsdb')">Заклинания</button>
  <button class="tab" data-tab="itemsdb" onclick="switchTab('itemsdb')">Предметы</button>
  <button class="tab" data-tab="abilitiesdb" onclick="switchTab('abilitiesdb')">Способности</button>
  <button class="tab" data-tab="rules" onclick="switchTab('rules')">Справочник</button>
  <button class="tab" data-tab="journal" onclick="switchTab('journal')">Журнал</button>
</nav>

<main class="leaf">
  <div class="save-status" id="saveStatus"></div>
  <div id="tab-chars"></div>
  <div id="tab-races" class="hidden"></div>
  <div id="tab-classes" class="hidden"></div>
  <div id="tab-spellsdb" class="hidden"></div>
  <div id="tab-itemsdb" class="hidden"></div>
  <div id="tab-abilitiesdb" class="hidden"></div>
  <div id="tab-rules" class="hidden"></div>
  <div id="tab-journal" class="hidden"></div>
</main>

<footer class="colophon">Писано рукою мастера · всё в сей книге правится вручную и хранится меж сессиями ❦</footer>
</div>

function tagChips(ids, dict){
  if(!ids || !ids.length) return '';
  return '<span class="tagrow">'+ids.map(t=>{
    const d=dict[t]; if(!d) return '';
    return '<span class="wax-tag" style="background:'+d.c+'">'+esc(d.ru)+'</span>';
  }).join('')+'</span>';
}
function tagPicker(dict, selected, boxId){
  return '<div class="tag-picker" id="'+boxId+'">'+Object.keys(dict).map(k=>
    '<span class="wax-tag'+(selected.includes(k)?' on':'')+'" data-tag="'+k+'" style="background:'+dict[k].c+'" onclick="this.classList.toggle(\'on\')">'+esc(dict[k].ru)+'</span>'
  ).join('')+'</div>';
}
function pickedTags(boxId){
  return Array.from(document.querySelectorAll('#'+boxId+' .wax-tag.on')).map(e=>e.dataset.tag);
}

/* какие предметные слоты подходят к ячейке манекена */
function slotAccepts(cellId, itemSlot){
  if(!itemSlot) return false;
  if(cellId==='MAIN_HAND') return itemSlot==='MAIN_HAND'||itemSlot==='TWO_HAND';
  if(cellId==='OFF_HAND')  return itemSlot==='OFF_HAND'||itemSlot==='MAIN_HAND';
  if(cellId==='RING_L'||cellId==='RING_R') return itemSlot==='RING';
  return itemSlot===cellId;
}

/* ═══════════════ ЗАСЕВ БАЗ: справочники старой летописи + перенос ═══════════════ */
function slugify(n){ return n.toLowerCase().replace(/[^a-zа-яё0-9]+/g,'_').replace(/^_+|_+$/g,''); }

function weaponAutoTags(w){
  const t=[];
  if(/дальнобойное/i.test(w.g)) t.push('ranged'); else t.push('melee');
  if(/рубящий/.test(w.dmg)) t.push('slashing');
  if(/колющий/.test(w.dmg)) t.push('piercing');
  if(/дробящий/.test(w.dmg)) t.push('bludgeoning');
  const p=w.p||'';
  if(/[Лл]ёгкое/.test(p)) t.push('light');
  if(/[Тт]яжёлое/.test(p)) t.push('heavy');
  if(/[Фф]ехтовальное/.test(p)) t.push('finesse');
  if(/[Дд]вуручное/.test(p)) t.push('twohanded');
  if(/[Уу]ниверсальное/.test(p)) t.push('versatile');
  if(/[Мм]етательное/.test(p)) t.push('thrown');
  if(/[Бб]оеприпасы/.test(p)) t.push('ammunition');
  return t;
}
function armorAutoTags(a){
  if(a.g==='Щит') return ['shield'];
  if(/Лёгкий/.test(a.g)) return ['lightarmor'];
  if(/Средний/.test(a.g)) return ['mediumarmor'];
  return ['heavyarmor'];
}
function gearAutoTags(n){
  const t=[];
  if(/зелье|противоядие/i.test(n)) t.push('potion','consumable');
  if(/инструмент/i.test(n)) t.push('tool');
  if(/стрелы|болты|пули/i.test(n)) t.push('ammunition');
  if(/мешоч|сундук|рюкзак|фляга|бурдюк/i.test(n)) t.push('container');
  if(/свиток/i.test(n)) t.push('scroll');
  return t;
}
function seedItemsDB(){
  const out=[];
  WEAPONS.forEach(w=>{
    const two=/[Дд]вуручное/.test(w.p||'');
    out.push({id:'it_'+slugify(w.n), n:w.n, type:'weapon', rarity:'обычный', custom:false,
      tags:weaponAutoTags(w), slot: two?'TWO_HAND':'MAIN_HAND',
      weight:w.w, cost:w.c, dmg:w.dmg.replace(/ (рубящий|колющий|дробящий)/,''), dmgType:(w.dmg.match(/рубящий|колющий|дробящий/)||[''])[0],
      desc:w.g+'.', props:w.p==='—'?'':w.p});
  });
  ARMORS.forEach(a=>{
    out.push({id:'it_'+slugify(a.n)+'_arm', n:a.n, type:'armor', rarity:'обычный', custom:false,
      tags:armorAutoTags(a), slot: a.g==='Щит'?'OFF_HAND':'CHEST',
      weight:a.w, cost:a.c, dmg:'', dmgType:'', ac:a.ac,
      desc:a.g+'.'+(a.str!=='—'?' Требование: '+a.str+'.':''), props:a.st==='Помеха'?'Помеха на Скрытность':''});
  });
  GEAR.forEach(g=>{
    out.push({id:'it_'+slugify(g[0]), n:g[0], type:'equipment', rarity:'обычный', custom:false,
      tags:gearAutoTags(g[0]), slot:null, weight:g[2]||'', cost:g[1]||'', dmg:'', dmgType:'',
      desc:'', props:''});
  });
  /* предметы Року поверх справочника (совпадение имён допустимо — у Року свои версии) */
  ROKU_ITEMS.forEach(it=>{
    const clash=out.findIndex(o=>o.n===it.n && o.type===it.type);
    if(clash>=0) out.splice(clash,1);
    out.push(Object.assign({},it));
  });
  return out;
}
/* заклинания старой летописи, вытесненные версиями из «D&D Нексус» */
const SUPERSEDED_SPELLS = ['Волшебная рука','Огненный снаряд','Луч холода','Волшебная стрела','Сон','Паутина'];
function spellAutoTags(sp){
  const t=[];
  if(sp.l===0) t.push('cantrip');
  if(/ритуал/i.test(sp.t)) t.push('ritual');
  if(/Концентрация/i.test(sp.d)) t.push('concentration');
  if(/бонусное действие/i.test(sp.t)) t.push('bonusaction');
  if(/реакция/i.test(sp.t)) t.push('reaction');
  if(/лечит|исцел|восстанавливает.*хит/i.test(sp.x)) t.push('healing');
  if(/урон/i.test(sp.x)) t.push('damage');
  return t;
}
function seedSpellsDB(){
  const out=[];
  SPELLS.forEach(sp=>{
    if(SUPERSEDED_SPELLS.includes(sp.n)) return;
    out.push({id:'sp_'+slugify(sp.n), n:sp.n, l:sp.l, s:sp.s, c:sp.c, t:sp.t, r:sp.r, cm:sp.cm, d:sp.d,
      ritual:/ритуал/i.test(sp.t), conc:/Концентрация/i.test(sp.d), custom:false, tags:spellAutoTags(sp), x:sp.x, hi:''});
  });
  ROKU_SPELLS.forEach(sp=>out.push(Object.assign({},sp)));
  return out;
}
function seedAbilitiesDB(){
  const out=[];
  /* расовые черты из справочника народов */
  RACES.forEach(r=>{
    r.tr.forEach(tr=>{
      const name=tr.split(':')[0].trim();
      out.push({id:'ab_'+slugify(r.n+'_'+name), n:name+' ('+r.n+')', type:'racial', source:r.n, custom:false,
        tags:['racial','passive'], uses:null, rest:'', x:tr});
    });
  });
  ROKU_ABILITIES.forEach(a=>out.push(Object.assign({},a)));
  return out;
}

/* ═══════════════ СОСТОЯНИЕ И ХРАНИЛИЩЕ ═══════════════ */
let chars=[], journal=[], itemsDB=[], spellsDB=[], abilitiesDB=[];
let activeCharId=null, sheetTab='stats';
let saveTimer=null;
const memStore={};

/* Хранилище: window.storage (артефакты) → localStorage (свой сайт) → память сеанса */
const store={
  async get(k){
    if(window.storage && window.storage.get){ try{ const r=await window.storage.get(k); return r&&r.value!=null?r.value:null; }catch(e){ return null; } }
    try{ return window.localStorage.getItem(k); }catch(e){ return (k in memStore)?memStore[k]:null; }
  },
  async set(k,v){
    if(window.storage && window.storage.set){ try{ await window.storage.set(k,v); return true; }catch(e){ return false; } }
    try{ window.localStorage.setItem(k,v); return true; }catch(e){ memStore[k]=v; return false; }
  }
};
function setStatus(t,err){
  const el=document.getElementById('saveStatus');
  if(el){ el.textContent=t; el.classList.toggle('err',!!err); }
}
async function persist(key,val){
  const ok=await store.set(key, JSON.stringify(val));
  setStatus(ok?'Записано в летопись ✓':'Хранилище недоступно — не забудьте «Выгрузить летопись»', !ok);
}
function scheduleSave(){
  clearTimeout(saveTimer); setStatus('Перо скрипит…');
  saveTimer=setTimeout(async()=>{
    await persist('dndworld2:chars',chars);
    await persist('dndworld2:items',itemsDB);
    await persist('dndworld2:spells',spellsDB);
    await persist('dndworld2:abilities',abilitiesDB);
    if(typeof syncTouch==='function') syncTouch();
  },600);
}
function scheduleJournalSave(){
  clearTimeout(saveTimer); setStatus('Перо скрипит…');
  saveTimer=setTimeout(async()=>{ await persist('dndworld2:journal',journal); if(typeof syncTouch==='function') syncTouch(); },600);
}
async function readJSON(key){
  try{ const raw=await store.get(key); return raw?JSON.parse(raw):null; }catch(e){ return null; }
}
/* Перенос персонажей прежней «Летописи» (первая версия D&D World) в новую книгу */
function upgradeOldChar(o){
  const skills={}; SKILLS.forEach(s=>skills[s[0]]={p:0,m:null});
  if(o.skills) Object.keys(o.skills).forEach(k=>{
    const nk=(k==='Анализ')?'Расследование':k;
    if(skills[nk]) skills[nk].p=o.skills[k]||0;
  });
  const c=Object.assign(buildBlank(),{
    id:o.id||uid(), name:o.name||'Безымянный герой', player:o.player||'', race:o.race||'Человек', subrace:o.subrace||'',
    cls:o.cls||'Воин', subcls:o.subcls||'', bg:o.bg||'', align:o.align||'Истинно нейтральный',
    level:o.level||1, xp:o.xp||0, ab:o.ab||{str:10,dex:10,con:10,int:10,wis:10,cha:10},
    hp:o.hp!=null?o.hp:10, hpMax:o.hpMax||10, hpTemp:o.hpTemp||0, ac:o.ac!=null?o.ac:10,
    speed:o.speed||'9 м', init:o.init||0, hitDice:o.hitDice||'',
    saves:o.saves||{str:false,dex:false,con:false,int:false,wis:false,cha:false},
    skills, cond:o.cond||[], deaths:o.deaths||{s:0,f:0},
    coins:o.gold||{mm:0,sm:0,em:0,zm:0,pm:0},
    feats:o.feats||[], langs:o.langs||'', notes:o.notes||'', hpPend:!!o.hpPend
  });
  (o.inv||[]).forEach(iv=>{
    if(!iv.n) return;
    let db=itemsDB.find(x=>x.n===iv.n);
    if(!db){
      db={id:'it_'+uid(), n:iv.n, type:'equipment', rarity:'обычный', custom:true, tags:[], slot:null,
        weight:iv.w||'', cost:'', dmg:'', dmgType:'', desc:'(перенесено из прежней летописи)', props:''};
      itemsDB.push(db);
    }
    c.inventory.push({id:'inv_'+uid(), itemId:db.id, qty:iv.q||1, notes:''});
  });
  (o.spells||[]).forEach(sv=>{
    if(!sv.n) return;
    let db=spellsDB.find(x=>x.n===sv.n);
    if(!db){
      db={id:'sp_'+uid(), n:sv.n, l:sv.l||0, s:'Воплощение', c:'', t:'', r:'', cm:'', d:'', ritual:false, conc:false,
        custom:true, tags:[], x:'(перенесено из прежней летописи)', hi:''};
      spellsDB.push(db);
    }
    c.spellbook.push({spellId:db.id, prep:false});
  });
  return c;
}
async function loadAll(){
  setStatus('Открываю летопись…');
  itemsDB   = (await readJSON('dndworld2:items'))     || seedItemsDB();
  spellsDB  = (await readJSON('dndworld2:spells'))    || seedSpellsDB();
  abilitiesDB=(await readJSON('dndworld2:abilities')) || seedAbilitiesDB();
  const savedChars=await readJSON('dndworld2:chars');
  if(savedChars){ chars=savedChars; }
  else{
    chars=[buildRoku()];
    const old=await readJSON('dndworld:chars');   /* наработки первой версии */
    if(old && old.length) old.forEach(o=>chars.push(upgradeOldChar(o)));
  }
  journal=(await readJSON('dndworld2:journal')) || (await readJSON('dndworld:journal')) || [];
  setStatus('Летопись открыта');
}

function roll(n){

function rollNotation(){
  const inp=document.getElementById('diceNote');
  const m=(inp.value||'').trim().toLowerCase().replace(/к/g,'d').match(/^(\d*)d(\d+)([+-]\d+)?$/);
  const out=document.getElementById('diceOut');
  if(!m){ out.textContent='формула: 2к6+3'; out.style.color='var(--rubric)'; return; }
  const cnt=Math.min(40,+m[1]||1), sides=+m[2], mod2=+(m[3]||0);
  const rolls=[]; for(let i=0;i<cnt;i++) rolls.push(1+Math.floor(Math.random()*sides));
  const total=rolls.reduce((a,b)=>a+b,0)+mod2;
  out.textContent=inp.value.trim()+' → '+total+' ('+rolls.join(', ')+(mod2? (mod2>0?' +':' ')+mod2 :'')+')';

function doImport(inp){
  const f=inp.files&&inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const data=JSON.parse(rd.result);
      if(data.app==='dndworld2'){
        chars=data.chars||[]; journal=data.journal||[];
        itemsDB=data.items||itemsDB; spellsDB=data.spells||spellsDB; abilitiesDB=data.abilities||abilitiesDB;
      } else if(data.app==='dndworld'){
        journal=data.journal||journal;
        (data.chars||[]).forEach(o=>chars.push(upgradeOldChar(o)));
      } else { alert('Это не летопись D&D World.'); return; }

/* ═══════════════ ОБЛАЧНАЯ СИНХРОНИЗАЦИЯ ═══════════════
   Firebase Realtime Database через REST (запись) и Server-Sent Events (живой поток).
   Без SDK: нужна только ссылка на базу и ключ кампании. Вся летопись хранится
   одной JSON-строкой (поле j), чтобы Firebase не выбрасывал пустые массивы. */
let syncCfg=null, syncES=null, syncOn=false, syncPushTimer=null, syncRetryTimer=null;
let syncLastAt=0, syncClientId=null, syncPendingRemote=null;

function lsGet(k){ try{ return window.localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){} }

function syncLoadCfg(){
  try{ syncCfg=JSON.parse(lsGet('dndworld2:synccfg')||'null'); }catch(e){ syncCfg=null; }
  syncClientId=lsGet('dndworld2:clientid');
  if(!syncClientId){ syncClientId='cl_'+Math.random().toString(36).slice(2,10); lsSet('dndworld2:clientid',syncClientId); }
  syncLastAt=+(lsGet('dndworld2:synclast')||0);
}
function syncSaveCfg(){ lsSet('dndworld2:synccfg', JSON.stringify(syncCfg||{})); }

function syncUrl(){
  if(!syncCfg||!syncCfg.url||!syncCfg.room) return null;
  const u=String(syncCfg.url).trim().replace(/\/+$/,'');
  const room=String(syncCfg.room).trim().replace(/[^a-zA-Z0-9_-]/g,'');
  if(!/^https:\/\/.+/.test(u)||!room) return null;
  return u+'/campaigns/'+room+'.json';
}
function syncStatus(t,cls){
  const el=document.getElementById('syncStatus');
  if(el){ el.textContent=t; el.className='sync-status'+(cls?' '+cls:''); }
  const btn=document.getElementById('cloudBtn');
  if(btn){ btn.classList.toggle('cloud-on', !!syncOn); btn.textContent=syncOn?'☁ Облако ✓':'☁ Облако'; }
}

/* ─── снимок состояния и применение чужих правок ─── */
function syncPayload(){
  return { by:syncClientId, at:Date.now(),
    j: JSON.stringify({chars, journal, items:itemsDB, spells:spellsDB, abilities:abilitiesDB}) };
}
async function syncPersistLocal(){
  await store.set('dndworld2:chars',   JSON.stringify(chars));
  await store.set('dndworld2:items',   JSON.stringify(itemsDB));
  await store.set('dndworld2:spells',  JSON.stringify(spellsDB));
  await store.set('dndworld2:abilities',JSON.stringify(abilitiesDB));
  await store.set('dndworld2:journal', JSON.stringify(journal));
}
function syncApplyRemote(msg){
  /* если мастер прямо сейчас печатает в поле — подождём, чтобы не сбить ввод */
  const ae=document.activeElement;
  const typing=ae && (ae.tagName==='INPUT'||ae.tagName==='TEXTAREA') && ae.closest && ae.closest('.leaf');
  if(typing){
    syncPendingRemote=msg;
    clearTimeout(syncRetryTimer);
    syncRetryTimer=setTimeout(()=>{ const m=syncPendingRemote; syncPendingRemote=null; if(m) syncApplyRemote(m); },2500);
    return;
  }
  try{
    const d=JSON.parse(msg.j);
    chars=d.chars||[]; journal=d.journal||[];
    itemsDB=d.items||[]; spellsDB=d.spells||[]; abilitiesDB=d.abilities||[];
    syncLastAt=msg.at||Date.now();
    lsSet('dndworld2:synclast',String(syncLastAt)); lsSet('dndworld2:dirty','');
    syncPersistLocal();
    renderChars(); renderJournal(); renderSpellsDB(); renderItemsDB(); renderAbilitiesDB();
    syncStatus('Облако: получены изменения ✓','ok');
    setStatus('Летопись обновлена из облака ✓');
  }catch(e){ syncStatus('Облако: не удалось разобрать данные — '+e.message,'err'); }
}

/* ─── отправка: вызывается ядром после каждого сохранения ─── */
function syncTouch(){
  if(!syncCfg||!syncCfg.on) return;
  if(!syncOn){ lsSet('dndworld2:dirty','1'); return; }   /* правка без связи — отметим */
  clearTimeout(syncPushTimer);
  syncPushTimer=setTimeout(syncPushNow,1200);
}
async function syncPushNow(){
  const u=syncUrl(); if(!u||!syncOn) return;
  const p=syncPayload();
  try{
    syncStatus('Облако: отправляю…');
    const r=await fetch(u,{method:'PUT',body:JSON.stringify(p)});
    if(!r.ok) throw new Error('HTTP '+r.status);
    syncLastAt=p.at;
    lsSet('dndworld2:synclast',String(p.at)); lsSet('dndworld2:dirty','');
    syncStatus('Облако: сохранено ✓','ok');
  }catch(e){ syncStatus('Облако: ошибка отправки — '+e.message,'err'); }
}

/* ─── живой поток (Server-Sent Events) ─── */
function syncCloseStream(){ if(syncES){ try{ syncES.close(); }catch(e){} syncES=null; } }
function syncOpenStream(u){
  syncCloseStream();
  try{
    syncES=new EventSource(u);
    const onPut=(ev)=>{
      try{
        const p=JSON.parse(ev.data);
        if(!p || p.path!=='/' || !p.data) return;   /* интересна только полная запись корня */
        const msg=p.data;
        if(msg.by===syncClientId) return;           /* эхо собственной записи */
        if(!(msg.at>syncLastAt)) return;            /* уже применено */
        syncApplyRemote(msg);
      }catch(e){}
    };
    syncES.addEventListener('put',onPut);
    syncES.addEventListener('patch',onPut);
    syncES.addEventListener('cancel',()=>syncStatus('Облако: доступ закрыт правилами базы','err'));
    syncES.addEventListener('auth_revoked',()=>syncStatus('Облако: истёк доступ — проверьте правила базы','err'));
    syncES.onerror=()=>{ if(syncOn) syncStatus('Облако: связь прервана, переподключаюсь…','err'); };
  }catch(e){ syncStatus('Облако: живой поток недоступен — '+e.message,'err'); }
}

/* ─── подключение / отключение ─── */
async function syncConnect(interactive){
  const u=syncUrl();
  if(!u){ syncStatus('Укажите ссылку на базу (https://…) и ключ кампании латиницей','err'); return; }
  syncCloseStream();
  syncStatus('Облако: подключаюсь…');
  let cloud=null;
  try{
    const r=await fetch(u);
    if(!r.ok) throw new Error('HTTP '+r.status);
    cloud=await r.json();
  }catch(e){ syncOn=false; syncStatus('Облако: нет доступа — '+e.message,'err'); return; }
  syncOn=true; syncCfg.on=true; syncSaveCfg();
  const dirty=lsGet('dndworld2:dirty')==='1';
  if(cloud && cloud.j && cloud.at){
    if(cloud.at>syncLastAt){
      let take=true;
      if(interactive || dirty){
        take=window.confirm('В облаке уже есть летопись (запись от '+new Date(cloud.at).toLocaleString()+').\n\nОК — взять летопись из облака (заменит данные на этом устройстве).\nОтмена — заменить облако данными этого устройства.');
      }
      if(take) syncApplyRemote(cloud); else await syncPushNow();
    } else if(dirty){ await syncPushNow(); }
  } else {
    await syncPushNow();          /* облако пустое — кладём свою летопись */
  }
  syncOpenStream(u);
  syncStatus('Облако: подключено ✓','ok');
}
function syncDisconnect(){
  syncCloseStream(); syncOn=false;
  if(syncCfg){ syncCfg.on=false; syncSaveCfg(); }
  syncStatus('Облако: отключено');
}
function syncAutoStart(){
  syncLoadCfg();
  if(syncCfg && syncCfg.on && syncUrl() && typeof EventSource!=='undefined') syncConnect(false);
}

  const c=getCh(id); if(!c) return;

  chars=chars.filter(x=>x.id!==id); if(activeCharId===id) activeCharId=null;

       +'<button class="del-x" onclick="event.stopPropagation();delChar(\''+c.id+'\')">✕</button></div>';
    });
    h+='</div>';
  }
  box.innerHTML=h;
}
function raceOpts(sel){ return RACES.map(r=>'<option'+(r.n===sel?' selected':'')+'>'+r.n+'</option>').join(''); }
function subraceOpts(race,sel){
  const r=RACES.find(x=>x.n===race);
  let h='<option value=""'+(!sel?' selected':'')+'>—</option>';
  if(r) r.subs.forEach(s=>{ h+='<option'+(s.n===sel?' selected':'')+'>'+s.n+'</option>'; });
  return h;
}
function clsOpts(sel){ return CLASSES.map(c=>'<option'+(c.n===sel?' selected':'')+'>'+c.n+'</option>').join(''); }
function bgOpts(sel){ return '<option value=""'+(!sel?' selected':'')+'>—</option>'+BACKGROUNDS.map(b=>'<option'+(b.n===sel?' selected':'')+'>'+b.n+'</option>').join(''); }
function alignOpts(sel){ return ALIGNMENTS.map(a=>'<option'+(a===sel?' selected':'')+'>'+a+'</option>').join(''); }
const classOf=c=>CLASSES.find(x=>x.n===c.cls)||CLASSES[0];

function updC(key,val){ const c=cc(); if(!c) return; c[key]=val; scheduleSave(); }
function updNum(key,val){ const c=cc(); if(!c) return; c[key]=+val||0; scheduleSave(); }
function setRace(v){ const c=cc(); if(!c) return; c.race=v; c.subrace=''; scheduleSave(); renderChars(); }
function setLevel(v){ const c=cc(); if(!c) return; c.level=Math.max(1,Math.min(20,+v||1)); scheduleSave(); renderChars(); }
function setXp(v){ const c=cc(); if(!c) return; c.xp=Math.max(0,+v||0); scheduleSave(); renderChars(); }
function hpDelta(d){ const c=cc(); if(!c) return;
  if(d<0 && c.hpTemp>0){ const useTemp=Math.min(c.hpTemp,-d); c.hpTemp-=useTemp; d+=useTemp; }
  c.hp=Math.max(0,Math.min(c.hpMax,(+c.hp||0)+d)); scheduleSave(); renderChars(); }
function toggleInspiration(){ const c=cc(); if(!c) return; c.inspiration=!c.inspiration; scheduleSave(); renderChars(); }
function levelUp(){
  const c=cc(); if(!c||c.level>=20) return;
  c.level++;
  classOf(c).lv.filter(x=>x[0]===c.level).forEach(x=>{
    const fn=x[1];
    let db=abilitiesDB.find(a=>a.type==='class'&&a.source===c.cls&&a.n===fn);
    if(!db){ db={id:'ab_'+uid(), n:fn, type:'class', source:c.cls, custom:true, tags:['classfeature'], uses:null, rest:'',
      x:'Черта класса «'+c.cls+'», получена на '+c.level+' уровне. Опишите её в своде способностей.'}; abilitiesDB.push(db); }
    if(!c.abilities.some(a=>a.abilityId===db.id)) c.abilities.push({abilityId:db.id, cur:null, notes:''});
  });
  c.hpPend=true; scheduleSave(); renderChars();
}
function applyHp(){
  const c=cc(); if(!c) return;
  const v=+document.getElementById('hpGain').value||0;
  c.hpMax=Math.max(1,(+c.hpMax||0)+v); c.hp=Math.min(c.hpMax,(+c.hp||0)+v);
  c.hpPend=false; scheduleSave(); renderChars();
}
function addRaceTraitsToChar(){
  const c=cc(); if(!c) return;
  const r=RACES.find(x=>x.n===c.race); if(!r) return;
  r.tr.forEach(tr=>{
    const name=tr.split(':')[0].trim()+' ('+r.n+')';
    let db=abilitiesDB.find(a=>a.n===name);
    if(!db){ db={id:'ab_'+uid(), n:name, type:'racial', source:r.n, custom:false, tags:['racial','passive'], uses:null, rest:'', x:tr}; abilitiesDB.push(db); }
    if(!c.abilities.some(a=>a.abilityId===db.id)) c.abilities.push({abilityId:db.id, cur:null, notes:''});
  });
  scheduleSave(); sheetTab='abilities'; renderChars();
}
function setSheetTab(t){ sheetTab=t; renderChars(); }

function abDelta(k,d){ const c=cc(); if(!c) return; c.ab[k]=Math.max(1,Math.min(30,(+c.ab[k]||10)+d)); scheduleSave(); renderChars(); }
function toggleSaveProf(k){ const c=cc(); if(!c) return; c.saves[k]=!c.saves[k]; scheduleSave(); renderChars(); }
function cycleSkillProf(i){ const c=cc(); if(!c) return; const n=SKILLS[i][0];
  if(!c.skills[n]) c.skills[n]={p:0,m:null};
  c.skills[n].p=(c.skills[n].p+1)%3; scheduleSave(); renderChars(); }
function editSkillBonus(i){
  const c=cc(); if(!c) return; const n=SKILLS[i][0];
  if(!c.skills[n]) c.skills[n]={p:0,m:null};
  const cur=c.skills[n].m;
  const v=prompt('Ручной бонус для «'+n+'» (оставьте пустым для автоматического расчёта):', cur==null?'':cur);
  if(v===null) return;
  c.skills[n].m = v.trim()==='' ? null : (parseInt(v,10)||0);
  scheduleSave(); renderChars();
}
function skillBonus(c,i){
  const sk=SKILLS[i]; const rec=c.skills[sk[0]]||{p:0,m:null};
  if(rec.m!=null) return {v:rec.m, manual:true, p:rec.p};
  return {v:mod(c.ab[sk[1]])+rec.p*PROF[c.level], manual:false, p:rec.p};
}
function setExhaustion(v){ const c=cc(); if(!c) return; c.exhaustion=Math.max(0,Math.min(6,+v||0)); scheduleSave(); renderChars(); }
function toggleCond(n){ const c=cc(); if(!c) return;
  const i=c.cond.indexOf(n); if(i>=0) c.cond.splice(i,1); else c.cond.push(n);
  scheduleSave(); renderChars(); }
function setDeath(k,i,on){ const c=cc(); if(!c) return; c.deaths[k]=on?i:i-1; scheduleSave(); renderChars(); }

function stStats(c){
  let h='<div class="panel"><h3 class="rubric" style="font-size:22px">Характеристики</h3><div class="ab-grid">';

  });

  AB_KEYS.forEach(k=>{

     +'<span>'+AB_FULL[k]+'</span><span style="margin-left:auto;font-family:var(--disp);font-size:17px">'+fmtMod(b)+'</span></div>';

  h+='</div>';

     +'<span>'+sk[0]+' <span class="sk-ab">'+AB_FULL[sk[1]]+'</span></span>'
     +'<button class="bonus-btn" title="Кликните для ручного редактирования" onclick="editSkillBonus('+i+')">'+fmtMod(b.v)+(b.manual?'<span class="manual-star">✱</span>':'')+'</button></div>';
  });
  h+='</div><p class="note-ital" style="font-size:13.5px;margin-top:6px">Кликните на индикатор: Нет владения → Владение → Эксперт · Кликните на бонус для ручного редактирования · ✱ — ручной бонус</p>';
  h+='<div class="exh-row"><span style="font-family:var(--disp);color:var(--rubric)">Уровень истощения</span>'
   +'<button class="mini-btn" onclick="setExhaustion('+(c.exhaustion-1)+')">−</button>'
   +'<input type="range" min="0" max="6" value="'+c.exhaustion+'" oninput="setExhaustion(this.value)">'
   +'<button class="mini-btn" onclick="setExhaustion('+(c.exhaustion+1)+')">+</button>'
   +'<b style="font-family:var(--disp);font-size:20px;min-width:20px;text-align:center">'+c.exhaustion+'</b></div>';
  h+='<div class="two-col" style="margin-top:14px"><div><h3 class="rubric" style="font-size:20px">Состояния</h3><div class="chips">'
   +CONDITIONS.map(cd=>'<span class="chip'+(c.cond.includes(cd.n)?' on':'')+'" title="'+esc(cd.d)+'" onclick="toggleCond(\''+esc(cd.n)+'\')">'+esc(cd.n)+'</span>').join('')
   +'</div></div><div><h3 class="rubric" style="font-size:20px">Спасброски от смерти</h3><div class="death-row">'
   +'<span>Успехи:</span>'+[1,2,3].map(i=>'<input type="checkbox"'+(c.deaths.s>=i?' checked':'')+' onchange="setDeath(\'s\','+i+',this.checked)">').join('')
   +'<span style="margin-left:12px">Провалы:</span>'+[1,2,3].map(i=>'<input type="checkbox"'+(c.deaths.f>=i?' checked':'')+' onchange="setDeath(\'f\','+i+',this.checked)">').join('')
   +'</div></div></div>';
  return h+'</div>';
}

const sheetSearch={inv:'',sp:'',ab:''};
const quickForm={inv:false,sp:false,ab:false};
function isEquipped(c,entryId){ return Object.values(c.equipment||{}).includes(entryId); }
function invQty(entryId,d){ const c=cc(); const e=c.inventory.find(x=>x.id===entryId); if(!e) return;
  e.qty=Math.max(1,(e.qty||1)+d); scheduleSave(); renderChars(); }
function invDel(entryId){ const c=cc(); const e=c.inventory.find(x=>x.id===entryId); if(!e) return;
  const it=itemOf(e.itemId);
  if(!confirm('Убрать «'+(it?it.n:'предмет')+'» из инвентаря?')) return;
  Object.keys(c.equipment).forEach(s=>{ if(c.equipment[s]===entryId) delete c.equipment[s]; });
  c.inventory=c.inventory.filter(x=>x.id!==entryId); scheduleSave(); renderChars(); }
function invEquipToggle(entryId){
  const c=cc(); const e=c.inventory.find(x=>x.id===entryId); if(!e) return;
  const it=itemOf(e.itemId); if(!it) return;
  if(isEquipped(c,entryId)){
    Object.keys(c.equipment).forEach(s=>{ if(c.equipment[s]===entryId) delete c.equipment[s]; });
  } else {
    if(!it.slot){ alert('У этого предмета нет слота экипировки. Назначьте слот в базе предметов (✎).'); return; }
    const clear=id=>Object.keys(c.equipment).forEach(s=>{ if(c.equipment[s]===id) delete c.equipment[s]; });
    if(it.slot==='TWO_HAND'){ clear(c.equipment.MAIN_HAND); clear(c.equipment.OFF_HAND);
      c.equipment.MAIN_HAND=entryId; c.equipment.OFF_HAND=entryId; }
    else if(it.slot==='RING'){ if(!c.equipment.RING_L) c.equipment.RING_L=entryId;
      else if(!c.equipment.RING_R) c.equipment.RING_R=entryId;
      else { clear(c.equipment.RING_L); c.equipment.RING_L=entryId; } }
    else if(it.slot==='MAIN_HAND'){ const other=c.equipment.MAIN_HAND;
      if(other){ const oit=itemOf((c.inventory.find(x=>x.id===other)||{}).itemId);
        if(oit&&oit.slot==='TWO_HAND') clear(other); }
      c.equipment.MAIN_HAND=entryId; }
    else { c.equipment[it.slot]=entryId; }
  }
  scheduleSave(); renderChars();
}
function addInvFromDB(itemId){
  const c=cc(); if(!c) return;

  if(ex) ex.qty=(ex.qty||1)+1;
  else c.inventory.push({id:'inv_'+uid(), itemId, qty:1, notes:''});
  sheetSearch.inv=''; scheduleSave(); renderChars();
}

      const canEq=!!it.slot;
      const extra='<span class="qty-box"><button class="mini-btn" onclick="invQty(\''+e.id+'\',-1)">−</button><b>'+(e.qty||1)+'</b><button class="mini-btn" onclick="invQty(\''+e.id+'\',1)">+</button></span>'
       +(canEq?'<button class="btn '+(eq?'':'ghost ')+'sm" onclick="invEquipToggle(\''+e.id+'\')">'+(eq?'Надето ✓':'Надеть')+'</button>':'')
       +'<button class="btn ghost sm" title="Править в базе предметов" onclick="jumpToItemEd(\''+it.id+'\')">✎</button>'
       +'<button class="del-x" onclick="invDel(\''+e.id+'\')">✕</button>';
      h+=itemCardHTML(it, extra);
    });
  });
  if(!c.inventory.length) h+='<div class="empty-scroll"><span class="big">❦</span>Инвентарь пуст — карманы героя ждут добычи.</div>';
  return h+'</div>';
}

/* ── Подвкладка: Экипировка ── */
let selSlot=null;
function pickSlot(s){ selSlot=(selSlot===s)?null:s; renderChars(); }
function equipToSlot(cellId,entryId){
  const c=cc(); const e=c.inventory.find(x=>x.id===entryId); if(!e) return;
  const it=itemOf(e.itemId); if(!it) return;
  const clear=id=>{ if(!id) return; Object.keys(c.equipment).forEach(s=>{ if(c.equipment[s]===id) delete c.equipment[s]; }); };
  clear(entryId);
  if(it.slot==='TWO_HAND'){ clear(c.equipment.MAIN_HAND); clear(c.equipment.OFF_HAND);
    c.equipment.MAIN_HAND=entryId; c.equipment.OFF_HAND=entryId; }
  else { const occ=c.equipment[cellId];
    if(occ){ const oit=itemOf((c.inventory.find(x=>x.id===occ)||{}).itemId);
      if(oit&&oit.slot==='TWO_HAND') clear(occ); else delete c.equipment[cellId]; }
    c.equipment[cellId]=entryId; }
  selSlot=null; scheduleSave(); renderChars();
}
function unequipSlot(cellId){
  const c=cc(); const id=c.equipment[cellId]; if(!id) return;
  Object.keys(c.equipment).forEach(s=>{ if(c.equipment[s]===id) delete c.equipment[s]; });
  scheduleSave(); renderChars();
}
function stEquipment(c){
  let h='<div class="panel"><h3 class="rubric" style="font-size:22px;color:var(--gold)">○ Экипировка персонажа</h3>'
   +'<div class="mannequin">';
  EQUIP_SLOTS.forEach(s=>{
    const entryId=c.equipment[s.id];
    const e=entryId?c.inventory.find(x=>x.id===entryId):null;
    const it=e?itemOf(e.itemId):null;
    h+='<div class="slot-cell'+(it?' filled':'')+(selSlot===s.id?' sel':'')+'" style="'+s.pos+'" onclick="pickSlot(\''+s.id+'\')">'
     +'<div class="sic">'+s.ic+'</div><div class="sname">'+s.n+'</div>'
     +(it?'<div class="sitem">'+esc(it.n)+'</div>':'')+'</div>';
  });
  h+='</div>';
  if(selSlot){
    const s=EQUIP_SLOTS.find(x=>x.id===selSlot);
    const entryId=c.equipment[selSlot];
    h+='<div class="slot-pick panel"><h3 class="rubric" style="font-size:19px">'+s.n+'</h3>';
    if(entryId){
      const it=itemOf((c.inventory.find(x=>x.id===entryId)||{}).itemId);
      h+='<div class="row-line"><span>Надето: <b>'+esc(it?it.n:'?')+'</b></span><span class="grow"></span>'
       +'<button class="btn ghost sm" onclick="unequipSlot(\''+selSlot+'\')">Снять</button></div>';
    }
    const fits=c.inventory.filter(e=>{ const it=itemOf(e.itemId); return it&&slotAccepts(selSlot,it.slot)&&c.equipment[selSlot]!==e.id; });
    if(fits.length){
      h+='<div style="margin-top:6px">'+fits.map(e=>{ const it=itemOf(e.itemId);
        return '<div class="spell-hit" onclick="equipToSlot(\''+selSlot+'\',\''+e.id+'\')"><span><b>'+esc(it.n)+'</b> <span style="font-size:13px;color:var(--ink-faint)">'+esc(ITEM_SLOT_RU[it.slot]||'')+'</span></span><span style="color:var(--gold)">надеть →</span></div>'; }).join('')+'</div>';
    } else if(!entryId){
      h+='<p class="note-ital" style="font-size:14px">В инвентаре нет предметов, подходящих к этому слоту.</p>';
    }
    h+='</div>';
  } else {
    h+='<p class="note-ital" style="text-align:center;margin-top:10px;font-size:14px">Кликните на слот, чтобы надеть или снять предмет.</p>';
  }
  return h+'</div>';
}

/* ── Подвкладка: Заклинания ── */
const bookFlt={q:'',l:'',prep:''};
function addSpellFromDB(spellId){
  const c=cc(); if(!c) return;
  if(!c.spellbook.some(x=>x.spellId===spellId)) c.spellbook.push({spellId, prep:false});
  sheetSearch.sp=''; scheduleSave(); renderChars();
}
function delBookSpell(spellId){ const c=cc(); if(!c) return;
  c.spellbook=c.spellbook.filter(x=>x.spellId!==spellId); scheduleSave(); renderChars(); }
function togglePrep(spellId){ const c=cc(); const e=c.spellbook.find(x=>x.spellId===spellId); if(!e) return;
  e.prep=!e.prep; scheduleSave(); renderChars(); }
function quickAddSpell(){
  const g=id=>document.getElementById(id);
  const n=g('qsN').value.trim(); if(!n){ alert('Заклинанию нужно имя.'); return; }
  const sp={id:'sp_'+uid(), n, l:Math.max(0,Math.min(9,+g('qsL').value||0)), s:g('qsS').value,
    c:'', t:g('qsT').value.trim(), r:g('qsR').value.trim(), cm:g('qsCm').value.trim(), d:g('qsD').value.trim(),
    ritual:false, conc:g('qsConc').checked, custom:true, tags:[], x:g('qsX').value, hi:''};
  spellsDB.push(sp);
  cc().spellbook.push({spellId:sp.id, prep:false});
  quickForm.sp=false; scheduleSave(); renderChars();
}
function slotGem(lv,i){
  const c=cc(); const s=c.slots[lv]; if(!s) return;
  /* клик по камню: потратить до этого камня или восстановить */
  s.cur = (i<=s.cur) ? i-1 : i;
  s.cur=Math.max(0,Math.min(s.max,s.cur));
  scheduleSave(); renderChars();
}
function setSlotMax(lv){
  const c=cc(); const cur=(c.slots[lv]||{max:0}).max;
  const v=prompt('Число ячеек '+lv+' круга (0 — убрать):', cur);
  if(v===null) return;
  const m=Math.max(0,Math.min(9,+v||0));
  if(m===0) delete c.slots[lv];
  else c.slots[lv]={max:m, cur:Math.min(m,(c.slots[lv]||{cur:m}).cur)};
  scheduleSave(); renderChars();
}
function suggestSlots(){
  const c=cc(); if(!c) return;
  const row=FULL_SLOTS[c.level]||[];
  c.slots={}; row.forEach((m,i)=>{ if(m>0) c.slots[i+1]={max:m,cur:m}; });
  scheduleSave(); renderChars();
}
function longRest(){
  const c=cc(); if(!c) return;
  Object.keys(c.slots).forEach(l=>{ c.slots[l].cur=c.slots[l].max; });
  c.abilities.forEach(a=>{ const db=abilityOf(a.abilityId); if(db&&db.uses!=null) a.cur=db.uses; });
  c.hp=c.hpMax; c.hpTemp=0; c.exhaustion=Math.max(0,c.exhaustion-1); c.deaths={s:0,f:0};
  scheduleSave(); renderChars();
}
function stSpells(c){
  let h='<div class="panel">';
  /* ячейки */
  h+='<div class="row-line"><h3 class="rubric" style="font-size:22px;margin:0">Ячейки заклинаний</h3><span class="grow"></span>'
   +'<button class="btn ghost sm" onclick="suggestSlots()">По таблице заклинателя</button>'
   +'<button class="btn ghost sm" onclick="longRest()">☾ Долгий отдых</button></div>';
  const lvls=Object.keys(c.slots).map(Number).sort((a,b)=>a-b);
  h+='<div class="slots-row">';
  lvls.forEach(lv=>{
    const s=c.slots[lv];
    h+='<div class="slot-lv"><span class="lvt">'+lv+' круг</span>';
    for(let i=1;i<=s.max;i++) h+='<button class="slot-gem'+(i>s.cur?' spent':'')+'" title="потратить/восстановить" onclick="slotGem('+lv+','+i+')">'+(i>s.cur?'◇':'◆')+'</button>';
    h+='<button class="mini-btn" title="изменить число ячеек" onclick="setSlotMax('+lv+')">…</button></div>';
  });
  h+='<div class="slot-lv"><button class="btn ghost sm" onclick="setSlotMax(prompt(\'Какой круг добавить (1–9)?\',\''+(lvls.length?lvls[lvls.length-1]+1:1)+'\')||0)">✚ круг</button></div></div>';
  /* добавление */
  h+='<div class="db-bar"><input type="text" placeholder="Найти заклинание в гримуаре мира и вписать в книгу…" value="'+esc(sheetSearch.sp)+'" oninput="sheetSearch.sp=this.value;renderChars();const f=document.querySelector(\'#tab-chars .db-bar input\');if(f){f.focus();f.setSelectionRange(f.value.length,f.value.length)}">'
   +'<button class="btn ghost sm" onclick="quickForm.sp=!quickForm.sp;renderChars()">✚ Своё</button></div>';
  if(sheetSearch.sp.trim().length>1){
    const q=sheetSearch.sp.toLowerCase();
    const inBook=new Set(c.spellbook.map(x=>x.spellId));
    const hits=spellsDB.filter(sp=>sp.n.toLowerCase().includes(q)&&!inBook.has(sp.id)).slice(0,10);
    h+=hits.length?hits.map(sp=>'<div class="spell-hit" onclick="addSpellFromDB(\''+sp.id+'\')"><span><b>'+esc(sp.n)+'</b> <span style="font-size:13px;color:var(--ink-faint)">'+(sp.l===0?'заговор':sp.l+' круг')+', '+esc(sp.s)+'</span></span><span style="color:var(--gold)">+ вписать</span></div>').join('')
      :'<p class="note-ital" style="font-size:14px">В гримуаре мира такого нет — создайте своё.</p>';
  }
  if(quickForm.sp){
    h+='<div class="editor"><h3>Быстрое создание заклинания</h3><div class="f-grid">'
     +'<div><label>Название</label><input type="text" id="qsN"></div>'
     +'<div><label>Круг (0 = заговор)</label><input type="number" id="qsL" min="0" max="9" value="0"></div>'
     +'<div><label>Школа</label><select id="qsS">'+SPELL_SCHOOLS.map(s=>'<option>'+s+'</option>').join('')+'</select></div>'
     +'<div><label>Время</label><input type="text" id="qsT" value="1 действие"></div>'
     +'<div><label>Дистанция</label><input type="text" id="qsR"></div>'
     +'<div><label>Компоненты</label><input type="text" id="qsCm" value="В, С"></div>'
     +'<div><label>Длительность</label><input type="text" id="qsD" value="Мгновенная"></div></div>'
     +'<label style="display:inline-flex;gap:6px;align-items:center"><input type="checkbox" id="qsConc"> Концентрация</label>'
     +'<label>Описание</label><textarea id="qsX"></textarea>'
     +'<button class="btn rub" onclick="quickAddSpell()">Создать и вписать</button> '
     +'<button class="btn ghost" onclick="quickForm.sp=false;renderChars()">Отменить</button>'
     +'<p class="note-ital" style="font-size:13px;margin-top:6px">Ярлыки и «На больших уровнях» — в полной форме на вкладке «Заклинания».</p></div>';
  }
  /* фильтры книги */
  h+='<div class="db-bar" style="margin-top:8px">'
   +'<input type="text" placeholder="Поиск в книге героя…" value="'+esc(bookFlt.q)+'" oninput="bookFlt.q=this.value;renderChars();const fs=document.querySelectorAll(\'#tab-chars .db-bar input\');const f=fs[fs.length-1];if(f){f.focus();f.setSelectionRange(f.value.length,f.value.length)}">'
   +'<select onchange="bookFlt.l=this.value;renderChars()"><option value="">Все круги</option><option value="0"'+(bookFlt.l==='0'?' selected':'')+'>Заговоры</option>'
   +[1,2,3,4,5,6,7,8,9].map(l=>'<option value="'+l+'"'+(bookFlt.l===String(l)?' selected':'')+'>'+l+' круг</option>').join('')+'</select>'
   +'<select onchange="bookFlt.prep=this.value;renderChars()"><option value="">Все</option>'
   +'<option value="1"'+(bookFlt.prep==='1'?' selected':'')+'>Подготовленные</option>'
   +'<option value="0"'+(bookFlt.prep==='0'?' selected':'')+'>Неподготовленные</option></select></div>';
  /* книга по кругам */
  const entries=c.spellbook.map(e=>({e, sp:spellOf(e.spellId)})).filter(x=>x.sp)
    .filter(x=>(!bookFlt.q||x.sp.n.toLowerCase().includes(bookFlt.q.toLowerCase()))
      &&(bookFlt.l===''||x.sp.l===+bookFlt.l)
      &&(bookFlt.prep===''||(bookFlt.prep==='1')===(x.sp.l===0?true:!!x.e.prep)))
    .sort((a,b)=>a.sp.l-b.sp.l||a.sp.n.localeCompare(b.sp.n,'ru'));
  if(!entries.length){ h+='<div class="empty-scroll"><span class="big">❦</span>Книга заклинаний пуста.</div>'; return h+'</div>'; }
  let lastL=-1;
  entries.forEach(x=>{
    if(x.sp.l!==lastL){ lastL=x.sp.l;
      h+='<h3 class="rubric" style="font-size:21px;margin-top:12px">'+(lastL===0?'Заговоры':lastL+' круг')+'</h3>'; }
    const extra=(x.sp.l>0?'<button class="btn ghost sm prep-btn'+(x.e.prep?' on':'')+'" onclick="togglePrep(\''+x.sp.id+'\')">'+(x.e.prep?'Подготовлено ✓':'Подготовить')+'</button>':'')
     +'<button class="btn ghost sm" title="Править в гримуаре мира" onclick="switchTab(\'spellsdb\');openSpellEd(\''+x.sp.id+'\')">✎</button>'
     +'<button class="del-x" title="Вычеркнуть из книги героя" onclick="delBookSpell(\''+x.sp.id+'\')">✕</button>';
    h+=spellCardHTML(x.sp, extra);
  });
  return h+'</div>';
}

/* ── Подвкладка: Способности ── */
const abFlt={cat:'all',q:''};
function addAbilityFromDB(abilityId){
  const c=cc(); if(!c) return;
  if(!c.abilities.some(x=>x.abilityId===abilityId)){
    const db=abilityOf(abilityId);
    c.abilities.push({abilityId, cur:db&&db.uses!=null?db.uses:null, notes:''});
  }
  sheetSearch.ab=''; scheduleSave(); renderChars();
}
function delCharAbility(abilityId){ const c=cc(); if(!c) return;
  c.abilities=c.abilities.filter(x=>x.abilityId!==abilityId); scheduleSave(); renderChars(); }
function abilityUse(abilityId,d){
  const c=cc(); const e=c.abilities.find(x=>x.abilityId===abilityId); const db=abilityOf(abilityId);
  if(!e||!db||db.uses==null) return;
  if(e.cur==null) e.cur=db.uses;
  e.cur=Math.max(0,Math.min(db.uses,e.cur+d)); scheduleSave(); renderChars();
}
function quickAddAbility(){
  const g=id=>document.getElementById(id);
  const n=g('qaN').value.trim(); if(!n){ alert('Способности нужно имя.'); return; }
  const uv=g('qaUses').value;
  const ab={id:'ab_'+uid(), n, type:g('qaT').value, source:g('qaSrc').value.trim(), custom:true, tags:[],
    uses:uv===''?null:Math.max(0,+uv||0), rest:g('qaRest').value, x:g('qaX').value};
  abilitiesDB.push(ab);
  cc().abilities.push({abilityId:ab.id, cur:ab.uses, notes:''});
  quickForm.ab=false; scheduleSave(); renderChars();
}
function stAbilities(c){
  let h='<div class="panel">';
  const cats=[['all','Все способности'],['class','Классовые'],['racial','Расовые'],['feat','Черты'],['other','Прочие']];
  h+='<div class="subtabs" style="margin-top:0">'+cats.map(x=>'<button class="subtab'+(abFlt.cat===x[0]?' active':'')+'" onclick="abFlt.cat=\''+x[0]+'\';renderChars()">'+x[1]+'</button>').join('')+'</div>';
  h+='<div class="db-bar"><input type="text" placeholder="Найти способность в своде мира и вписать герою…" value="'+esc(sheetSearch.ab)+'" oninput="sheetSearch.ab=this.value;renderChars();const f=document.querySelector(\'#tab-chars .db-bar input\');if(f){f.focus();f.setSelectionRange(f.value.length,f.value.length)}">'
   +'<button class="btn ghost sm" onclick="quickForm.ab=!quickForm.ab;renderChars()">✚ Своё</button>'
   +'<button class="btn ghost sm" onclick="addRaceTraitsToChar()">Вписать черты народа</button></div>';
  if(sheetSearch.ab.trim().length>1){
    const q=sheetSearch.ab.toLowerCase();
    const has=new Set(c.abilities.map(x=>x.abilityId));
    const hits=abilitiesDB.filter(ab=>ab.n.toLowerCase().includes(q)&&!has.has(ab.id)).slice(0,10);
    h+=hits.length?hits.map(ab=>'<div class="spell-hit" onclick="addAbilityFromDB(\''+ab.id+'\')"><span><b>'+esc(ab.n)+'</b> <span style="font-size:13px;color:var(--ink-faint)">'+esc(ABILITY_TYPES[ab.type]||'')+(ab.source?', '+esc(ab.source):'')+'</span></span><span style="color:var(--gold)">+ вписать</span></div>').join('')
      :'<p class="note-ital" style="font-size:14px">В своде мира такого нет — создайте своё.</p>';
  }
  if(quickForm.ab){
    h+='<div class="editor"><h3>Быстрое создание способности</h3><div class="f-grid">'
     +'<div><label>Название</label><input type="text" id="qaN"></div>'
     +'<div><label>Вид</label><select id="qaT">'+Object.keys(ABILITY_TYPES).map(t=>'<option value="'+t+'">'+ABILITY_TYPES[t]+'</option>').join('')+'</select></div>'
     +'<div><label>Источник</label><input type="text" id="qaSrc"></div>'
     +'<div><label>Использований (пусто — без счёта)</label><input type="number" id="qaUses" min="0"></div>'
     +'<div><label>Восстановление</label><select id="qaRest"><option value="">—</option><option>короткий отдых</option><option>длинный отдых</option><option>раз в день</option><option>особое</option></select></div></div>'
     +'<label>Описание</label><textarea id="qaX"></textarea>'
     +'<button class="btn rub" onclick="quickAddAbility()">Создать и вписать</button> '
     +'<button class="btn ghost" onclick="quickForm.ab=false;renderChars()">Отменить</button></div>';
  }
  const groups=[['racial','Расовые черты'],['class','Классовые способности'],['feat','Черты'],['other','Особые']];
  let shown=0;
  groups.forEach(gr=>{
    if(abFlt.cat!=='all'&&abFlt.cat!==gr[0]) return;
    const list=c.abilities.map(e=>({e, ab:abilityOf(e.abilityId)})).filter(x=>x.ab&&x.ab.type===gr[0])
      .sort((a,b)=>a.ab.n.localeCompare(b.ab.n,'ru'));
    if(!list.length) return;
    h+='<h3 class="rubric" style="font-size:22px;margin-top:12px">'+gr[1]+'</h3>';
    list.forEach(x=>{
      let uses='';
      if(x.ab.uses!=null){
        const cur=x.e.cur==null?x.ab.uses:x.e.cur;
        uses='<span class="uses-box"><button class="mini-btn" onclick="abilityUse(\''+x.ab.id+'\',-1)">−</button>'
          +cur+' / '+x.ab.uses+'<button class="mini-btn" onclick="abilityUse(\''+x.ab.id+'\',1)">+</button>'
          +(x.ab.rest?'<span style="font-style:italic">'+esc(x.ab.rest)+'</span>':'')+'</span>';
      }
      const extra=uses
       +'<button class="btn ghost sm" title="Править в своде мира" onclick="switchTab(\'abilitiesdb\');openAbilityEd(\''+x.ab.id+'\')">✎</button>'
       +'<button class="del-x" onclick="delCharAbility(\''+x.ab.id+'\')">✕</button>';
      h+=abilityCardHTML(x.ab, extra);
      shown++;
    });
  });
  if(!shown) h+='<div class="empty-scroll"><span class="big">❦</span>Здесь пока пусто.</div>';
  return h+'</div>';
}

/* ── Подвкладка: Записи ── */

  return '<div class="panel"><div class="f-grid">'
   +'<div><label class="lbl">Игрок</label><input type="text" value="'+esc(c.player)+'" oninput="updC(\'player\',this.value)"></div>'
   +'<div><label class="lbl">Языки</label><input type="text" value="'+esc(c.langs)+'" oninput="updC(\'langs\',this.value)"></div></div>'

}
