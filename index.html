<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D World — Развитие персонажей</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --parch:#efe3c2; --parch-2:#e6d4a8; --parch-3:#dcc794; --sheet:#f4ead0;
  --ink:#2b1d10; --ink-soft:#5c452c; --ink-faint:#8a7250;
  --rubric:#7d1f16; --rubric-dk:#5e150e;
  --gold:#96762c; --gold-lt:#c9a84c;
  --frame:#7a5c33; --frame-dk:#513c1e;
  --wax:#8e2318; --wax-dk:#5f130c;
  --ok:#3f6b34;
  --serif:'Cormorant Garamond',Georgia,'Times New Roman',serif;
  --disp:'IM Fell English SC','Cormorant Garamond',Georgia,serif;
  --fell:'IM Fell English','Cormorant Garamond',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-color:var(--frame) var(--parch-2)}
body{
  font-family:var(--serif);font-weight:500;font-size:17px;line-height:1.45;color:var(--ink);
  background:
    radial-gradient(ellipse at 20% 10%, rgba(255,250,230,.55), transparent 55%),
    radial-gradient(ellipse at 85% 90%, rgba(120,85,40,.18), transparent 60%),
    radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0), rgba(60,40,15,.22) 140%),
    var(--parch);
  min-height:100vh;padding:14px 10px 40px;
}
::selection{background:var(--gold-lt);color:var(--ink)}
.wrap{max-width:1180px;margin:0 auto}

/* ── Шапка ── */
.masthead{
  position:relative;text-align:center;padding:26px 16px 18px;
  border:3px double var(--frame);outline:1px solid var(--frame-dk);outline-offset:4px;
  background:linear-gradient(180deg,rgba(255,248,225,.5),rgba(190,160,105,.18)),var(--parch-2);
  box-shadow:0 3px 14px rgba(60,40,10,.25), inset 0 0 60px rgba(120,85,40,.18);
  margin-bottom:18px;
}
.masthead .corner{position:absolute;font-size:22px;color:var(--gold);line-height:1}
.corner.tl{top:6px;left:10px}.corner.tr{top:6px;right:10px}
.corner.bl{bottom:6px;left:10px}.corner.br{bottom:6px;right:10px}
h1.title{
  font-family:var(--disp);font-weight:400;font-size:clamp(28px,4.6vw,46px);
  letter-spacing:.06em;color:var(--rubric);text-shadow:0 1px 0 rgba(255,245,215,.7);
}
.subtitle{font-family:var(--fell);font-style:italic;font-size:18px;color:var(--ink-soft);margin-top:2px}
.rule-flourish{display:flex;align-items:center;gap:12px;justify-content:center;margin:10px auto 0;max-width:520px;color:var(--gold)}
.rule-flourish::before,.rule-flourish::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* ── Панель костей и утилит ── */
.toolrow{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;margin-top:14px}
.dicebox{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:6px 10px;border:1px solid var(--frame);background:rgba(255,248,225,.45)}
.dicebox .lbl{font-family:var(--disp);font-size:14px;color:var(--ink-soft);margin-right:2px}
.die{
  font-family:var(--disp);font-size:15px;min-width:44px;padding:4px 8px;cursor:pointer;
  color:var(--sheet);background:linear-gradient(180deg,#8a6a3a,#5f4520);
  border:1px solid var(--frame-dk);box-shadow:inset 0 1px 0 rgba(255,235,190,.4),0 2px 3px rgba(50,30,5,.35);
}
.die:hover{background:linear-gradient(180deg,#9b7a45,#6d5228)}
.die:active{transform:translateY(1px)}
#diceOut{font-family:var(--fell);font-style:italic;min-width:120px;color:var(--rubric);font-size:17px}
.util-btns{display:flex;gap:6px}

/* ── Навигация-закладки ── */
nav.tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:0;padding:0 12px}
.tab{
  font-family:var(--disp);font-size:16px;letter-spacing:.04em;cursor:pointer;
  padding:8px 16px 10px;border:1px solid var(--frame);border-bottom:none;
  background:linear-gradient(180deg,var(--parch-2),var(--parch-3));color:var(--ink-soft);
  clip-path:polygon(6px 0,calc(100% - 6px) 0,100% 100%,0 100%);
  position:relative;top:1px;
}
.tab:hover{color:var(--rubric)}
.tab.active{
  background:linear-gradient(180deg,var(--sheet),var(--parch));color:var(--rubric);
  font-weight:400;box-shadow:0 -2px 6px rgba(90,60,20,.2);
}

/* ── Основной лист ── */
main.leaf{
  border:3px double var(--frame);
  background:
    radial-gradient(ellipse at 8% 4%, rgba(150,110,55,.10), transparent 40%),
    radial-gradient(ellipse at 94% 96%, rgba(150,110,55,.12), transparent 40%),
    linear-gradient(180deg,rgba(255,250,232,.5),rgba(205,175,120,.14)),
    var(--sheet);
  box-shadow:0 4px 18px rgba(60,40,10,.28), inset 0 0 80px rgba(130,95,45,.14);
  padding:22px 24px 30px;min-height:60vh;
}
@media(max-width:640px){main.leaf{padding:14px 10px 22px}}

/* ── Рубрики ── */
h2.rubric{
  font-family:var(--disp);font-weight:400;font-size:clamp(22px,3vw,30px);color:var(--rubric);
  display:flex;align-items:center;gap:14px;margin:4px 0 14px;
}
h2.rubric::before,h2.rubric::after{content:"";flex:1;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
h3.sub{
  font-family:var(--disp);font-weight:400;font-size:19px;color:var(--ink);
  border-bottom:1px solid var(--gold);padding-bottom:3px;margin:18px 0 10px;letter-spacing:.03em;
}
h3.sub .fl{color:var(--gold);margin-right:6px}
.note-ital{font-family:var(--fell);font-style:italic;color:var(--ink-soft)}

/* ── Кнопки ── */
.btn{
  font-family:var(--disp);font-size:15px;letter-spacing:.03em;cursor:pointer;padding:7px 16px;
  color:var(--sheet);background:linear-gradient(180deg,#8a6a3a,#5f4520);
  border:1px solid var(--frame-dk);box-shadow:inset 0 1px 0 rgba(255,235,190,.4),0 2px 3px rgba(50,30,5,.3);
}
.btn:hover{background:linear-gradient(180deg,#9b7a45,#6d5228)}
.btn:active{transform:translateY(1px)}
.btn.rub{background:linear-gradient(180deg,#8e2c20,#63160d);border-color:#4a0f08}
.btn.rub:hover{background:linear-gradient(180deg,#a13527,#742015)}
.btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--frame);box-shadow:none}
.btn.ghost:hover{color:var(--rubric);border-color:var(--rubric)}
.btn.sm{font-size:13px;padding:3px 10px}
.btn.xs{font-size:12px;padding:1px 8px}

/* ── Поля ввода ── */
input,select,textarea{
  font-family:var(--serif);font-weight:500;font-size:16px;color:var(--ink);
  background:rgba(255,251,238,.75);border:1px solid var(--frame);padding:5px 8px;
  box-shadow:inset 0 1px 3px rgba(90,60,20,.18);
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold-lt);outline-offset:1px}
input[type=number]{width:74px;text-align:center}
input[type=checkbox]{width:17px;height:17px;accent-color:var(--rubric);box-shadow:none;cursor:pointer}
textarea{width:100%;min-height:90px;resize:vertical;line-height:1.4}
label.f{display:flex;flex-direction:column;gap:3px;font-size:13px;color:var(--ink-soft)}
label.f b{font-family:var(--disp);font-weight:400;letter-spacing:.05em;font-size:12.5px;text-transform:uppercase}

/* ── Таблицы ── */
table.ms{width:100%;border-collapse:collapse;margin:8px 0 16px;font-size:15.5px}
table.ms th{
  font-family:var(--disp);font-weight:400;letter-spacing:.05em;font-size:14px;text-align:left;
  color:var(--sheet);background:linear-gradient(180deg,#7a5c33,#513c1e);padding:6px 9px;border:1px solid var(--frame-dk);
}
table.ms td{padding:5px 9px;border:1px solid rgba(122,92,51,.5);vertical-align:top}
table.ms tr:nth-child(even) td{background:rgba(160,125,70,.09)}
table.ms tr:hover td{background:rgba(150,118,44,.14)}
.table-scroll{overflow-x:auto}

/* ── Карточки ── */
.grid{display:grid;gap:12px}
.grid.c2{grid-template-columns:repeat(auto-fill,minmax(330px,1fr))}
.grid.c3{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
.card{
  border:1px solid var(--frame);background:linear-gradient(180deg,rgba(255,250,235,.6),rgba(205,175,120,.12));
  box-shadow:0 2px 6px rgba(70,45,10,.18);padding:12px 14px;position:relative;
}
.card::before{content:"";position:absolute;inset:3px;border:1px solid rgba(150,118,44,.35);pointer-events:none}
.card h4{font-family:var(--disp);font-weight:400;font-size:18px;color:var(--rubric);margin-bottom:4px}
.card .meta{font-size:13.5px;color:var(--ink-soft);font-style:italic;font-family:var(--fell)}
.card ul{margin:6px 0 0 18px;font-size:15px}
.card li{margin-bottom:2px}
.card.clickable{cursor:pointer}
.card.clickable:hover{border-color:var(--rubric);box-shadow:0 3px 10px rgba(125,31,22,.25)}

/* ── Персонажи: список ── */
.char-card{display:flex;gap:12px;align-items:center}
.sigil{
  flex:0 0 54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-size:26px;color:var(--sheet);
  background:radial-gradient(circle at 35% 30%,#b23a2b,var(--wax) 60%,var(--wax-dk));
  border:2px solid var(--wax-dk);box-shadow:0 2px 5px rgba(60,10,5,.5), inset 0 -3px 6px rgba(0,0,0,.35);
}
.char-card .cc-main{flex:1;min-width:0}
.char-card .cc-name{font-family:var(--disp);font-size:19px;color:var(--rubric)}
.char-card .cc-line{font-size:14px;color:var(--ink-soft);font-style:italic;font-family:var(--fell)}
.lvlup-badge{
  display:inline-block;font-family:var(--disp);font-size:12px;color:var(--sheet);
  background:linear-gradient(180deg,#8e2c20,#63160d);padding:1px 8px;margin-left:6px;letter-spacing:.04em;
}

/* ── Лист персонажа ── */
.sheet-head{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:14px}
.sheet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;align-items:start}
.panel{
  border:1px solid var(--frame);padding:12px 14px;
  background:linear-gradient(180deg,rgba(255,250,235,.55),rgba(205,175,120,.10));
  box-shadow:inset 0 0 24px rgba(140,105,50,.10);
}
.panel h3{margin-top:0}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:10px;margin:6px 0 4px}
.seal{
  text-align:center;padding:10px 4px 8px;position:relative;
  background:radial-gradient(circle at 35% 28%, #f7efd8, #e8d7ac 70%, #d8c188);
  border-radius:50% 50% 48% 52%/55% 52% 48% 45%;
  border:2px solid var(--frame);box-shadow:0 2px 5px rgba(70,45,10,.3), inset 0 -4px 8px rgba(120,85,40,.25);
}
.seal .sn{font-family:var(--disp);font-size:13px;letter-spacing:.08em;color:var(--rubric)}
.seal input{width:56px;font-size:20px;font-weight:700;text-align:center;background:transparent;border:none;box-shadow:none;padding:1px}
.seal input:focus{outline:1px dashed var(--gold)}
.seal .md{font-family:var(--fell);font-size:16px;font-style:italic;color:var(--ink-soft);border-top:1px solid var(--gold);margin:2px 10px 0;padding-top:1px}
.combat-row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
.hp-btns{display:flex;gap:4px;margin-top:4px}
.prof-list{columns:2;column-gap:18px;font-size:15px}
@media(max-width:520px){.prof-list{columns:1}}
.prof-item{display:flex;align-items:baseline;gap:6px;padding:1px 0;break-inside:avoid;cursor:pointer;user-select:none}
.prof-item .dot{font-size:13px;width:15px;color:var(--ink-faint)}
.prof-item.p1 .dot{color:var(--rubric)}
.prof-item.p2 .dot{color:var(--gold)}
.prof-item .bns{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}
.prof-item:hover{color:var(--rubric)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  font-size:13.5px;padding:2px 10px;border:1px solid var(--frame);cursor:pointer;user-select:none;
  background:rgba(255,250,235,.5);color:var(--ink-soft);border-radius:2px;
}
.chip.on{background:linear-gradient(180deg,#8e2c20,#63160d);color:var(--sheet);border-color:var(--wax-dk)}
.row-line{display:flex;gap:6px;align-items:center;margin-bottom:5px;flex-wrap:wrap}
.row-line input.grow{flex:1;min-width:110px}
.del-x{
  cursor:pointer;color:var(--rubric);font-family:var(--disp);border:1px solid transparent;
  background:none;font-size:15px;padding:2px 6px;box-shadow:none;
}
.del-x:hover{border-color:var(--rubric)}
.spell-hit{display:flex;justify-content:space-between;gap:8px;padding:3px 6px;border-bottom:1px dashed rgba(122,92,51,.4);cursor:pointer;font-size:15px}
.spell-hit:hover{background:rgba(150,118,44,.14)}
.death-row{display:flex;gap:14px;align-items:center;font-size:14px;flex-wrap:wrap}
.gold-row{display:flex;gap:8px;flex-wrap:wrap}
.gold-row label.f{align-items:center}
.gold-row input{width:64px}
.save-status{font-family:var(--fell);font-style:italic;font-size:14px;color:var(--ok);min-height:18px;text-align:right}

/* ── Фильтры заклинаний ── */
.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-bottom:10px}
.school-tag{font-size:12.5px;color:var(--sheet);background:var(--gold);padding:0 7px;font-family:var(--disp);letter-spacing:.03em;white-space:nowrap}

/* ── Развороты классов ── */
details.classfold{border:1px solid var(--frame);margin-bottom:10px;background:linear-gradient(180deg,rgba(255,250,235,.55),rgba(205,175,120,.10))}
details.classfold summary{
  font-family:var(--disp);font-size:19px;color:var(--rubric);cursor:pointer;padding:9px 14px;list-style:none;
  display:flex;align-items:center;gap:10px;
}
details.classfold summary::before{content:"❧";color:var(--gold);transition:transform .2s}
details.classfold[open] summary::before{transform:rotate(90deg)}
details.classfold summary .hint{font-family:var(--fell);font-style:italic;font-size:14px;color:var(--ink-soft);font-weight:400;margin-left:auto}
details.classfold .fold-body{padding:4px 16px 14px;border-top:1px dashed rgba(122,92,51,.5)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}
.lv-feats{columns:2;column-gap:20px;font-size:14.5px}
@media(max-width:700px){.lv-feats{columns:1}}
.lv-feats div{break-inside:avoid;padding:1px 0}
.lv-feats b{color:var(--rubric);font-variant-numeric:tabular-nums}

/* ── Журнал ── */
.journal-entry{margin-bottom:14px}
.journal-entry textarea{min-height:70px}

.empty-scroll{
  text-align:center;padding:40px 20px;color:var(--ink-soft);font-family:var(--fell);font-style:italic;font-size:18px;
}
.empty-scroll .big{font-size:40px;color:var(--gold);display:block;margin-bottom:8px;font-style:normal}
footer.colophon{text-align:center;margin-top:18px;font-family:var(--fell);font-style:italic;color:var(--ink-faint);font-size:14px}
.hidden{display:none!important}
@media print{.tabs,.toolrow,.btn,.masthead{display:none}}

/* ═══════════ НОВОЕ: единая книга мастера (интеграция «D&D Нексус») ═══════════ */

/* Цветные ярлыки-печати (теги) */
.tagrow{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.wax-tag{display:inline-block;padding:1px 9px 2px;font-size:12.5px;line-height:1.35;border-radius:3px;
  font-family:var(--serif);font-weight:700;letter-spacing:.02em;color:#fff8ea;
  border:1px solid rgba(40,25,5,.45);box-shadow:inset 0 0 6px rgba(0,0,0,.28),0 1px 2px rgba(60,40,10,.3);
  text-shadow:0 1px 1px rgba(0,0,0,.4)}
.type-tag{display:inline-block;padding:1px 8px;font-size:12px;border:1px solid var(--frame);border-radius:3px;
  background:var(--parch-3);color:var(--ink-soft);font-style:italic}

/* Подвкладки листа персонажа */
.subtabs{display:flex;flex-wrap:wrap;gap:0;border:2px solid var(--frame);background:var(--parch-2);margin:14px 0 12px;
  box-shadow:0 2px 8px rgba(60,40,10,.18)}
.subtab{flex:1 1 auto;min-width:110px;padding:9px 10px;font-family:var(--disp);font-size:16px;letter-spacing:.04em;
  background:transparent;border:none;border-right:1px solid var(--frame);color:var(--ink-soft);cursor:pointer}
.subtab:last-child{border-right:none}
.subtab:hover{background:rgba(150,118,44,.14)}
.subtab.active{background:var(--rubric);color:var(--parch);text-shadow:0 1px 1px rgba(0,0,0,.35)}

/* Карточки характеристик */
.ab-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:8px 0 14px}
@media(max-width:860px){.ab-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.ab-grid{grid-template-columns:repeat(2,1fr)}}
.ab-card{border:2px solid var(--frame);background:linear-gradient(180deg,rgba(255,248,225,.5),rgba(190,160,105,.14)),var(--sheet);
  text-align:center;padding:8px 6px 7px;box-shadow:inset 0 0 14px rgba(120,85,40,.14)}
.ab-card .abn{font-family:var(--disp);font-size:14px;color:var(--rubric);letter-spacing:.05em}
.ab-card .abv{font-family:var(--disp);font-size:30px;line-height:1.05;color:var(--ink)}
.ab-card .abm{font-family:var(--fell);font-style:italic;font-size:16px;color:var(--gold)}
.ab-card .mini{display:flex;gap:4px;justify-content:center;margin-top:4px}
.mini-btn{width:24px;height:22px;border:1px solid var(--frame);background:var(--parch-2);cursor:pointer;
  font-size:13px;line-height:1;color:var(--ink-soft)}
.mini-btn:hover{background:var(--gold-lt);color:var(--ink)}

/* Спасброски и навыки */
.save-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
@media(max-width:720px){.save-grid{grid-template-columns:repeat(2,1fr)}}
.save-pill{display:flex;align-items:center;gap:8px;border:1px solid var(--frame);background:var(--sheet);
  padding:6px 10px;cursor:pointer}
.save-pill:hover{background:var(--parch-2)}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
@media(max-width:760px){.skill-grid{grid-template-columns:1fr}}
.skill-row{display:flex;align-items:center;gap:8px;border:1px solid var(--frame);background:var(--sheet);padding:5px 10px}
.skill-row.trained{background:linear-gradient(180deg,rgba(150,118,44,.16),rgba(150,118,44,.06)),var(--sheet)}
.skill-row .sk-ab{font-size:12px;color:var(--ink-faint);font-style:italic}
.pip{width:15px;height:15px;border:1.5px solid var(--frame-dk);border-radius:50%;flex:none;cursor:pointer;background:var(--parch)}
.pip.p1{background:var(--gold)}
.pip.p2{background:var(--rubric);box-shadow:0 0 0 2px var(--gold-lt) inset}
.bonus-btn{margin-left:auto;font-family:var(--disp);font-size:17px;color:var(--ink);background:none;border:none;
  cursor:pointer;padding:0 2px;min-width:44px;text-align:right}
.bonus-btn:hover{color:var(--rubric)}
.bonus-btn .manual-star{color:var(--rubric);font-size:14px;vertical-align:super}

/* Истощение */
.exh-row{display:flex;align-items:center;gap:10px;border:1px solid var(--frame);background:var(--parch-2);
  padding:8px 12px;margin-top:14px}
.exh-row input[type=range]{flex:1;accent-color:var(--rubric)}

/* Карточки предметов / заклинаний / способностей */
.entry-card{border:2px solid var(--frame);background:linear-gradient(180deg,rgba(255,250,232,.55),rgba(200,170,110,.10)),var(--sheet);
  box-shadow:0 2px 8px rgba(60,40,10,.15), inset 0 0 24px rgba(120,85,40,.08);
  padding:11px 14px;margin-bottom:11px;position:relative}
.entry-card h4{font-family:var(--disp);font-weight:400;font-size:20px;color:var(--rubric);letter-spacing:.03em;display:inline}
.entry-head{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:5px}
.entry-head .spacer{flex:1}
.entry-desc{white-space:pre-wrap;font-size:15.5px;margin:5px 0}
.entry-desc.clamp{max-height:110px;overflow:hidden;position:relative}
.entry-desc.clamp::after{content:"";position:absolute;left:0;right:0;bottom:0;height:36px;

.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 18px;font-size:14.5px;margin:4px 0}

.meta-grid b{color:var(--ink-soft);font-weight:600}
.stat-line{font-size:14.5px;color:var(--ink-soft)}

.props-block{border-top:1px dashed var(--frame);margin-top:6px;padding-top:5px;font-size:14.5px}

.qty-box{display:flex;align-items:center;gap:4px}

.toggle-link{background:none;border:none;color:var(--gold);font-family:var(--fell);font-style:italic;

/* Панель управления базой */
.db-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.db-bar input[type=text],.db-bar select{padding:6px 9px;border:1px solid var(--frame);background:var(--sheet);

.db-bar input[type=text]{flex:1;min-width:160px}

.editor{border:2px double var(--rubric);background:linear-gradient(180deg,rgba(255,248,225,.6),rgba(190,160,105,.16)),var(--parch-2);

.editor textarea{min-height:90px;resize:vertical}
.tag-picker{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0 10px}

.mannequin{position:relative;max-width:560px;margin:0 auto;min-height:560px;
  border:2px solid var(--frame);background:
   radial-gradient(ellipse at 50% 42%, rgba(150,118,44,.13), transparent 62%),
   linear-gradient(180deg,rgba(255,248,225,.4),rgba(190,160,105,.12)),var(--parch-2);
  box-shadow:inset 0 0 40px rgba(120,85,40,.18)}
.mannequin::before{content:"⚜";position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);
  font-size:150px;color:rgba(122,92,51,.14);pointer-events:none}
.slot-cell{position:absolute;width:96px;min-height:74px;border:1.5px solid var(--frame);background:var(--sheet);

.slot-cell.filled{border-color:var(--gold);background:linear-gradient(180deg,rgba(201,168,76,.22),rgba(201,168,76,.06)),var(--sheet)}
.slot-cell.sel{outline:2px solid var(--rubric)}
.slot-cell .sic{font-size:19px;line-height:1.1;color:var(--gold)}
.slot-cell .sname{font-family:var(--disp);font-size:12px;letter-spacing:.03em;color:var(--ink-soft)}
.slot-cell .sitem{font-weight:700;font-size:12.5px;color:var(--rubric);margin-top:2px;word-break:break-word}
.slot-pick{max-width:560px;margin:10px auto 0}

  .mannequin{transform:scale(.82);transform-origin:top center;margin-bottom:-90px}
}

.slots-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.slot-lv{border:1px solid var(--frame);background:var(--parch-2);padding:6px 10px;display:flex;align-items:center;gap:7px}
.slot-lv .lvt{font-family:var(--disp);font-size:14px;color:var(--rubric)}
.slot-gem{cursor:pointer;font-size:17px;color:var(--gold);background:none;border:none;padding:0 1px;line-height:1}
.slot-gem.spent{color:var(--ink-faint)}

/* Использования способностей */
.uses-box{display:flex;align-items:center;gap:5px;font-size:14px;color:var(--ink-soft)}

/* Валюта */
.coin-row{display:flex;flex-wrap:wrap;gap:10px;margin:6px 0 14px}

.coin b{font-family:var(--disp);font-size:14px;color:var(--gold)}
.coin input{width:70px;padding:4px 6px;border:1px solid var(--frame);background:var(--parch);
  font-family:var(--serif);font-size:15px;color:var(--ink);text-align:right}

/* Результат нестандартного броска */
.dice-note{width:88px;padding:5px 7px;border:1px solid var(--frame);background:var(--sheet);
  font-family:var(--serif);font-size:14px;color:var(--ink)}

/* Шапка листа: боевые показатели */
.combat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px;margin:10px 0 4px}
.cbox{border:2px solid var(--frame);background:var(--sheet);text-align:center;padding:7px 6px;

.cbox .cl{font-family:var(--disp);font-size:12.5px;letter-spacing:.05em;color:var(--rubric)}
.cbox .cv{font-family:var(--disp);font-size:24px;color:var(--ink)}
.cbox input{width:60px;text-align:center;border:1px solid var(--frame);background:var(--parch);
  font-family:var(--disp);font-size:20px;color:var(--ink);padding:2px}
.hp-wide{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.prep-btn{font-size:13px;padding:3px 10px}
.prep-btn.on{background:var(--ok);color:var(--parch);border-color:var(--ok)}

/* ─── облачная синхронизация ─── */
.sync-overlay{position:fixed;inset:0;background:rgba(30,22,12,.55);z-index:60;display:flex;align-items:center;justify-content:center;padding:16px}
.sync-box{background:var(--parch);border:2px solid var(--frame-dk);box-shadow:0 12px 40px rgba(0,0,0,.45), inset 0 0 0 1px var(--gold-lt);max-width:560px;width:100%;padding:22px 26px;max-height:92vh;overflow:auto}
.sync-head{font-family:var(--disp);font-size:1.35rem;color:var(--rubric);letter-spacing:.04em;margin-bottom:4px}
.sync-sub{font-style:italic;color:var(--ink-soft);margin-bottom:14px;font-size:.95rem}
.sync-lbl{display:block;font-family:var(--fell);font-size:.8rem;letter-spacing:.06em;color:var(--ink-soft);margin:10px 0 3px}
.sync-inp{width:100%;box-sizing:border-box;font-family:var(--serif);font-size:.95rem;color:var(--ink);background:var(--sheet);border:1px solid var(--frame);padding:7px 10px}
.sync-inp:focus{outline:none;border-color:var(--rubric)}
.sync-btns{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.sync-status{margin-top:10px;font-style:italic;font-size:.9rem;color:var(--ink-soft);min-height:1.2em}
.sync-status.ok{color:var(--ok)}
.sync-status.err{color:var(--rubric)}
.sync-help{margin-top:14px;border-top:1px dashed var(--frame);padding-top:10px;font-size:.92rem}
.sync-help summary{cursor:pointer;font-family:var(--fell);letter-spacing:.04em;color:var(--ink-soft)}
.sync-help ol{margin:10px 0 0 18px;padding:0}
.sync-help li{margin-bottom:7px;line-height:1.45}
.sync-help code{background:var(--sheet);border:1px solid var(--frame);padding:1px 5px;font-size:.85em;word-break:break-all}
.sync-note{margin-top:10px;font-style:italic;color:var(--rubric);font-size:.88rem}
#cloudBtn.cloud-on{color:var(--ok);border-color:var(--ok)}
.db-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-tools{float:right;display:flex;gap:4px}
.fold-tools{float:right;display:flex;gap:4px;margin-left:8px}
.mini{background:transparent;border:1px solid var(--frame);color:var(--ink-soft);cursor:pointer;font-size:.8rem;line-height:1;padding:3px 6px}
.mini:hover{color:var(--rubric);border-color:var(--rubric)}
.chk-row{display:flex;gap:12px;flex-wrap:wrap;margin:4px 0 8px}
.chk{font-size:.9rem;color:var(--ink-soft);white-space:nowrap}
/* ─── профессиональный лист ─── */
.cb-sub{font-size:12px;color:var(--ink-faint);margin-top:3px;display:flex;align-items:center;gap:4px;justify-content:center;flex-wrap:wrap}
.cb-sub .ovr{width:52px;font-size:12px;padding:1px 4px;text-align:center}
.cv.roll,.abm.roll{background:transparent;border:1px dashed var(--frame);cursor:pointer;font-family:var(--disp)}
.cv.roll:hover,.abm.roll:hover{border-color:var(--rubric);color:var(--rubric)}
.roll-sm{background:transparent;border:1px solid var(--frame);color:var(--ink);cursor:pointer;font-size:13px;padding:2px 8px;font-family:var(--serif);white-space:nowrap}
.roll-sm:hover{border-color:var(--rubric);color:var(--rubric)}
.atk-list{display:flex;flex-direction:column;gap:6px;margin:6px 0}
.atk-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--sheet);border:1px solid var(--frame);padding:6px 10px}
.atk-n{font-family:var(--disp);font-size:16px}
.atk-ab{font-size:12px;color:var(--ink-faint);border:1px solid var(--frame);padding:0 6px;border-radius:3px}
.atk-dt{font-size:12.5px;font-style:italic;color:var(--ink-soft);margin-left:auto}
.spell-stats{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--sheet);border:1px dashed var(--frame);padding:7px 10px;margin:8px 0}
.sp-stat b{font-family:var(--disp);font-size:18px;color:var(--rubric)}
.persona-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin:6px 0 12px}
.persona-grid textarea{width:100%;box-sizing:border-box}
.load-row{margin:6px 0 10px;font-size:14.5px;color:var(--ink-soft)}
.load-row.over{color:var(--rubric);font-weight:700}
#advBtn.adv-1{color:var(--ok);border-color:var(--ok)}
#advBtn.adv-2{color:var(--rubric);border-color:var(--rubric)}
/* ─── эффекты ─── */
.fx-line{font-size:12.5px;margin-top:3px;font-style:italic;text-align:center}
.fx-plus{color:var(--ok)}
.fx-minus{color:var(--rubric)}
.fx-note{color:#5e35b1;font-style:italic}
.fx-badge{font-size:12px;font-weight:700;border:1px dashed currentColor;border-radius:3px;padding:0 5px;margin-left:6px;white-space:nowrap}
.fx-panel{display:flex;flex-direction:column;gap:6px;margin:6px 0 4px}
.fx-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;background:var(--sheet);border-left:3px solid #5e35b1;border-top:1px solid var(--frame);border-right:1px solid var(--frame);border-bottom:1px solid var(--frame);padding:6px 10px}
.fx-src{font-family:var(--disp);font-size:15.5px}
.fx-why{font-size:12px;color:var(--ink-faint);font-style:italic}
.fx-items{display:flex;gap:8px;flex-wrap:wrap;font-size:13.5px}
.fx-sep{color:var(--ink-faint)}

.fx-cast.on{background:#5e35b1;color:#fff8ea}
.fx-cast:hover{color:var(--rubric);border-color:var(--rubric)}
.fx-off{opacity:.5;border-left-color:var(--ink-faint)}

<body>
<div class="wrap">
<header class="masthead">
  <span class="corner tl">✠</span><span class="corner tr">✠</span>
  <span class="corner bl">✠</span><span class="corner br">✠</span>
  <h1 class="title">D&amp;D World</h1>
  <div class="subtitle">Летопись развития персонажей · настольная книга гейм-мастера · единое издание с «D&amp;D Нексус»</div>
  <div class="rule-flourish">❦</div>
  <div class="toolrow">
    <div class="dicebox">
      <span class="lbl">Кости:</span>
      <button class="die" onclick="roll(4)">к4</button>
      <button class="die" onclick="roll(6)">к6</button>
      <button class="die" onclick="roll(8)">к8</button>
      <button class="die" onclick="roll(10)">к10</button>
      <button class="die" onclick="roll(12)">к12</button>
      <button class="die" onclick="roll(20)">к20</button>
      <button class="die" onclick="roll(100)">к100</button>
      <input class="dice-note" id="diceNote" placeholder="2к6+3" onkeydown="if(event.key==='Enter')rollNotation()">
      <button class="die" onclick="rollNotation()">⚁ бросить</button>
      <button class="btn ghost sm adv-0" id="advBtn" title="Преимущество/помеха для бросков к20 с листа" onclick="cycleAdv()">⚖ обычный</button>
      <span id="diceOut">—</span>
    </div>
    <div class="util-btns">
      <button class="btn ghost sm" id="cloudBtn" onclick="openSyncModal()">☁ Облако</button>
      <button class="btn ghost sm" onclick="doExport()">Выгрузить летопись</button>
      <button class="btn ghost sm" onclick="document.getElementById('impFile').click()">Загрузить летопись</button>
      <input type="file" id="impFile" accept=".json" class="hidden" onchange="doImport(this)">
    </div>
  </div>
</header>

<nav class="tabs" id="tabsNav">
  <button class="tab active" data-tab="chars" onclick="switchTab('chars')">Персонажи</button>
  <button class="tab" data-tab="races" onclick="switchTab('races')">Расы</button>
  <button class="tab" data-tab="classes" onclick="switchTab('classes')">Классы</button>
  <button class="tab" data-tab="spellsdb" onclick="switchTab('spellsdb')">Заклинания</button>
  <button class="tab" data-tab="itemsdb" onclick="switchTab('itemsdb')">Предметы</button>
  <button class="tab" data-tab="abilitiesdb" onclick="switchTab('abilitiesdb')">Способности</button>
  <button class="tab" data-tab="rules" onclick="switchTab('rules')">Справочник</button>
  <button class="tab" data-tab="journal" onclick="switchTab('journal')">Журнал</button>
</nav>

<main class="leaf">
  <div class="save-status" id="saveStatus"></div>
  <div id="tab-chars"></div>
  <div id="tab-races" class="hidden"></div>
  <div id="tab-classes" class="hidden"></div>
  <div id="tab-spellsdb" class="hidden"></div>
  <div id="tab-itemsdb" class="hidden"></div>
  <div id="tab-abilitiesdb" class="hidden"></div>

</main>

<script>
'use strict';
/* ═══════════════ ВСПОМОГАТЕЛЬНОЕ ═══════════════ */
const esc = s => String(s==null?'':s).replace(/\u0451/g,'\u0435').replace(/\u0401/g,'\u0415').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* Состояния */
const CONDITIONS = [
 {n:'Бессознательный', d:'Существо недееспособно, роняет все, падает ничком; проваливает спасброски Силы и Ловкости; атаки по нему с преимуществом, попадание с 1,5 м — критическое.'},

/* ═══════════════ РАСЫ ═══════════════ */
const RACES_SEED = [
 {n:'Человек', ab:'+1 ко всем характеристикам', sz:'Средний', sp:'9 м',

 {n:'Эльф', ab:'+2 Ловкость', sz:'Средний', sp:'9 м',

function tagChips(ids, dict){
  if(!ids || !ids.length) return '';
  return '<span class="tagrow">'+ids.map(t=>{
    const d=dict[t]; if(!d) return '';
    return '<span class="wax-tag" style="background:'+d.c+'">'+esc(d.ru)+'</span>';
  }).join('')+'</span>';
}
function tagPicker(dict, selected, boxId){
  return '<div class="tag-picker" id="'+boxId+'">'+Object.keys(dict).map(k=>
    '<span class="wax-tag'+(selected.includes(k)?' on':'')+'" data-tag="'+k+'" style="background:'+dict[k].c+'" onclick="this.classList.toggle(\'on\')">'+esc(dict[k].ru)+'</span>'
  ).join('')+'</div>';
}
function pickedTags(boxId){
  return Array.from(document.querySelectorAll('#'+boxId+' .wax-tag.on')).map(e=>e.dataset.tag);
}

/* какие предметные слоты подходят к ячейке манекена */
function slotAccepts(cellId, itemSlot){
  if(!itemSlot) return false;
  if(cellId==='MAIN_HAND') return itemSlot==='MAIN_HAND'||itemSlot==='TWO_HAND';
  if(cellId==='OFF_HAND')  return itemSlot==='OFF_HAND'||itemSlot==='MAIN_HAND';
  if(cellId==='RING_L'||cellId==='RING_R') return itemSlot==='RING';
  return itemSlot===cellId;
}

/* ═══════════════ ЗАСЕВ БАЗ: справочники старой летописи + перенос ═══════════════ */
function slugify(n){ return n.toLowerCase().replace(/[^a-zа-яе0-9]+/g,'_').replace(/^_+|_+$/g,''); }

function weaponAutoTags(w){
  const t=[];
  if(/дальнобойное/i.test(w.g)) t.push('ranged'); else t.push('melee');
  if(/рубящий/.test(w.dmg)) t.push('slashing');
  if(/колющий/.test(w.dmg)) t.push('piercing');
  if(/дробящий/.test(w.dmg)) t.push('bludgeoning');
  const p=w.p||'';
  if(/[Лл]егкое/.test(p)) t.push('light');
  if(/[Тт]яжелое/.test(p)) t.push('heavy');
  if(/[Фф]ехтовальное/.test(p)) t.push('finesse');
  if(/[Дд]вуручное/.test(p)) t.push('twohanded');
  if(/[Уу]ниверсальное/.test(p)) t.push('versatile');
  if(/[Мм]етательное/.test(p)) t.push('thrown');
  if(/[Бб]оеприпасы/.test(p)) t.push('ammunition');
  return t;
}
function armorAutoTags(a){
  if(a.g==='Щит') return ['shield'];
  if(/Легкий/.test(a.g)) return ['lightarmor'];
  if(/Средний/.test(a.g)) return ['mediumarmor'];
  return ['heavyarmor'];
}
function gearAutoTags(n){
  const t=[];
  if(/зелье|противоядие/i.test(n)) t.push('potion','consumable');
  if(/инструмент/i.test(n)) t.push('tool');
  if(/стрелы|болты|пули/i.test(n)) t.push('ammunition');
  if(/мешоч|сундук|рюкзак|фляга|бурдюк/i.test(n)) t.push('container');
  if(/свиток/i.test(n)) t.push('scroll');
  return t;
}

  if(rar==='необычный') t.push('magical');
  if(rar==='редкий'||rar==='очень редкий') t.push('magical','valuable');

/* Однократное вливание Торгара в своды и летопись (и на уже работающих устройствах) */
async function ensureTorgar(){
  const flag=await store.get('dndworld2:torgar');
  if(flag==='1') return;
  /* предметы: две записи справочника вытесняются версиями Торгара, ссылки героев перевязываются */
  const torgRemap={'Трутница':'it_tinderbox_t','Набор целителя (10 исп.)':'it_healer_kit_t'};
  const torgOldIds={};
  itemsDB.forEach(o=>{ if(torgRemap[o.n] && o.id!==torgRemap[o.n]) torgOldIds[o.id]=torgRemap[o.n]; });
  itemsDB=itemsDB.filter(o=>!torgOldIds[o.id]);
  chars.forEach(c=>(c.inventory||[]).forEach(e=>{ if(torgOldIds[e.itemId]) e.itemId=torgOldIds[e.itemId]; }));
  TORGAR_ITEMS.forEach(it=>{
    if(!itemsDB.some(o=>o.id===it.id)){
      const o=Object.assign({},it);
      o.tags=uniqTags((o.tags||[]).concat(itemEnrichTags(o)));
      itemsDB.push(o);
    }
  });
  /* заклинания: одноименные старые вытесняются версиями Торгара */
  const spNames=TORGAR_SPELLS.map(s=>s.n);
  spellsDB=spellsDB.filter(o=>!(spNames.includes(o.n) && !TORGAR_SPELLS.some(t=>t.id===o.id)));
  TORGAR_SPELLS.forEach(sp=>{
    if(!spellsDB.some(o=>o.id===sp.id)){
      const o=Object.assign({},sp);
      o.tags=uniqTags((o.tags||[]).concat(spellEnrichTags(o)));
      spellsDB.push(o);
    }
  });
  /* способности */
  TORGAR_ABILITIES.forEach(ab=>{
    if(!abilitiesDB.some(o=>o.id===ab.id)){
      const o=Object.assign({},ab);
      o.tags=uniqTags((o.tags||[]).concat(abilityEnrichTags(o)));
      abilitiesDB.push(o);
    }
  });
  /* герой */
  if(!chars.some(c=>c.id==='char_torgar')){
    const t=buildTorgar();
    chars.push(typeof upgradeChar3==='function'?upgradeChar3(t):t);
  }
  await store.set('dndworld2:torgar','1');
  scheduleSave();
}

async function ensureSeptih(){
  const flag=await store.get('dndworld2:septih');
  if(flag==='1') return;
  /* народ чейнджлингов в свод рас */
  if(!racesDB.some(r=>r.n==='Чейнджлинг')) racesDB.push(JSON.parse(JSON.stringify(CHANGELING_RACE)));
  /* предметы: справочные записи вытесняются версиями Септиха, ссылки героев перевязываются */
  const sxRemap={'Крюк-кошка':'it_grappling_hook_s','Короткий меч':'it_shortsword_s'};
  const sxOldIds={};
  itemsDB.forEach(o=>{ if(sxRemap[o.n] && o.id!==sxRemap[o.n]) sxOldIds[o.id]=sxRemap[o.n]; });
  itemsDB=itemsDB.filter(o=>!sxOldIds[o.id]);
  chars.forEach(c=>(c.inventory||[]).forEach(e=>{ if(sxOldIds[e.itemId]) e.itemId=sxOldIds[e.itemId]; }));
  SEPTIH_ITEMS.forEach(it=>{
    if(!itemsDB.some(o=>o.id===it.id)){
      const o=Object.assign({},it);
      o.tags=uniqTags((o.tags||[]).concat(itemEnrichTags(o)));
      itemsDB.push(o);
    }
  });
  /* способности */
  SEPTIH_ABILITIES.forEach(ab=>{
    if(!abilitiesDB.some(o=>o.id===ab.id)){
      const o=Object.assign({},ab);
      o.tags=uniqTags((o.tags||[]).concat(abilityEnrichTags(o)));
      abilitiesDB.push(o);
    }
  });
  /* дополнения полноты из официальных справочников */
  LORE_SPELL_PATCHES.forEach(p=>{
    const sp=spellsDB.find(s=>s.id===p.id); if(!sp) return;
    if(p.ifEmpty && sp[p.field]) return;
    if(p.ifEquals!==undefined && sp[p.field]!==p.ifEquals) return;
    sp[p.field]=p.val;
  });
  /* герой */
  if(!chars.some(c=>c.id==='char_septih')){
    const s=buildSeptih();
    chars.push(typeof upgradeChar3==='function'?upgradeChar3(s):s);
  }
  /* починка возможных осиротевших ссылок после прежних вытеснений */
  chars.forEach(c=>(c.inventory||[]).forEach(e=>{
    if(!itemsDB.some(o=>o.id===e.itemId)){
      const s=String(e.itemId).toLowerCase();
      if(s.includes('трутниц')) e.itemId='it_tinderbox_t';
      else if(s.includes('целител')) e.itemId='it_healer_kit_t';
    }
  }));
  await store.set('dndworld2:septih','1');
  scheduleSave();
}

async function ensureLegerem(){
  const flag=await store.get('dndworld2:legerem');
  if(flag==='1') return;
  LEGEREM_ITEMS.forEach(it=>{
    if(!itemsDB.some(o=>o.id===it.id)){
      const o=Object.assign({},it);
      o.tags=uniqTags((o.tags||[]).concat(itemEnrichTags(o)));
      itemsDB.push(o);
    }
  });
  LEGEREM_ABILITIES.forEach(ab=>{
    if(!abilitiesDB.some(o=>o.id===ab.id)){
      const o=Object.assign({},ab);
      o.tags=uniqTags((o.tags||[]).concat(abilityEnrichTags(o)));
      abilitiesDB.push(o);
    }
  });
  /* правка полноты: наплечник наставника получал несуществующий слот SHOULDERS → ячейка «Плечи» (CLOAK) */
  const pauldron=itemsDB.find(o=>o.id==='it_pauldron_mentor');
  if(pauldron && pauldron.slot!=='CLOAK') pauldron.slot='CLOAK';
  if(!chars.some(c=>c.id==='char_legerem')){
    const l=buildLegerem();
    chars.push(typeof upgradeChar3==='function'?upgradeChar3(l):l);
  }
  await store.set('dndworld2:legerem','1');
  scheduleSave();
}

let chars=[], journal=[], itemsDB=[], spellsDB=[], abilitiesDB=[];
let racesDB=[], classesDB=[], rulesDB=[];   /* мировые своды: народы, призвания, записи мастера */
function seedRacesDB(){ return RACES_SEED.map(r=>Object.assign(JSON.parse(JSON.stringify(r)),{id:'race_'+uid()})); }
function seedClassesDB(){ return CLASSES_SEED.map(c=>Object.assign(JSON.parse(JSON.stringify(c)),{id:'cls_'+uid()})); }
let activeCharId=null, sheetTab='stats';
let saveTimer=null;
const memStore={};

/* Хранилище: window.storage (артефакты) → localStorage (свой сайт) → память сеанса */
const store={
  async get(k){
    if(window.storage && window.storage.get){ try{ const r=await window.storage.get(k); return r&&r.value!=null?r.value:null; }catch(e){ return null; } }
    try{ return window.localStorage.getItem(k); }catch(e){ return (k in memStore)?memStore[k]:null; }
  },
  async set(k,v){
    if(window.storage && window.storage.set){ try{ await window.storage.set(k,v); return true; }catch(e){ return false; } }
    try{ window.localStorage.setItem(k,v); return true; }catch(e){ memStore[k]=v; return false; }
  }
};
function setStatus(t,err){
  const el=document.getElementById('saveStatus');
  if(el){ el.textContent=t; el.classList.toggle('err',!!err); }
}
async function persist(key,val){
  const ok=await store.set(key, JSON.stringify(val));
  setStatus(ok?'Записано в летопись ✓':'Хранилище недоступно — не забудьте «Выгрузить летопись»', !ok);
}
function scheduleSave(){
  clearTimeout(saveTimer); setStatus('Перо скрипит…');
  saveTimer=setTimeout(async()=>{
    await persist('dndworld2:chars',chars);
    await persist('dndworld2:items',itemsDB);
    await persist('dndworld2:spells',spellsDB);
    await persist('dndworld2:abilities',abilitiesDB);
    await persist('dndworld2:races',racesDB);
    await persist('dndworld2:classes',classesDB);
    await persist('dndworld2:rules',rulesDB);
    if(typeof syncTouch==='function') syncTouch();
  },600);
}
function scheduleJournalSave(){
  clearTimeout(saveTimer); setStatus('Перо скрипит…');
  saveTimer=setTimeout(async()=>{ await persist('dndworld2:journal',journal); if(typeof syncTouch==='function') syncTouch(); },600);
}
async function readJSON(key){
  try{ const raw=await store.get(key); return raw?JSON.parse(raw):null; }catch(e){ return null; }
}

  });

/* ═══ Броски к20 с преимуществом/помехой ═══ */
let advMode=0; /* 0 обычный · 1 преимущество · 2 помеха */
function cycleAdv(){
  advMode=(advMode+1)%3;
  const b=document.getElementById('advBtn');
  if(b){ b.textContent=['⚖ обычный','▲ преимущество','▼ помеха'][advMode]; b.className='btn ghost sm adv-'+advMode; }
}
function rollCheck(label,m){
  m=+m||0;
  const d=()=>1+Math.floor(Math.random()*20);
  const r1=d(), r2=d();
  let r=r1, note='';
  if(advMode===1){ r=Math.max(r1,r2); note=' ▲['+r1+'|'+r2+']'; }
  if(advMode===2){ r=Math.min(r1,r2); note=' ▼['+r1+'|'+r2+']'; }
  const out=document.getElementById('diceOut'); if(!out) return;
  out.textContent=label+': к20 '+r+(m?(m>0?' + '+m:' − '+Math.abs(m)):'')+' = '+(r+m)+note;
  out.style.color=(r===20)?'var(--ok)':(r===1?'var(--rubric)':'var(--ink)');
}
function rollDmgStr(label,dmgStr,extra){
  extra=+extra||0;
  const out=document.getElementById('diceOut'); if(!out) return;
  const m=String(dmgStr||'').toLowerCase().replace(/к/g,'d').match(/(\d*)d(\d+)\s*([+-]\s*\d+)?/);
  if(!m){ out.textContent=label+': урон '+Math.max(1,1+extra); out.style.color='var(--ink)'; return; }
  const cnt=Math.min(40,+m[1]||1), sides=+m[2]; extra+=parseInt(String(m[3]||'0').replace(/\s/g,''),10)||0;
  const rolls=[]; for(let i=0;i<cnt;i++) rolls.push(1+Math.floor(Math.random()*sides));
  const tot=Math.max(1,rolls.reduce((a,b)=>a+b,0)+extra);
  out.textContent=label+': урон '+tot+' ('+rolls.join(', ')+(extra?(extra>0?' +'+extra:' −'+Math.abs(extra)):'')+')';
  out.style.color='var(--ink)';
}

function roll(n){
  const v=1+Math.floor(Math.random()*n);
  const out=document.getElementById('diceOut');
  out.textContent='к'+n+' → '+v;
  out.style.color = (v===n)?'var(--ok)' : (v===1?'var(--rubric)':'var(--ink)');
}
function rollNotation(){
  const inp=document.getElementById('diceNote');
  const m=(inp.value||'').trim().toLowerCase().replace(/к/g,'d').match(/^(\d*)d(\d+)([+-]\d+)?$/);
  const out=document.getElementById('diceOut');
  if(!m){ out.textContent='формула: 2к6+3'; out.style.color='var(--rubric)'; return; }
  const cnt=Math.min(40,+m[1]||1), sides=+m[2], mod2=+(m[3]||0);
  const rolls=[]; for(let i=0;i<cnt;i++) rolls.push(1+Math.floor(Math.random()*sides));
  const total=rolls.reduce((a,b)=>a+b,0)+mod2;
  out.textContent=inp.value.trim()+' → '+total+' ('+rolls.join(', ')+(mod2? (mod2>0?' +':' ')+mod2 :'')+')';

/* ═══════════════ ДВИЖОК ЭФФЕКТОВ ═══════════════
   Эффект: {stat, mode:'add'|'text', value, note}
   stat: ac, hpmax, hp, init, speed, atk, dmg, passperc,
         ab.str…ab.cha, save.str…save.cha, save.all, skill.<Название>, note
   Источники (в порядке применения):
   1) надетые предметы (есть slot) · 2) предметы инвентаря без слота ·
   3) пассивные способности героя · 4) наложенные эффекты (c.activeFx).
   У записи может быть поле fx (задается в редакторе); если его нет —
   эффекты выводятся из текста автоматически (deriveFx), поэтому механизм
   работает и для записей, которых еще нет. */

let fxCacheT=0;
function fxInvalidate(){ fxCacheT++; }
const FX_STAT_RU={ac:'КД', hpmax:'макс. хиты', hp:'текущие хиты', init:'инициатива', speed:'скорость',
 atk:'броски атаки', dmg:'урон', passperc:'пасс. Внимательность',
 'ab.str':'Сила','ab.dex':'Ловкость','ab.con':'Телосложение','ab.int':'Интеллект','ab.wis':'Мудрость','ab.cha':'Харизма',
 'save.str':'спас. Силы','save.dex':'спас. Ловкости','save.con':'спас. Телосложения','save.int':'спас. Интеллекта','save.wis':'спас. Мудрости','save.cha':'спас. Харизмы','save.all':'все спасброски'};
const FX_AB_WORDS={'сила':'str','силы':'str','ловкость':'dex','ловкости':'dex','телосложение':'con','телосложения':'con',
 'интеллект':'int','интеллекта':'int','мудрость':'wis','мудрости':'wis','харизма':'cha','харизмы':'cha'};

/* ── авторазбор эффектов из описания записи ── */
function deriveFx(rec, kind){
  const t=[]; const x=String(rec.x||rec.desc||'').replace(/\u0451/g,'е');
  const low=x.toLowerCase();
  let m;
  /* +N к КД (у брони базовый КД считает acAuto — ловим только явные бонусы) */
  const armorBase=(kind==='item'&&rec.type==='armor'&&rec.ac);   /* базу и бонусы такой брони считает acAuto */
  if(!armorBase){
    const acRe=/\+(\d+)\s*к\s*кд/gi;
    while((m=acRe.exec(low))) t.push({stat:'ac',mode:'add',value:+m[1]});
  }
  /* +N к броскам атаки */
  const atkRe=/\+(\d+)\s*к\s*броск[а-я]*\s*атак/gi;
  while((m=atkRe.exec(low))) t.push({stat:'atk',mode:'add',value:+m[1]});
  /* +N к (броскам) урона / +N к урону */
  const dmgRe=/\+(\d+)\s*к\s*(?:броскам\s*)?урон/gi;
  while((m=dmgRe.exec(low))) t.push({stat:'dmg',mode:'add',value:+m[1]});
  /* максимум хитов и текущие хиты увеличиваются на N */
  if((m=low.match(/максимум хитов и текущие хиты[^.]*увеличиваются на (\d+)/))){
    t.push({stat:'hpmax',mode:'add',value:+m[1]}); t.push({stat:'hp',mode:'add',value:+m[1]});
  } else if((m=low.match(/максимум хитов[^.]*увеличивается на (\d+)/))){
    if(/каждый раз[^.]*уровен/.test(low)) t.push({stat:'hpmax',mode:'add',value:'lvl',note:'за уровень'});
    else t.push({stat:'hpmax',mode:'add',value:+m[1]});
  }
  /* инициатива +N */
  if((m=low.match(/инициатив[а-я]*\s*\+(\d+)/)||low.match(/\+(\d+)\s*к?\s*инициатив/))) t.push({stat:'init',mode:'add',value:+m[1]});
  /* скорость увеличивается на N */
  if((m=low.match(/скорость[^.]*увеличивается на (\d+(?:,\d+)?)\s*(м|фут)/))) t.push({stat:'speed',mode:'text',value:'+'+m[1]+' '+m[2]});
  /* +N к проверкам Характеристики (Навык) — возможно перечисление через «и» */
  const skRe=/\+(\d+)\s*к\s*проверк[а-я]*\s*([а-я]+)\s*\(([^)]+)\)(?:\s*и\s*([а-я]+)\s*\(([^)]+)\))?/gi;
  while((m=skRe.exec(x))){
    t.push({stat:'skill.'+m[3].trim(),mode:'add',value:+m[1]});
    if(m[5]) t.push({stat:'skill.'+m[5].trim(),mode:'add',value:+m[1]});
  }
  /* +N к характеристике: «значение вашей Мудрости … увеличивается на 1» */
  if((m=low.match(/значение ваше[йго]+\s+([а-я]+)(?:\s+или\s+([а-я]+))?[^.]*увеличивается на (\d+)/))){
    const k=FX_AB_WORDS[m[1]]; if(k) t.push({stat:'ab.'+k,mode:'add',value:+m[3],note:m[2]?'или '+m[2]+' (на выбор)':''});
  }
  /* качественные: преимущество/помеха/сопротивление/иммунитет */
  const qual=[
   [/преимуществ[а-я]*\s+(при|на)\s+спасброск[а-я]*\s+от\s+([а-я]+)/g, (mm)=>'преимущество на спасброски от '+mm[2].trim()],
   [/сопротивля?емост[а-я]*\s+к\s+урону\s+([а-я]+)/g, (mm)=>'сопротивление урону: '+mm[1]],
   [/иммунитет[а-я]*\s+к\s+([а-я ]+?)(?=[,.;)]|$)/g, (mm)=>'иммунитет: '+mm[1].trim()],
   [/не можете получить критическ[а-я]+ удар/g, ()=>'иммунитет к критическим ударам (в обычных условиях)'],
   [/помех[а-я]*\s+на\s+скрытност/g, ()=>'помеха на проверки Скрытности'],
   [/скрытност[а-я]*:\s*помеха/g, ()=>'помеха на проверки Скрытности']
  ];
  qual.forEach(([re,fn])=>{ let mm; while((mm=re.exec(low))) t.push({stat:'note',mode:'text',value:fn(mm)}); });
  /* Наставление и подобные кубиковые добавки */
  if((m=low.match(/добавить\s+1к4\s+к\s+одной\s+проверке/))) t.push({stat:'note',mode:'text',value:'+1к4 к одной проверке характеристики (по выбору)'});
  return t;
}
function recFx(rec, kind){
  if(rec && Array.isArray(rec.fx) && rec.fx.length) return rec.fx;
  return rec? deriveFx(rec, kind) : [];
}

/* ── мини-язык поля «Влияние на показатели» в редакторах ──
   по строке: кд +2 · хиты-макс +5 · хиты +5 · иниц +1 · атака +1 · урон +2 ·
   хар.мудр +1 · спас.все +1 · спас.тел +2 · навык.Убеждение +1 ·
   скорость +3 м · текст: сопротивление урону ядом */
const FX_KEYS={'кд':'ac','хиты-макс':'hpmax','хиты':'hp','иниц':'init','инициатива':'init','атака':'atk','урон':'dmg',
 'пассв':'passperc','хар.сил':'ab.str','хар.лов':'ab.dex','хар.тел':'ab.con','хар.инт':'ab.int','хар.мудр':'ab.wis','хар.хар':'ab.cha',
 'спас.все':'save.all','спас.сил':'save.str','спас.лов':'save.dex','спас.тел':'save.con','спас.инт':'save.int','спас.мудр':'save.wis','спас.хар':'save.cha'};
function parseFxLines(txt){
  const out=[];
  String(txt||'').split('\n').map(s=>s.trim()).filter(Boolean).forEach(line=>{
    let m;
    if((m=line.match(/^текст:\s*(.+)$/i))){ out.push({stat:'note',mode:'text',value:m[1]}); return; }
    if((m=line.match(/^навык\.(.+?)\s+([+-]?\d+)$/i))){ out.push({stat:'skill.'+m[1].trim(),mode:'add',value:+m[2]}); return; }
    if((m=line.match(/^скорость\s+(.+)$/i))){ out.push({stat:'speed',mode:'text',value:m[1]}); return; }
    if((m=line.match(/^([а-я.\-]+)\s+([+-]?\d+|lvl)$/i))){
      const k=FX_KEYS[m[1].toLowerCase()];
      if(k){ out.push({stat:k,mode:'add',value:(m[2]==='lvl'?'lvl':+m[2])}); return; }
    }
    out.push({stat:'note',mode:'text',value:line});
  });
  return out;
}
function fxToLines(fx){
  const back={}; Object.keys(FX_KEYS).forEach(k=>back[FX_KEYS[k]]=k);
  return (fx||[]).map(f=>{
    if(f.stat==='note') return 'текст: '+f.value;
    if(f.stat.startsWith('skill.')) return 'навык.'+f.stat.slice(6)+' '+(f.value>0?'+':'')+f.value;
    if(f.stat==='speed') return 'скорость '+f.value;
    const k=back[f.stat]||f.stat;
    return k+' '+(f.value==='lvl'?'lvl':(f.value>0?'+':'')+f.value);
  }).join('\n');
}

/* ── активные источники эффектов героя ── */
function isPassiveAbility(ab){ return ab && ab.uses==null && !ab.rest; }
const EXHAUST_FX=['помеха на проверки характеристик','скорость уменьшена вдвое','помеха на броски атаки и спасброски','максимум хитов уменьшен вдвое','скорость равна 0','смерть'];
function fxSrcKey(s){ return s.k+':'+s.id; }
function toggleFxSource(charId,key){
  const t=getCh(charId); if(!t) return;
  t.fxOff=t.fxOff||[];
  const i=t.fxOff.indexOf(key);
  if(i>=0) t.fxOff.splice(i,1); else t.fxOff.push(key);
  fxInvalidate(); scheduleSave(); renderChars();
}
function charFxSources(c){
  const out=[];
  const off=c.fxOff||[];
  const eq=c.equipment||{}, wornEntry=new Set(Object.values(eq).filter(Boolean));
  (c.inventory||[]).forEach(e=>{
    const it=itemOf(e.itemId); if(!it) return;
    const worn=wornEntry.has(e.id);
    const wearable=!!it.slot;
    if((wearable&&worn)||(!wearable)){
      const fx=recFx(it,'item');
      if(fx.length){
        const s={k:'item', id:it.id, label:it.n, why:(wearable?'надето':'в инвентаре'), fx, canOff:true};
        s.off=off.includes(fxSrcKey(s)); out.push(s);
      }
    }
  });
  (c.abilities||[]).forEach(e=>{
    const ab=abilityOf(e.abilityId); if(!ab) return;
    if(isPassiveAbility(ab)){
      const fx=recFx(ab,'ability');
      if(fx.length){
        const s={k:'ability', id:ab.id, label:ab.n, why:'пассивная', fx, canOff:true};
        s.off=off.includes(fxSrcKey(s)); out.push(s);
      }
    }
  });
  (c.activeFx||[]).forEach(a=>{
    let rec=null, label=a.label||'';
    if(a.k==='spell'){ rec=spellOf(a.id); label=rec?rec.n:label; }
    if(a.k==='ability'){ rec=abilityOf(a.id); label=rec?rec.n:label; }
    const fx=a.fx&&a.fx.length? a.fx : recFx(rec, a.k);
    if(fx.length||a.k==='spell'||a.k==='use') out.push({k:a.k, id:a.id, uid:a.uid, label, why:a.why||(a.from?'наложено: '+a.from:'применено'), fx, removable:true});
  });
  /* истощение — канонические последствия по уровням */
  const ex=+c.exhaustion||0;
  if(ex>0){
    out.push({k:'exhaustion', id:'ex', label:'Истощение (уровень '+ex+')', why:'состояние',
      fx:EXHAUST_FX.slice(0,Math.min(6,ex)).map(v=>({stat:'note',mode:'text',value:v}))});
  }
  /* отмеченные состояния */
  if((c.cond||[]).length){
    out.push({k:'cond', id:'cond', label:'Состояния', why:'отмечены на листе',
      fx:c.cond.map(n=>({stat:'note',mode:'text',value:n}))});
  }
  return out;
}
function charFxAll(c){
  if(c.__fxC && c.__fxC.t===fxCacheT) return c.__fxC.v;
  const list=[];
  charFxSources(c).forEach(s=>{ if(s.off) return; s.fx.forEach(f=>{
    let v=f.value;
    if(v==='lvl') v=c.level;
    list.push({stat:f.stat, mode:f.mode, value:v, note:f.note||'', label:s.label, k:s.k});
  });});
  c.__fxC={t:fxCacheT, v:list};
  return list;
}
function fxSum(c,stat){
  return charFxAll(c).filter(f=>f.stat===stat&&f.mode==='add').reduce((a,f)=>a+(+f.value||0),0);
}
function fxParts(c,stat){
  return charFxAll(c).filter(f=>f.stat===stat&&f.mode==='add').map(f=>({v:+f.value||0,label:f.label,note:f.note}));
}
function fxLine(c,stat){
  const parts=fxParts(c,stat);
  if(!parts.length) return '';
  const sum=parts.reduce((a,p)=>a+p.v,0);
  const cls=sum>=0?'fx-plus':'fx-minus';
  return '<div class="fx-line '+cls+'">✦ '+(sum>0?'+':'')+sum+' · '+parts.map(p=>esc(p.label)+(p.note?' ('+esc(p.note)+')':'')).join(', ')+'</div>';
}

/* ── эффективные характеристики (каскад в модификаторы) ── */
function eAb(c,k){ return (c.ab&&c.ab[k]!=null?c.ab[k]:10)+fxSum(c,'ab.'+k); }
function eMod(c,k){ return Math.floor((eAb(c,k)-10)/2); }
function eHpMax(c){ return (+c.hpMax||0)+fxSum(c,'hpmax'); }
function fxSaveBonus(c,k){ return fxSum(c,'save.'+k)+fxSum(c,'save.all'); }
function fxSkillBonus(c,name){ return fxSum(c,'skill.'+name); }

/* ── наложение и снятие ── */
function fxUid(){ return 'fx_'+Math.random().toString(36).slice(2,9); }
function applyFxTo(targetId, entry){
  const t=getCh(targetId); if(!t) return;
  t.activeFx=t.activeFx||[];
  let fx=entry.fx;
  if(!fx){
    const rec=entry.k==='spell'?spellOf(entry.id):(entry.k==='ability'?abilityOf(entry.id):null);
    fx=recFx(rec, entry.k);
  }
  /* текущие хиты — мгновенный эффект при наложении, а не постоянный модификатор */
  const inst=fx.filter(f=>f.stat==='hp'&&f.mode==='add'&&typeof f.value==='number');
  entry.fx=fx.filter(f=>!inst.includes(f));
  entry.uid=fxUid();
  t.activeFx.push(entry);
  fxInvalidate();
  let healed=0; inst.forEach(f=>healed+=f.value);
  if(healed){ t.hp=Math.min(eHpMax(t),(+t.hp||0)+healed); }
  scheduleSave(); renderChars();
  setStatus('✦ «'+entry.label+'» — эффект наложен на '+t.name+(healed?' (+'+healed+' к текущим хитам)':'')+'.');
}
function removeActiveFx(charId, uid){
  const t=getCh(charId); if(!t||!t.activeFx) return;
  t.activeFx=t.activeFx.filter(a=>a.uid!==uid);
  fxInvalidate();
  t.hp=Math.min(+t.hp||0, eHpMax(t));   /* максимум мог снизиться — подрезаем текущие */
  scheduleSave(); renderChars();
}
function pickTarget(actionLabel){
  if(!chars.length) return null;
  if(chars.length===1) return chars[0].id;
  const lines=chars.map((x,i)=>(i+1)+' — '+x.name).join('\n');
  const raw=window.prompt(actionLabel+'\nВыберите цель (номер):\n'+lines, '1');
  if(raw==null) return null;
  const i=parseInt(raw,10)-1;
  if(isNaN(i)||i<0||i>=chars.length){ alert('Такого номера нет.'); return null; }
  return chars[i].id;
}
function castSpellFx(spellId, casterId){
  const sp=spellOf(spellId); if(!sp) return;
  const caster=casterId?getCh(casterId):null;
  const targetId=pickTarget('⚡ Наложить «'+sp.n+'»'+(caster?' (заклинатель: '+caster.name+')':''));
  if(!targetId) return;
  const isConc=!!sp.conc||/концентрация/i.test(sp.d||'');
  if(isConc&&caster){
    /* правило концентрации: одно заклинание концентрации на заклинателя */
    const olds=[];
    chars.forEach(ch=>(ch.activeFx||[]).forEach(a=>{ if(a.conc&&a.casterId===caster.id) olds.push({ch,a}); }));
    if(olds.length){
      if(!window.confirm(caster.name+' уже концентрируется: «'+olds.map(o=>o.a.label).join('», «')+'».\n\nОК — прервать прежнюю концентрацию и наложить «'+sp.n+'».\nОтмена — не накладывать.')) return;
      olds.forEach(o=>removeActiveFx(o.ch.id,o.a.uid));
    }
  }
  const why='наложено'+(caster?': '+caster.name:'')+(isConc?' · концентрация':'')+(sp.d&&!/мгновенн/i.test(sp.d)?' · '+sp.d:'');
  applyFxTo(targetId, {k:'spell', id:sp.id, label:sp.n, from:caster?caster.name:'', casterId:caster?caster.id:'', conc:isConc, why});
}
function toggleAbilityFx(abilityId){
  const c=cc(); if(!c) return;
  c.activeFx=c.activeFx||[];
  const ex=c.activeFx.find(a=>a.k==='ability'&&a.id===abilityId);
  if(ex){ removeActiveFx(c.id, ex.uid); return; }
  const ab=abilityOf(abilityId); if(!ab) return;
  /* применение активной способности тратит использование */
  if(ab.uses!=null){
    const e=(c.abilities||[]).find(x=>x.abilityId===ab.id);
    if(e){
      const cur=e.cur==null?ab.uses:e.cur;
      if(cur<=0){ if(!window.confirm('Заряды «'+ab.n+'» исчерпаны. Все равно применить эффект?')) return; }
      else e.cur=cur-1;
    }
  }
  applyFxTo(c.id, {k:'ability', id:ab.id, label:ab.n, from:'', why:'применено'+(ab.rest?' · восст.: '+ab.rest:'')});
}
function abilityFxActive(c,abilityId){ return (c.activeFx||[]).some(a=>a.k==='ability'&&a.id===abilityId); }

/* ── употребление расходуемых предметов ── */
function isConsumableItem(it){
  return !!it && (it.type==='potion'||it.type==='scroll'||(it.tags||[]).includes('consumable'));
}
function deriveHeal(it){
  const m=String(it.desc||'').replace(/\u0451/g,'е').toLowerCase()
    .match(/восстанавлива[а-я]*\s+(\d+)\s*к\s*(\d+)(?:\s*\+\s*(\d+))?\s*хит/);
  if(!m) return null;
  return {cnt:+m[1], sides:+m[2], plus:+(m[3]||0)};
}
function useConsumable(entryId){
  const c=cc(); if(!c) return;
  const e=(c.inventory||[]).find(x=>x.id===entryId); if(!e) return;
  const it=itemOf(e.itemId); if(!it) return;
  /* мгновенное исцеление из описания */
  let msg='⚗ «'+it.n+'» употреблено';
  const heal=deriveHeal(it);
  if(heal){
    const rolls=[]; for(let i=0;i<heal.cnt;i++) rolls.push(1+Math.floor(Math.random()*heal.sides));
    const tot=rolls.reduce((a,b)=>a+b,0)+heal.plus;
    c.hp=Math.min(eHpMax(c),(+c.hp||0)+tot);
    const out=document.getElementById('diceOut');
    if(out){ out.textContent=it.n+': '+heal.cnt+'к'+heal.sides+(heal.plus?' + '+heal.plus:'')+' → +'+tot+' хитов ('+rolls.join(', ')+')'; out.style.color='var(--ok)'; }
    msg+=' · +'+tot+' хитов';
  }
  /* длящиеся и качественные эффекты — вешаем на героя с пометкой */
  const lasting=recFx(it,'item').filter(f=>!(f.stat==='hp'&&f.mode==='add'));
  if(lasting.length){
    applyFxTo(c.id, {k:'use', id:it.id, label:it.n+' (употреблено)', fx:lasting, why:'употреблено из инвентаря'});
  }
  /* списываем одну штуку */
  e.qty=(e.qty||1)-1;
  if(e.qty<=0){
    Object.keys(c.equipment||{}).forEach(k=>{ if(c.equipment[k]===e.id) delete c.equipment[k]; });
    c.inventory=c.inventory.filter(x=>x.id!==e.id);
    msg+=' · запас исчерпан';
  }
  fxInvalidate(); scheduleSave(); renderChars();
  setStatus(msg+'.');
}

/* ── панель «Действующие эффекты» ── */
function fxPanelHTML(c){
  const src=charFxSources(c);
  let h='<h3 class="rubric" style="font-size:20px;margin-top:14px">✦ Действующие эффекты</h3>';
  if(!src.length) return h+'<p class="note-ital" style="font-size:14px">Сейчас на героя ничто не влияет: наденьте снаряжение, примените способность или наложите заклинание.</p>';
  h+='<div class="fx-panel">';
  src.forEach(s=>{
    const items=s.fx.map(f=>{
      if(f.mode==='text'||f.stat==='note') return '<span class="fx-note">'+esc(String(f.value))+'</span>';
      if(f.stat==='speed') return '<span class="fx-note">скорость '+esc(String(f.value))+'</span>';
      let v=f.value==='lvl'?c.level:f.value;
      const cls=v>=0?'fx-plus':'fx-minus';
      return '<span class="'+cls+'">'+(FX_STAT_RU[f.stat]||f.stat.replace('skill.','навык: '))+' '+(v>0?'+':'')+v+(f.note?' <i>('+esc(f.note)+')</i>':'')+'</span>';
    }).join('<span class="fx-sep">·</span>');
    h+='<div class="fx-row'+(s.off?' fx-off':'')+'"><b class="fx-src">'+esc(s.label)+'</b><span class="fx-why">'+esc(s.why)+(s.off?' · отключено мастером':'')+'</span>'
      +'<span class="fx-items">'+(items||'<span class="fx-note">эффект описан в тексте записи</span>')+'</span>'
      +(s.canOff?'<button class="mini" title="'+(s.off?'Включить эффект':'Отключить эффект (например, не выполнено условие)')+'" onclick="toggleFxSource(\''+c.id+'\',\''+fxSrcKey(s)+'\')">'+(s.off?'⏻ вкл':'⏻ выкл')+'</button>':'')
      +(s.removable?'<button class="del-x" title="Снять эффект" onclick="removeActiveFx(\''+c.id+'\',\''+s.uid+'\')">✕</button>':'')
      +'</div>';
  });
  return h+'</div>';
}

/* ═══════════════ ОБЛАЧНАЯ СИНХРОНИЗАЦИЯ: ДВА КОНТУРА ═══════════════
   МИРОВОЙ контур (узел world) — своды всего сайта, вне кампаний и безусловно:
     предметы и снаряжение, заклинания, способности, народы, призвания, справочник мастера.
   КАМПАНЕЙСКИЙ контур (узел campaigns/{ключ}) — персонажи и журнал конкретной кампании.
   Firebase Realtime Database через REST (запись) и Server-Sent Events (живой поток).
   Если в код вписан DEFAULT_DB_URL, облако включается само на любом устройстве. */
const CLOUD_PAUSED=true;   /* по решению мастера: облако временно на паузе, весь материал сайта ведется локально; кнопка «Подключить» работает */
const DEFAULT_DB_URL='https://best-dnd-campaign-ever-default-rtdb.firebaseio.com';
const DEFAULT_ROOM='SpeakFriendAndEnter2026';   /* кампания по умолчанию */

let syncCfg=null, syncOn=false, syncClientId=null;

function lsGet(k){ try{ return window.localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){} }

function syncLoadCfg(){
  try{ syncCfg=JSON.parse(lsGet('dndworld2:synccfg')||'null'); }catch(e){ syncCfg=null; }
  if(!syncCfg && DEFAULT_DB_URL){ syncCfg={url:DEFAULT_DB_URL, room:DEFAULT_ROOM, on:true}; syncSaveCfg(); }
  syncClientId=lsGet('dndworld2:clientid');
  if(!syncClientId){ syncClientId='cl_'+Math.random().toString(36).slice(2,10); lsSet('dndworld2:clientid',syncClientId); }
}
function syncSaveCfg(){ lsSet('dndworld2:synccfg', JSON.stringify(syncCfg||{})); }

function syncBase(){
  if(!syncCfg||!syncCfg.url) return null;
  const u=String(syncCfg.url).trim().replace(/\/+$/,'');
  return /^https:\/\/.+/.test(u)? u : null;
}
function syncRoom(){ return String((syncCfg&&syncCfg.room)||'').trim().replace(/[^a-zA-Z0-9_-]/g,''); }

function syncStatus(t,cls){
  const el=document.getElementById('syncStatus');
  if(el){ el.textContent=t; el.className='sync-status'+(cls?' '+cls:''); }
  const btn=document.getElementById('cloudBtn');
  if(btn){ btn.classList.toggle('cloud-on', !!syncOn); btn.textContent=syncOn?'☁ Облако ✓':'☁ Облако'; }
}

/* ─── описание контура ───
   ch = { name, key, url(), payload(), apply(данные), lastAt, es, pushTimer, retryTimer, pending } */
function makeChan(name, key, urlFn, payloadFn, applyFn){
  return { name, key, url:urlFn, payloadOf:payloadFn, applyData:applyFn,
    lastAt:+(lsGet('dndworld2:synclast:'+key)||0), es:null, pushTimer:null, retryTimer:null, pending:null };
}
const chWorld=makeChan('мир','w',
  ()=>{ const b=syncBase(); return b? b+'/world.json' : null; },
  ()=>({ items:itemsDB, spells:spellsDB, abilities:abilitiesDB, races:racesDB, classes:classesDB, rules:rulesDB }),
  (d)=>{
    itemsDB=d.items||[]; spellsDB=d.spells||[]; abilitiesDB=d.abilities||[];
    racesDB=d.races||racesDB; classesDB=d.classes||classesDB; rulesDB=d.rules||rulesDB;
    renderSpellsDB(); renderItemsDB(); renderAbilitiesDB(); renderRaces(); renderClasses(); renderRules(); renderChars();
  });
const chCamp=makeChan('кампания','c',
  ()=>{ const b=syncBase(), r=syncRoom(); return (b&&r)? b+'/campaigns/'+r+'.json' : null; },
  ()=>({ chars, journal }),
  (d)=>{ chars=(d.chars||[]).map(x=>typeof upgradeChar3==='function'?upgradeChar3(x):x); journal=d.journal||[]; renderChars(); renderJournal(); });
const syncChans=[chWorld, chCamp];

/* ─── применение чужих правок ─── */
async function syncPersistLocal(){
  await store.set('dndworld2:chars',   JSON.stringify(chars));
  await store.set('dndworld2:items',   JSON.stringify(itemsDB));
  await store.set('dndworld2:spells',  JSON.stringify(spellsDB));
  await store.set('dndworld2:abilities',JSON.stringify(abilitiesDB));
  await store.set('dndworld2:races',   JSON.stringify(racesDB));
  await store.set('dndworld2:classes', JSON.stringify(classesDB));
  await store.set('dndworld2:rules',   JSON.stringify(rulesDB));
  await store.set('dndworld2:journal', JSON.stringify(journal));
}
function syncApplyRemote(ch,msg){
  const ae=document.activeElement;   /* не сбивать набор текста */
  const typing=ae && (ae.tagName==='INPUT'||ae.tagName==='TEXTAREA') && ae.closest && ae.closest('.leaf');
  if(typing){
    ch.pending=msg;
    clearTimeout(ch.retryTimer);
    ch.retryTimer=setTimeout(()=>{ const m=ch.pending; ch.pending=null; if(m) syncApplyRemote(ch,m); },2500);
    return;
  }
  try{
    const d=JSON.parse(msg.j);
    ch.applyData(d);
    ch.lastAt=msg.at||Date.now();
    lsSet('dndworld2:synclast:'+ch.key,String(ch.lastAt)); lsSet('dndworld2:dirty:'+ch.key,'');
    syncPersistLocal();
    syncStatus('Облако: получены изменения ('+ch.name+') ✓','ok');
    setStatus('Летопись обновлена из облака ✓');
  }catch(e){ syncStatus('Облако: не удалось разобрать данные ('+ch.name+')','err'); }
}

/* ─── отправка: ядро зовет syncTouch после каждого сохранения ─── */
function syncTouch(){
  if(!syncCfg||!syncCfg.on) return;
  syncChans.forEach(ch=>{
    if(!ch.url()) return;
    if(!syncOn){ lsSet('dndworld2:dirty:'+ch.key,'1'); return; }
    clearTimeout(ch.pushTimer);
    ch.pushTimer=setTimeout(()=>syncPushNow(ch),1200);
  });
}
async function syncPushNow(ch){
  const u=ch.url(); if(!u||!syncOn) return;
  const p={ by:syncClientId, at:Date.now(), j:JSON.stringify(ch.payloadOf()) };
  try{
    syncStatus('Облако: отправляю ('+ch.name+')…');
    const r=await fetch(u,{method:'PUT',body:JSON.stringify(p)});
    if(!r.ok) throw new Error('HTTP '+r.status);
    ch.lastAt=p.at;
    lsSet('dndworld2:synclast:'+ch.key,String(p.at)); lsSet('dndworld2:dirty:'+ch.key,'');
    syncStatus('Облако: сохранено ('+ch.name+') ✓','ok');
  }catch(e){ syncStatus('Облако: ошибка отправки ('+ch.name+') — '+e.message,'err'); }
}

/* ─── живой поток ─── */
function syncCloseStream(ch){ if(ch.es){ try{ ch.es.close(); }catch(e){} ch.es=null; } }
function syncOpenStream(ch){
  syncCloseStream(ch);
  const u=ch.url(); if(!u) return;
  try{
    ch.es=new EventSource(u);
    const onPut=(ev)=>{
      try{
        const p=JSON.parse(ev.data);
        if(!p || p.path!=='/' || !p.data) return;
        const msg=p.data;
        if(msg.by===syncClientId) return;
        if(!(msg.at>ch.lastAt)) return;
        syncApplyRemote(ch,msg);
      }catch(e){}
    };
    ch.es.addEventListener('put',onPut);
    ch.es.addEventListener('patch',onPut);
    ch.es.addEventListener('cancel',()=>syncStatus('Облако: доступ закрыт правилами базы','err'));
    ch.es.addEventListener('auth_revoked',()=>syncStatus('Облако: истек доступ — проверьте правила базы','err'));
    ch.es.onerror=()=>{ if(syncOn) syncStatus('Облако: связь прервана ('+ch.name+'), переподключаюсь…','err'); };
  }catch(e){ syncStatus('Облако: живой поток недоступен — '+e.message,'err'); }
}

/* ─── рукопожатие одного контура ─── */
async function syncHandshake(ch, cloud, interactive){
  const dirty=lsGet('dndworld2:dirty:'+ch.key)==='1';
  if(cloud && cloud.j && cloud.at){
    if(cloud.at>ch.lastAt){
      let take=true;
      if(interactive || dirty){
        take=window.confirm('В облаке уже есть данные («'+ch.name+'», запись от '+new Date(cloud.at).toLocaleString()+').\n\nОК — взять из облака (заменит данные на этом устройстве).\nОтмена — заменить облако данными этого устройства.');
      }
      if(take) syncApplyRemote(ch,cloud); else await syncPushNow(ch);
    } else if(dirty){ await syncPushNow(ch); }
  } else {
    await syncPushNow(ch);       /* узел пуст — кладем свои данные */
  }
  syncOpenStream(ch);
}

/* ─── подключение / отключение ─── */
async function syncConnect(interactive){
  if(!syncBase()){ syncStatus('Укажите ссылку на базу (https://…)','err'); return; }
  syncChans.forEach(syncCloseStream);
  syncStatus('Облако: подключаюсь…');
  /* забираем оба узла */
  let cloudW=null, cloudC=null;
  try{
    const r=await fetch(chWorld.url());
    if(!r.ok) throw new Error('HTTP '+r.status);
    cloudW=await r.json();
  }catch(e){ syncOn=false; syncStatus('Облако: нет доступа — '+e.message,'err'); return; }
  if(chCamp.url()){
    try{ const r=await fetch(chCamp.url()); if(r.ok) cloudC=await r.json(); }catch(e){}
  }
  syncOn=true; syncCfg.on=true; syncSaveCfg();
  /* перенос старого формата: раньше весь мир лежал внутри кампании */
  if((!cloudW || !cloudW.j) && cloudC && cloudC.j){
    try{
      const old=JSON.parse(cloudC.j);
      if(old.items||old.spells||old.abilities){
        itemsDB=old.items||itemsDB; spellsDB=old.spells||spellsDB; abilitiesDB=old.abilities||abilitiesDB;
        await syncPushNow(chWorld);
        cloudW={by:syncClientId, at:chWorld.lastAt, j:JSON.stringify(chWorld.payloadOf())};
        syncStatus('Облако: своды мира вынесены из кампании в общий контур ✓','ok');
      }
    }catch(e){}
  }
  await syncHandshake(chWorld, cloudW, interactive);
  if(chCamp.url()) await syncHandshake(chCamp, cloudC, interactive);
  syncStatus('Облако: подключено ✓ (мир — общий'+(chCamp.url()?', кампания «'+syncRoom()+'»':'; кампания не задана')+')','ok');
}
function syncDisconnect(){
  syncChans.forEach(syncCloseStream); syncOn=false;
  if(syncCfg){ syncCfg.on=false; syncSaveCfg(); }
  syncStatus('Облако: отключено');
}
function syncAutoStart(){
  syncLoadCfg();
  if(CLOUD_PAUSED){ syncStatus('Облако: на паузе — весь материал ведется локально для всего сайта'); return; }
  if(syncCfg && syncCfg.on && syncBase() && typeof EventSource!=='undefined') syncConnect(false);
}

      '<div class="sync-note">Данные доступны всякому, кто знает ссылку на базу, — держите ее в секрете, как пароль, и не храните в летописи личные сведения.</div>'+
      '</details>'+
      '</div>';
    document.body.appendChild(m);

  }
  document.getElementById('syncUrlInp').value=(syncCfg&&syncCfg.url)||'';
  document.getElementById('syncRoomInp').value=(syncCfg&&syncCfg.room)||DEFAULT_ROOM;

}
function closeSyncModal(){ const m=document.getElementById('syncModal'); if(m) m.classList.add('hidden'); }
function syncSaveAndConnect(){
  syncCfg=syncCfg||{};

  syncCfg.room=document.getElementById('syncRoomInp').value.trim()||DEFAULT_ROOM;

    +(long?'<button class="toggle-link" onclick="clampToggle(this)">развернуть ▾</button>':'')+'</div>';
